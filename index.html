the Gothic Wars (535–554 CE), devastating Italy's population and infrastructure far more than the 476 CE 'fall' ever had.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "Gregory of Tours (~538–594 CE) wrote the 'History of the Franks,' our primary source for early medieval Gaul — a world of Frankish kings, Gallo-Roman bishops, and miraculous saints.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=46.2,2.2&zoom=5&size=280x180&markers=46.2,2.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.8,36.2,12.2,56.2&layer=mapnik&marker=46.2,2.2", "map_label": "France"}, {"fact": "The prophet Muhammad was born around 570 CE in Mecca — a city in the Arabian Peninsula that was then a significant trading hub between Byzantine and Sassanid spheres of influence.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "Boethius's 'Consolation of Philosophy,' written while awaiting execution around 524 CE, became one of the most copied books of the Middle Ages, shaping how medieval thinkers approached fate, providence, and the nature of good.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=20.0,0.0&zoom=2&size=280x180&markers=20.0,0.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-60.0,-40.0,60.0,80.0&layer=mapnik&marker=20.0,0.0", "map_label": "The Modern World"}, {"fact": "The conversion of the Visigoths from Arianism to Catholic Christianity under King Reccared (589 CE) unified Iberian Christianity under Rome — a precedent for the close alliance of church and Frankish kingdom that defined medieval Christendom.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=37.9,-4.8&zoom=6&size=280x180&markers=37.9,-4.8,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-9.8,32.9,0.20000000000000018,42.9&layer=mapnik&marker=37.9,-4.8", "map_label": "Al-Andalus (Spain)"}, {"fact": "Pope Gregory I ('the Great', 590–604 CE) transformed the papacy into an administrative power, sending missionaries to England, corresponding with kings across Europe, and reforming church music — Gregorian chant bears his name.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "The Sassanid Persian Empire reached its greatest extent under Khosrow I (531–579 CE), defeating Byzantine armies and establishing Persia as a major cultural center — its court at Ctesiphon attracted scholars, philosophers, and physicians from across the known world.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "Irish monasticism, pioneered by figures like Columba (~521–597 CE), produced the most vibrant intellectual culture in the post-Roman West — Irish monks preserved Latin learning and sent missionaries back to a Christianizing Europe.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5", "map_label": "Italy"}, {"fact": "The Avars, a nomadic people from the Eurasian steppe, arrived in Europe around 560 CE and established a powerful khanate in the Pannonian Basin (modern Hungary), destabilizing the Balkans for two centuries.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "Silk production, long a Chinese monopoly, was smuggled to the Byzantine Empire around 552 CE — reportedly by monks who hid silkworm eggs in hollow canes — breaking China's stranglehold on the luxury trade.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "The Council of Constantinople III (553 CE), convened by Justinian, condemned the 'Three Chapters' — writings associated with Nestorian Christianity — in an attempt to reconcile Eastern and Western church factions that instead deepened divisions.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "Augustine of Canterbury, sent by Pope Gregory I, arrived in England in 597 CE and baptized King Æthelberht of Kent — beginning the Roman Christian mission to the Anglo-Saxons that would eventually produce the English church.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "The 6th century saw the final collapse of urban life across most of the former Western Roman Empire — archaeological evidence shows dramatic population decline, abandonment of cities, and the near-disappearance of long-distance trade in the Latin West.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5", "map_label": "Italy"}]}, {"id": "7th_century", "era": "Medieval (500–1300)", "label": "7th Century CE (600–699 CE)", "summary": "The 7th century is one of history's most transformative — the birth of Islam, the Arab conquests that reshaped the entire Middle East and North Africa within decades, and the permanent weakening of both Byzantium and Persia that set the stage for the medieval world.", "facts": [{"fact": "Muhammad received his first revelation around 610 CE in a cave outside Mecca, beginning the process that would produce the Quran and the religion of Islam — within a century, Islam would be the dominant faith from Spain to Central Asia.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Hijra (622 CE) — Muhammad's migration from Mecca to Medina — marks the beginning of the Islamic calendar and the founding of the first Muslim community-state, the umma.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "Muhammad died in 632 CE without clearly designating a successor, immediately triggering the succession crisis that produced the Sunni-Shia split — one of the most consequential religious divisions in history.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Battle of Yarmouk (636 CE) saw Arab Muslim forces decisively defeat the Byzantine army, permanently ending Roman control of Syria, Palestine, and Egypt — territories that had been Roman for 700 years.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "The Arab conquest of Persia (633–651 CE) ended the Sassanid Empire entirely — one of the ancient world's great powers collapsed within two decades of Muhammad's death, absorbed into the expanding Islamic caliphate.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "Jerusalem fell to Arab forces under Caliph Umar in 637 CE. Unlike the Roman destructions, Umar's conquest was notably peaceful — he guaranteed the safety of Christian and Jewish inhabitants and visited the Church of the Holy Sepulchre without praying inside, to prevent it being claimed as a mosque.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The assassination of Caliph Uthman (656 CE) and the subsequent First Fitna (Islamic Civil War) established the Sunni-Shia divide: supporters of Ali (Muhammad's cousin and son-in-law) became Shia Islam; those who accepted Muawiya's caliphate became Sunni.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Battle of Karbala (680 CE) — in which Hussein, grandson of Muhammad, was killed with 72 companions by Umayyad forces — became the defining martyr narrative of Shia Islam, commemorated annually in Ashura.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Umayyad Caliphate, established in Damascus after 661 CE, built the first great Islamic empire — stretching from Spain to Central Asia — and commissioned the Dome of the Rock in Jerusalem (691 CE), one of Islam's holiest sites.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Dome of the Rock, completed 691 CE, was built over the rock from which Muslims believe Muhammad ascended to heaven on the Night Journey — it is also the site of the Jewish Temple, making it one of the most contested sacred sites in the world.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Arab conquest of Egypt (639–642 CE) ended 700 years of Greco-Roman rule and began the Arabization and Islamization of North Africa — transforming the region's language, culture, and religion over the following centuries.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Quran was compiled into a standardized written text under Caliph Uthman (~650 CE) — before this, it existed primarily in oral form and in scattered written fragments. The 'Uthmanic codex' remains the standard text used today.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "Tom Holland's 'Dominion' argues that the Islamic conquest fundamentally challenged Christianity's claim to universal truth — the rapid success of Islam forced Christian theologians to rethink the relationship between faith, history, and divine providence.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Battle of Tours/Poitiers (732 CE — technically 8th century) halted Arab expansion into Western Europe, but by 700 CE Arab forces had already crossed into Spain (711 CE begins) — the Iberian Peninsula would be partially Islamic for nearly 800 years.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Byzantine-Arab Wars of the 7th century permanently reduced Byzantium to a rump state centered on Anatolia and the Balkans — it survived, but never recovered its former breadth or military strength.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "The Lombards invaded Italy in 568 CE and controlled much of the peninsula by 600 CE, creating a fragmented Italy of competing Lombard, Byzantine, and papal territories that would persist until the 19th century.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "Heraclius (610–641 CE) was the Byzantine emperor who defeated Persia in a near-miraculous comeback (627 CE), only to see his life's work immediately swept away by the Arab conquests — history's cruellest reversal of fortune for a victorious general.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "The Synod of Whitby (664 CE) settled the conflict between Roman and Celtic Christianity in England, choosing Rome's dating of Easter over the Irish tradition — aligning England with continental Christendom.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "Mu'awiya I, founder of the Umayyad dynasty, transformed the Islamic caliphate from a tribal Arab confederation into a sophisticated imperial administration — borrowing Byzantine and Persian bureaucratic techniques.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "By 700 CE, Arabic was becoming the administrative language of a vast empire — a linguistic unification that accelerated the translation of Greek scientific and philosophical texts into Arabic, preserving and transmitting ancient knowledge to both the Islamic world and, eventually, medieval Europe.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}]}, {"id": "8th_century", "era": "Medieval (500–1300)", "label": "8th Century CE (700–799 CE)", "summary": "The 8th century sees Islam's expansion reach its limits, Charlemagne forge a new Christian empire in the West, and the Islamic Golden Age begin its extraordinary flowering of science, philosophy, and medicine that would preserve and transmit ancient knowledge.", "facts": [{"fact": "The Arab conquest of the Iberian Peninsula began in 711 CE when Tariq ibn Ziyad crossed from North Africa — within seven years, most of Spain and Portugal was under Muslim rule, beginning the period known as Al-Andalus.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Battle of Tours/Poitiers (732 CE) halted the Arab advance into Francia — Charles Martel's Frankish forces defeated an Umayyad raiding force. Tom Holland notes it was less civilization-defining than later legend claimed, but did mark the effective northern limit of Islamic expansion in Europe.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Abbasid Revolution (750 CE) overthrew the Umayyad Caliphate, shifting Islam's center of gravity from Damascus to Baghdad — the new dynasty was more cosmopolitan, incorporating Persian administrative traditions and opening the Islamic world to broader intellectual exchange.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=33.3,44.4&zoom=7&size=280x180&markers=33.3,44.4,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=41.9,30.799999999999997,46.9,35.8&layer=mapnik&marker=33.3,44.4", "map_label": "Baghdad, Iraq"}, {"fact": "Baghdad was founded in 762 CE by Caliph Al-Mansur as the Abbasid capital — within a generation it became the world's largest city, a cosmopolitan hub of trade, scholarship, and culture with over a million inhabitants.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=33.3,44.4&zoom=7&size=280x180&markers=33.3,44.4,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=41.9,30.799999999999997,46.9,35.8&layer=mapnik&marker=33.3,44.4", "map_label": "Baghdad, Iraq"}, {"fact": "The House of Wisdom (Bayt al-Hikma) in Baghdad, established in the late 8th century, became the center of the Islamic Golden Age — scholars translated Greek, Persian, and Indian texts into Arabic, preserving Aristotle, Euclid, and Galen for future generations.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=33.3,44.4&zoom=7&size=280x180&markers=33.3,44.4,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=41.9,30.799999999999997,46.9,35.8&layer=mapnik&marker=33.3,44.4", "map_label": "Baghdad, Iraq"}, {"fact": "Charlemagne (768–814 CE) united most of Western Europe under Frankish rule through decades of military campaigns — against the Saxons, Lombards, Avars, and Spanish Muslims — creating the largest Western European state since Rome.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "On Christmas Day, 800 CE, Pope Leo III crowned Charlemagne 'Emperor of the Romans' in St. Peter's Basilica — a deliberate assertion that Western Christendom had its own emperor, independent of (and rival to) the Byzantine emperor in Constantinople.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "The Iconoclasm Controversy (726–843 CE) split the Byzantine Empire and widened the divide between Eastern and Western Christianity — Emperor Leo III ordered the destruction of religious images; the papacy and most of the West rejected this, deepening the rift that would produce the Great Schism.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "The Viking Age began around 793 CE with the raid on Lindisfarne monastery in northeastern England — inaugurating two centuries of Norse expansion, raiding, trading, and settlement that reshaped northern Europe.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "Al-Andalus (Muslim Spain) under the Umayyad emirate became one of Europe's most sophisticated civilizations — Córdoba rivaled Constantinople and Baghdad in population, libraries, and intellectual culture, hosting Jewish, Christian, and Muslim scholars together.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "The Carolingian Renaissance under Charlemagne revived literacy, scholarship, and standardized Latin script across Western Europe — the minuscule script developed at Charlemagne's court is the direct ancestor of modern lowercase letters.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=46.2,2.2&zoom=5&size=280x180&markers=46.2,2.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.8,36.2,12.2,56.2&layer=mapnik&marker=46.2,2.2", "map_label": "France"}, {"fact": "Charles Martel's victory at Tours led to a Frankish military revolution — the rise of heavily armored cavalry (knights) financed by grants of land (the origin of feudalism) that would define European warfare and society for centuries.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=38.9,-95.7&zoom=4&size=280x180&markers=38.9,-95.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-115.7,18.9,-75.7,58.9&layer=mapnik&marker=38.9,-95.7", "map_label": "United States"}, {"fact": "The Tang Dynasty of China (618–907 CE) reached its golden age in the 8th century under Emperor Xuanzong — a cosmopolitan empire of 80 million people, China was simultaneously the world's most advanced civilization in poetry, painting, and ceramic arts.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "The Battle of Talas River (751 CE) pitted Arab Abbasid forces against the Tang Chinese army in Central Asia — the Arabs won, but more significantly, Chinese papermaking technology spread westward through captured craftsmen, eventually transforming Islamic and European learning.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=33.3,44.4&zoom=7&size=280x180&markers=33.3,44.4,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=41.9,30.799999999999997,46.9,35.8&layer=mapnik&marker=33.3,44.4", "map_label": "Baghdad, Iraq"}, {"fact": "The Umayyad emirate of Córdoba (756 CE) was established by Abd al-Rahman I, the sole Umayyad survivor of the Abbasid massacre — creating an independent Muslim Spain that refused to recognize the Abbasid caliphate in Baghdad.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=33.3,44.4&zoom=7&size=280x180&markers=33.3,44.4,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=41.9,30.799999999999997,46.9,35.8&layer=mapnik&marker=33.3,44.4", "map_label": "Baghdad, Iraq"}, {"fact": "Offa of Mercia (757–796 CE), the most powerful Anglo-Saxon king before Alfred the Great, built Offa's Dyke — an 80-mile earthwork barrier along the Welsh border still visible today — and standardized English coinage.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=3&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-10.0,5.0,50.0,65.0&layer=mapnik&marker=35.0,20.0", "map_label": "The Mediterranean / World"}, {"fact": "The Khazar Khaganate, a Turkic empire dominating the steppes north of the Caucasus, converted to Judaism in the 8th century — one of history's most unusual religious conversions, creating a Jewish state between Christian Byzantium and Islamic Persia.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "Empress Wu Zetian (690–705 CE), the only woman to rule China in her own name, expanded the Tang empire, reformed the civil service examination, and patronized Buddhism — her reign remains deeply controversial in Chinese historiography.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "The development of Arabic numerals (originally Indian) in the 8th century Islamic world — and their eventual transmission to Europe via Al-Andalus — was one of the most consequential mathematical transfers in history, making modern arithmetic and algebra possible.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "By 800 CE, the medieval world had taken its essential shape: a fragmented Latin Christian West under Charlemagne, a shrinking but resilient Byzantine East, and a vast, sophisticated Islamic civilization stretching from Spain to Central Asia — three civilizations that would interact, conflict, and borrow from each other for centuries.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}]}, {"id": "9th_century", "era": "Medieval (500–1300)", "label": "9th Century CE (800–899 CE)", "summary": "The 9th century sees Charlemagne's empire fragment, the Vikings reshape northern Europe, Alfred the Great defend England, and the Islamic Golden Age produce its greatest scientists and philosophers — while Byzantine missionaries bring Christianity and literacy to the Slavic world.", "facts": [{"fact": "Charlemagne died in 814 CE and his empire was divided among his grandsons by the Treaty of Verdun (843 CE) into three kingdoms — West Francia (France), East Francia (Germany), and Middle Francia — the political geography of modern Europe begins here.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=46.2,2.2&zoom=5&size=280x180&markers=46.2,2.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.8,36.2,12.2,56.2&layer=mapnik&marker=46.2,2.2", "map_label": "France"}, {"fact": "Alfred the Great (871–899 CE) defended England against the Great Heathen Army of Vikings, negotiated the Danelaw (Viking-controlled northern England), and launched a remarkable cultural revival — translating Latin texts into Old English and founding schools.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "The Great Heathen Army (865 CE) was a massive Viking force that conquered most of Anglo-Saxon England within a decade — only Alfred's Wessex survived, making him the only English king to earn the title 'Great.'", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "The Rus' people — Scandinavian traders and warriors who gave their name to Russia — established the city of Novgorod around 862 CE and founded the Rurik dynasty, the origin state of what became Russia, Ukraine, and Belarus.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=55.8,37.6&zoom=4&size=280x180&markers=55.8,37.6,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=17.6,35.8,57.6,75.8&layer=mapnik&marker=55.8,37.6", "map_label": "Russia"}, {"fact": "Cyril and Methodius, Byzantine missionaries sent to the Slavic peoples in 863 CE, created the Glagolitic alphabet (ancestor of Cyrillic) and translated the Bible into Old Church Slavonic — bringing literacy and Orthodox Christianity to Eastern Europe.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "Al-Khwarizmi (~780–850 CE) wrote 'Al-Kitab al-mukhtasar fi hisab al-jabr' in Baghdad — the book that gave us the word 'algebra.' His name also gives us 'algorithm.' His work synthesized Greek and Indian mathematics into a new system.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=33.3,44.4&zoom=7&size=280x180&markers=33.3,44.4,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=41.9,30.799999999999997,46.9,35.8&layer=mapnik&marker=33.3,44.4", "map_label": "Baghdad, Iraq"}, {"fact": "The philosopher Al-Kindi (~801–873 CE) was the first great Islamic philosopher to systematically reconcile Greek philosophy with Islamic theology — his work on optics, cryptography, and music theory was centuries ahead of the European West.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Viking settlement of Iceland began around 874 CE — establishing what would become the world's oldest surviving parliament (the Althing, 930 CE) and a literary culture that produced the sagas.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=62.0,15.0&zoom=4&size=280x180&markers=62.0,15.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.0,42.0,35.0,82.0&layer=mapnik&marker=62.0,15.0", "map_label": "Scandinavia"}, {"fact": "The Carolingian Empire's fragmentation produced the feudal system in its mature form — local lords providing military service to regional counts, who served kings, in exchange for land grants (fiefs). The inability of kings to project central power made local strongmen essential.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "The siege of Paris by Vikings (885–886 CE) demonstrated both the Vikings' reach and the Carolingian dynasty's weakness — King Charles the Fat paid the Vikings to leave rather than fight, and was deposed the following year.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=46.2,2.2&zoom=5&size=280x180&markers=46.2,2.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.8,36.2,12.2,56.2&layer=mapnik&marker=46.2,2.2", "map_label": "France"}, {"fact": "Emperor Basil I (867–886 CE) founded the Macedonian dynasty, reviving Byzantine power — his successors would preside over a Byzantine cultural golden age and military expansion that temporarily recovered much of the territory lost to the Arabs.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "The Aghlabid conquest of Sicily from Byzantium (827–902 CE) created a sophisticated Islamic emirate that became one of the Mediterranean's most prosperous and cultured societies, blending Arab, Byzantine, and Norman influences.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "Ibn Ishaq's biography of Muhammad, compiled in the 8th century and reworked by Ibn Hisham in the 9th, became the standard life of the Prophet — shaping how Muslims understood Islamic origins for centuries.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The 9th-century Islamic scholar Al-Battani produced astronomical tables of extraordinary accuracy, correcting Ptolemy's calculations and determining the solar year's length to within seconds — his work was used by Copernicus 700 years later.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Great Schism between Rome and Constantinople was prefigured by the Photian Schism (863–867 CE) — a conflict over the appointment of Patriarch Photius that exposed the deepening theological and political divide between Eastern and Western Christianity.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "The Abbasid Caliphate began its political decline in the 9th century as Turkish slave-soldiers (ghulam/mamluks) became the real power behind the throne — the caliph in Baghdad increasingly a figurehead while Turkish commanders controlled the army.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=33.3,44.4&zoom=7&size=280x180&markers=33.3,44.4,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=41.9,30.799999999999997,46.9,35.8&layer=mapnik&marker=33.3,44.4", "map_label": "Baghdad, Iraq"}, {"fact": "The Kingdom of Asturias in northern Spain, the Christian remnant after the Muslim conquest, began the Reconquista — the slow, centuries-long effort to reclaim the Iberian Peninsula for Christianity, finally completed in 1492.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "Photius of Constantinople (~810–893 CE), one of the most learned men of the medieval world, compiled the 'Bibliotheca' — summaries of 280 books, many now lost, preserving the titles and contents of classical works that would otherwise be unknown.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "The Carolingian minuscule script, standardized under Charlemagne and refined in the 9th century, became the basis for modern lowercase letters — and was revived by Renaissance humanists who mistook it for classical Roman script.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=46.2,2.2&zoom=5&size=280x180&markers=46.2,2.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.8,36.2,12.2,56.2&layer=mapnik&marker=46.2,2.2", "map_label": "France"}, {"fact": "By 900 CE, the outlines of medieval Europe were clear: a patchwork of feudal kingdoms under the Latin church in the West, an Orthodox Byzantine civilization in the East, a sophisticated Islamic world from Spain to Central Asia, and a vast Viking diaspora reshaping the North Atlantic.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}]}, {"id": "10th_century", "era": "Medieval (500–1300)", "label": "10th Century CE (900–999 CE)", "summary": "The 10th century sees Otto I forge the Holy Roman Empire, the Vikings discover America, the Song Dynasty revive Chinese civilization, and the Byzantine Empire reach its medieval peak — while the Islamic world begins to fragment and the Slavic kingdoms of Eastern Europe take shape.", "facts": [{"fact": "Otto I of Germany (936–973 CE) defeated the Magyars at the Battle of Lechfeld (955 CE), was crowned Holy Roman Emperor by Pope John XII in 962 CE, and established the political framework that would dominate Central Europe for nearly a thousand years.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.2,10.5&zoom=5&size=280x180&markers=51.2,10.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=0.5,41.2,20.5,61.2&layer=mapnik&marker=51.2,10.5", "map_label": "Germany"}, {"fact": "The Holy Roman Empire — neither holy, nor Roman, nor an empire (as Voltaire later quipped) — was a loose confederation of German, Italian, and Central European territories under an elected emperor whose authority was constantly contested by princes and popes.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.2,10.5&zoom=5&size=280x180&markers=51.2,10.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=0.5,41.2,20.5,61.2&layer=mapnik&marker=51.2,10.5", "map_label": "Germany"}, {"fact": "Leif Eriksson reached North America around 1000 CE (technically just after the century's end), establishing a settlement at L'Anse aux Meadows in Newfoundland — the first confirmed European contact with the Americas, 500 years before Columbus.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=38.9,-95.7&zoom=4&size=280x180&markers=38.9,-95.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-115.7,18.9,-75.7,58.9&layer=mapnik&marker=38.9,-95.7", "map_label": "United States"}, {"fact": "The Christianization of Scandinavia accelerated in the 10th century — Harald Bluetooth of Denmark converted around 960 CE, beginning the process that transformed Viking raiders into Christian kingdoms integrated into European civilization.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=62.0,15.0&zoom=4&size=280x180&markers=62.0,15.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.0,42.0,35.0,82.0&layer=mapnik&marker=62.0,15.0", "map_label": "Scandinavia"}, {"fact": "The Song Dynasty (960–1279 CE) reunified China after decades of fragmentation and inaugurated one of the most commercially and intellectually sophisticated civilizations in world history — printing, paper money, the compass, and gunpowder all developed or spread in this era.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "Al-Andalus under Abd al-Rahman III (912–961 CE) reached its golden age — Córdoba became Europe's largest city, with a library of 400,000 volumes, public baths, and street lighting, while most of Europe lived in relative poverty and illiteracy.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=37.9,-4.8&zoom=6&size=280x180&markers=37.9,-4.8,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-9.8,32.9,0.20000000000000018,42.9&layer=mapnik&marker=37.9,-4.8", "map_label": "Al-Andalus (Spain)"}, {"fact": "The Byzantine Empire under Basil II 'the Bulgar-Slayer' (976–1025 CE) reached its medieval peak — reconquering Bulgaria, Armenia, and parts of Syria, and cementing Byzantine cultural dominance over Orthodox Eastern Europe.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "Vladimir I of Kiev (980–1015 CE) converted to Orthodox Christianity in 988 CE and forcibly baptized his subjects in the Dnieper River — the Christianization of Rus' that made Russia, Ukraine, and Belarus permanently Orthodox.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=55.8,37.6&zoom=4&size=280x180&markers=55.8,37.6,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=17.6,35.8,57.6,75.8&layer=mapnik&marker=55.8,37.6", "map_label": "Russia"}, {"fact": "The Magyar invasions of the 9th–10th centuries terrorized Europe, raiding deep into France, Italy, and the Balkans — until their defeat at Lechfeld (955 CE) forced their settlement in Hungary and eventual Christianization under Stephen I (1000 CE).", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=46.2,2.2&zoom=5&size=280x180&markers=46.2,2.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.8,36.2,12.2,56.2&layer=mapnik&marker=46.2,2.2", "map_label": "France"}, {"fact": "Gerbert of Aurillac (~946–1003 CE), who became Pope Sylvester II, introduced Arabic numerals and the abacus to Western Europe — he was so learned that contemporaries suspected him of making a pact with the devil.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Fatimid Caliphate, established in North Africa in 909 CE and conquering Egypt in 969 CE, built Cairo as its capital and established Al-Azhar University — still one of the world's great centers of Islamic learning.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Buyid dynasty of Persia captured Baghdad in 945 CE and effectively ended Abbasid political power — the Abbasid caliph became a purely religious figurehead while real power lay with Persian and Turkish military dynasties.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=33.3,44.4&zoom=7&size=280x180&markers=33.3,44.4,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=41.9,30.799999999999997,46.9,35.8&layer=mapnik&marker=33.3,44.4", "map_label": "Baghdad, Iraq"}, {"fact": "Ibn al-Haytham (Alhazen, ~965–1040 CE), working in Cairo, wrote the 'Book of Optics' — the most important work on vision and light before Newton, establishing the experimental method of scientific investigation centuries before the European scientific revolution.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=30.0,31.2&zoom=6&size=280x180&markers=30.0,31.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.2,25.0,36.2,35.0&layer=mapnik&marker=30.0,31.2", "map_label": "Egypt"}, {"fact": "The development of feudalism in its classic form across 10th-century Europe created a world of castles, knights, serfs, and manors — a response to the inability of weak kings to provide security against Vikings, Magyars, and Saracen raiders.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=62.0,15.0&zoom=4&size=280x180&markers=62.0,15.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.0,42.0,35.0,82.0&layer=mapnik&marker=62.0,15.0", "map_label": "Scandinavia"}, {"fact": "The Cluny Reform movement, originating at the monastery of Cluny in Burgundy (founded 910 CE), sought to free monasteries from lay control and reform the church — the beginning of a religious reform movement that would eventually produce the papal revolution of the 11th century.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5", "map_label": "Italy"}, {"fact": "The Iceland Althing, established around 930 CE, was the world's first parliament — a general assembly of free men that made law and settled disputes, preserved in the Icelandic sagas.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=62.0,15.0&zoom=4&size=280x180&markers=62.0,15.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.0,42.0,35.0,82.0&layer=mapnik&marker=62.0,15.0", "map_label": "Scandinavia"}, {"fact": "The Kingdom of Poland was established by Mieszko I (~960–992 CE), who converted to Christianity in 966 CE — tying Poland permanently to the Latin West and beginning a nation that would play a pivotal role in European history.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=45.0,18.0&zoom=5&size=280x180&markers=45.0,18.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=8.0,35.0,28.0,55.0&layer=mapnik&marker=45.0,18.0", "map_label": "Central/Eastern Europe"}, {"fact": "The collapse of the Abbasid center gave rise to regional Islamic dynasties — the Samanids in Persia, the Hamdanids in Syria, the Ikhshidids in Egypt — each cultivating Persian or Arabic literary culture independently, producing a golden age of Islamic poetry and philosophy.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=33.3,44.4&zoom=7&size=280x180&markers=33.3,44.4,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=41.9,30.799999999999997,46.9,35.8&layer=mapnik&marker=33.3,44.4", "map_label": "Baghdad, Iraq"}, {"fact": "Rhazes (Al-Razi, ~854–925 CE), the greatest physician of the medieval Islamic world, wrote 'Al-Hawi' — a 25-volume medical encyclopedia that remained a standard European medical text until the 17th century. He was the first to distinguish smallpox from measles.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "By 1000 CE, the world's population had recovered to roughly 300 million — still below its Roman peak. The world was divided among Chinese, Islamic, Byzantine, and Latin Christian civilizations, with a vast zone of steppe nomads connecting them all.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}]}, {"id": "11th_century", "era": "Medieval (500–1300)", "label": "11th Century CE (1000–1099 CE)", "summary": "The 11th century brings the Great Schism between Rome and Constantinople, the Norman Conquest of England, and the First Crusade — three events that permanently shaped the religious and political geography of Europe and the Middle East.", "facts": [{"fact": "The Great Schism of 1054 CE formally divided Christianity into Roman Catholic and Eastern Orthodox branches — Pope Leo IX and Patriarch Michael Cerularius excommunicated each other over disputes about papal authority, the filioque clause, and clerical celibacy.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5", "map_label": "Italy"}, {"fact": "The Norman Conquest of England (1066 CE) — William the Conqueror's victory at the Battle of Hastings — was one of the most consequential events in English history, replacing the Anglo-Saxon elite with a French-speaking Norman aristocracy and transforming the English language.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "The Domesday Book (1086 CE), commissioned by William the Conqueror, was a comprehensive survey of England's landholdings and resources — one of the most remarkable administrative achievements of the medieval world and an invaluable historical record.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "The First Crusade (1096–1099 CE) was called by Pope Urban II in 1095 CE — a military expedition to recapture Jerusalem from Muslim rule that succeeded beyond all expectation, capturing Jerusalem in 1099 CE after enormous violence.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Crusaders' capture of Jerusalem in July 1099 CE was followed by a massacre of Muslim and Jewish inhabitants that shocked even contemporaries — Tom Holland notes it as a moment when the Christian ideal of holy war collided catastrophically with its human consequences.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Battle of Manzikert (1071 CE) was a catastrophic Byzantine defeat by the Seljuk Turks — the emperor Romanos IV was captured, Anatolia was lost, and the Byzantine Empire entered a terminal decline from which it never fully recovered.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "The Seljuk Turks, a Turkic dynasty that converted to Sunni Islam, conquered Baghdad in 1055 CE and took control of the Abbasid caliphate — revitalizing Sunni Islam and eventually pushing the Byzantines out of Anatolia.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "Anselm of Canterbury (~1033–1109 CE) developed the ontological argument for God's existence — the idea that God, as the greatest conceivable being, must exist because existence is a perfection. It remains one of philosophy's most debated arguments.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=20.0,0.0&zoom=2&size=280x180&markers=20.0,0.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-60.0,-40.0,60.0,80.0&layer=mapnik&marker=20.0,0.0", "map_label": "The Modern World"}, {"fact": "The Investiture Controversy (1076–1122 CE) pitted Pope Gregory VII against Holy Roman Emperor Henry IV over the right to appoint (invest) bishops — Henry IV was famously forced to stand barefoot in snow at Canossa to beg papal forgiveness.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.2,10.5&zoom=5&size=280x180&markers=51.2,10.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=0.5,41.2,20.5,61.2&layer=mapnik&marker=51.2,10.5", "map_label": "Germany"}, {"fact": "Pope Gregory VII's Dictatus Papae (1075 CE) asserted sweeping papal supremacy — the pope could depose emperors, his legates outranked all bishops, and only the pope could call universal councils. It was the most radical assertion of papal power in history.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5", "map_label": "Italy"}, {"fact": "The scholar Avicenna (Ibn Sina, 980–1037 CE) wrote the 'Canon of Medicine' — a systematic medical encyclopedia that became the standard medical textbook in both Islamic and European universities for 600 years.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Song Dynasty's printing revolution — using movable type invented by Bi Sheng around 1040 CE — produced books on a scale previously impossible, accelerating literacy and intellectual exchange across China four centuries before Gutenberg.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "The Kingdom of Hungary under Stephen I (1000–1038 CE) became a Christian kingdom integrated into European civilization — its coronation crown, sent by Pope Sylvester II, remains a potent symbol of Hungarian national identity.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=45.0,18.0&zoom=5&size=280x180&markers=45.0,18.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=8.0,35.0,28.0,55.0&layer=mapnik&marker=45.0,18.0", "map_label": "Central/Eastern Europe"}, {"fact": "El Cid (Rodrigo Díaz de Vivar, ~1043–1099 CE) was a Castilian knight who fought for both Christian and Muslim rulers in Spain — his career exemplifies the complex, fluid religious boundaries of Reconquista-era Iberia, far from the simple clash of civilizations it is often portrayed as.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Viking settlement of Greenland, established by Erik the Red around 985 CE, was still flourishing in the 11th century — a reminder that the Norse world extended across the North Atlantic at a time when most Europeans never left their village.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=10.0,-30.0&zoom=3&size=280x180&markers=10.0,-30.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-60.0,-20.0,0.0,40.0&layer=mapnik&marker=10.0,-30.0", "map_label": "Age of Exploration"}, {"fact": "Omar Khayyam (~1048–1131 CE), the Persian mathematician and poet, solved cubic equations, reformed the Islamic calendar to extraordinary accuracy, and wrote the Rubaiyat — verses on wine, fate, and mortality that became famous in the West through Edward FitzGerald's 19th-century translation.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The founding of Bologna University around 1088 CE — the world's oldest university still in operation — reflected a growing demand for legal and theological education in a more complex European society.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=20.0,0.0&zoom=2&size=280x180&markers=20.0,0.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-60.0,-40.0,60.0,80.0&layer=mapnik&marker=20.0,0.0", "map_label": "The Modern World"}, {"fact": "The Almoravid dynasty, Berber reformers from the Sahara, invaded Al-Andalus in 1086 CE at the invitation of Muslim rulers threatened by the Christian Reconquista — replacing the sophisticated, pluralistic Umayyad culture with a stricter religious orthodoxy.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Norman Kingdom of Sicily, established in the late 11th century, became one of medieval Europe's most remarkable states — a multicultural society where Arabic, Greek, and Latin coexisted under Norman kings who patronized scholars of all three traditions.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "By 1100 CE, the Crusades had introduced Western Europeans to the vastly more sophisticated material and intellectual culture of the Islamic world — spices, silk, mathematics, philosophy, and medical knowledge that would fuel the Renaissance centuries later.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}]}, {"id": "12th_century", "era": "Medieval (500–1300)", "label": "12th Century CE (1100–1199 CE)", "summary": "The 12th century is the height of medieval civilization: the Crusader states in the Holy Land, the rise of Gothic architecture, the founding of universities, the rediscovery of Aristotle through Arabic translations, and the stories of Eleanor of Aquitaine and Thomas Becket.", "facts": [{"fact": "Eleanor of Aquitaine (~1122–1204 CE) was the most powerful woman in 12th-century Europe — queen of France, then queen of England, participant in the Second Crusade, and mother of Richard the Lionheart and King John. Her courts were centers of troubadour culture.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=31.8,35.2&zoom=6&size=280x180&markers=31.8,35.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=30.200000000000003,26.8,40.2,36.8&layer=mapnik&marker=31.8,35.2", "map_label": "Jerusalem"}, {"fact": "Thomas Becket, Archbishop of Canterbury, was murdered in his own cathedral in 1170 CE by knights acting on the wishes of King Henry II — his martyrdom made Canterbury the greatest pilgrimage site in England and forced Henry into public penance.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "The Second Crusade (1147–1149 CE), inspired partly by Bernard of Clairvaux's preaching, was a catastrophic failure — the crusaders besieged Damascus, a Muslim city that had been their ally, and retreated in humiliation.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "Saladin (Salah ad-Din, 1137–1193 CE), the Kurdish Muslim leader who unified Egypt and Syria, recaptured Jerusalem in 1187 CE — treating its inhabitants far more humanely than the crusaders had in 1099, in a contrast noted by contemporaries on both sides.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Third Crusade (1189–1192 CE), led by Richard I of England, Philip II of France, and Frederick Barbarossa of Germany, failed to recapture Jerusalem but negotiated Christian pilgrimage access — Richard and Saladin reached a grudging mutual respect across religious lines.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=31.8,35.2&zoom=6&size=280x180&markers=31.8,35.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=30.200000000000003,26.8,40.2,36.8&layer=mapnik&marker=31.8,35.2", "map_label": "Jerusalem"}, {"fact": "The founding of the Knights Templar (1119 CE) and Knights Hospitaller created the first military-religious orders — warrior monks who combined the ideals of crusading and monasticism, becoming major military and financial powers in medieval Europe.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "Peter Abelard (~1079–1142 CE), the brilliant and controversial philosopher and theologian, pioneered scholasticism — the use of logical analysis to resolve theological disputes. His love affair with Héloïse and subsequent castration by her uncle is one of history's most famous tragedies.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=20.0,0.0&zoom=2&size=280x180&markers=20.0,0.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-60.0,-40.0,60.0,80.0&layer=mapnik&marker=20.0,0.0", "map_label": "The Modern World"}, {"fact": "The 12th-century Renaissance saw European scholars travel to Toledo, Palermo, and Antioch to translate Arabic texts of Aristotle, Euclid, and Ptolemy into Latin — triggering an intellectual revolution that transformed European philosophy and science.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "Gothic architecture emerged in the Île-de-France around 1140 CE — pointed arches, ribbed vaults, and flying buttresses allowed unprecedented height and light in stone buildings. Notre-Dame de Paris, begun in 1163 CE, is its greatest monument.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=46.2,2.2&zoom=5&size=280x180&markers=46.2,2.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.8,36.2,12.2,56.2&layer=mapnik&marker=46.2,2.2", "map_label": "France"}, {"fact": "Hildegard of Bingen (1098–1179 CE) was a German abbess, composer, theologian, and natural philosopher — one of the most remarkable figures of the Middle Ages, whose mystical visions, medical writings, and musical compositions are still performed today.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=3&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-10.0,5.0,50.0,65.0&layer=mapnik&marker=35.0,20.0", "map_label": "The Mediterranean / World"}, {"fact": "The University of Oxford was established in the late 12th century (exact date disputed), joining Bologna and Paris as centers of European higher learning — the university model of organized, degree-granting scholarly communities was one of the Middle Ages' great institutional innovations.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=46.2,2.2&zoom=5&size=280x180&markers=46.2,2.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.8,36.2,12.2,56.2&layer=mapnik&marker=46.2,2.2", "map_label": "France"}, {"fact": "Frederick Barbarossa (1122–1190 CE), Holy Roman Emperor, dominated 12th-century European politics — his conflicts with Pope Alexander III and Italian city-states defined the centuries-long struggle between imperial and papal authority.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.2,10.5&zoom=5&size=280x180&markers=51.2,10.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=0.5,41.2,20.5,61.2&layer=mapnik&marker=51.2,10.5", "map_label": "Germany"}, {"fact": "The Almohad dynasty replaced the Almoravids in North Africa and Al-Andalus — their strict religious orthodoxy drove Jewish and Christian scholars (including Maimonides) into exile, ending the multicultural golden age of Islamic Spain.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "Maimonides (Moses ben Maimon, 1138–1204 CE), the greatest medieval Jewish philosopher, fled Almohad persecution from Córdoba to Cairo, where he wrote the 'Guide for the Perplexed' — reconciling Aristotelian philosophy with Jewish theology, influencing Christian scholasticism.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=30.0,31.2&zoom=6&size=280x180&markers=30.0,31.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.2,25.0,36.2,35.0&layer=mapnik&marker=30.0,31.2", "map_label": "Egypt"}, {"fact": "The Magna Carta's antecedents developed in the 12th century — Henry I's Coronation Charter (1100 CE) made early promises to limit royal arbitrary power that would eventually lead to Magna Carta in 1215.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "The Troubadour tradition of southern France created the concept of courtly love — a new poetic and musical culture celebrating romantic love, female virtue, and refined manners that transformed European literature and eventually produced Dante, Petrarch, and Shakespeare.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=46.2,2.2&zoom=5&size=280x180&markers=46.2,2.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.8,36.2,12.2,56.2&layer=mapnik&marker=46.2,2.2", "map_label": "France"}, {"fact": "The Song Dynasty's commercial revolution created the world's first paper money, sophisticated credit systems, and urban markets — China was by far the world's most economically advanced society in the 12th century.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "Averroës (Ibn Rushd, 1126–1198 CE), the great Muslim philosopher of Córdoba, wrote the definitive commentaries on Aristotle — transmitted to Europe in Latin translation, they sparked the scholastic movement and deeply influenced Aquinas.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Byzantine Empire under the Komnenian dynasty experienced a cultural and military revival — but the Fourth Crusade looming in 1204 CE would deliver a blow from which it never recovered.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "By 1200 CE, Europe had built over 80 cathedrals and thousands of churches in the Gothic style — a building boom unprecedented since ancient Rome, representing an extraordinary concentration of resources, skill, and faith.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5", "map_label": "Italy"}]}, {"id": "13th_century", "era": "Medieval (500–1300)", "label": "13th Century CE (1200–1299 CE)", "summary": "The 13th century is both the apex and the beginning of the end of medieval civilization: the Mongol conquests reshape Eurasia, the Fourth Crusade sacks Constantinople, Thomas Aquinas synthesizes faith and reason, and Marco Polo opens Europe's eyes to China.", "facts": [{"fact": "Genghis Khan (1162–1227 CE) united the Mongol tribes and launched the greatest land empire in history — by 1227 CE, the Mongols controlled more territory than any previous empire, and by 1279 CE their descendants ruled from Korea to Poland to Persia.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=32.4,53.7&zoom=5&size=280x180&markers=32.4,53.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=43.7,22.4,63.7,42.4&layer=mapnik&marker=32.4,53.7", "map_label": "Persia (modern Iran)"}, {"fact": "The Mongol conquests were the most destructive military campaigns in pre-modern history — the sack of Baghdad in 1258 CE ended the Abbasid Caliphate and destroyed the House of Wisdom, killing hundreds of thousands and ending the Islamic Golden Age's intellectual center.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=33.3,44.4&zoom=7&size=280x180&markers=33.3,44.4,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=41.9,30.799999999999997,46.9,35.8&layer=mapnik&marker=33.3,44.4", "map_label": "Baghdad, Iraq"}, {"fact": "The Fourth Crusade (1202–1204 CE) never reached the Holy Land — diverted by Venetian financial interests, it sacked the Christian city of Constantinople in 1204 CE, establishing a Latin Empire and permanently mortally wounding the Byzantine state.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "Magna Carta (1215 CE), forced on King John by rebellious English barons, established for the first time that the king was subject to the rule of law — its clauses protecting due process became the foundation of English constitutional law and eventually influenced the US Constitution.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "Thomas Aquinas (1225–1274 CE) wrote the 'Summa Theologica,' the greatest systematic synthesis of Christian theology and Aristotelian philosophy — his work defined Catholic intellectual tradition for centuries and earned him the title 'Doctor Angelicus.'", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=3&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-10.0,5.0,50.0,65.0&layer=mapnik&marker=35.0,20.0", "map_label": "The Mediterranean / World"}, {"fact": "Francis of Assisi (1181–1226 CE) founded the Franciscan order — a radical embrace of apostolic poverty, care for the poor, and love of nature that offered a different model of Christian life from the wealthy established church. His 'Canticle of the Sun' is the first great poem in the Italian vernacular.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=3&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-10.0,5.0,50.0,65.0&layer=mapnik&marker=35.0,20.0", "map_label": "The Mediterranean / World"}, {"fact": "The Albigensian Crusade (1209–1229 CE) was called by Pope Innocent III against the Cathar heretics of southern France — the first crusade against fellow Christians, marked by mass atrocities and the famous command 'Kill them all, God will know his own.'", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=31.8,35.2&zoom=6&size=280x180&markers=31.8,35.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=30.200000000000003,26.8,40.2,36.8&layer=mapnik&marker=31.8,35.2", "map_label": "Jerusalem"}, {"fact": "The Mongol invasion of Europe (1241 CE) devastated Poland and Hungary — the Mongols defeated every European army they faced, and only the death of Khan Ögedei halted the westward advance. Had they continued, European history would have been unrecognizable.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=47.9,106.9&zoom=4&size=280x180&markers=47.9,106.9,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=86.9,27.9,126.9,67.9&layer=mapnik&marker=47.9,106.9", "map_label": "Mongolia"}, {"fact": "Marco Polo traveled to China (1271–1295 CE) and spent 17 years at the court of Kublai Khan — his account of China's wealth, sophistication, and size astonished Europeans and inspired later explorers including Columbus, who carried a copy of his book.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=47.9,106.9&zoom=4&size=280x180&markers=47.9,106.9,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=86.9,27.9,126.9,67.9&layer=mapnik&marker=47.9,106.9", "map_label": "Mongolia"}, {"fact": "The Inquisition, formalized by Pope Gregory IX in 1231 CE, established a permanent ecclesiastical court to investigate and prosecute heresy — using torture (authorized by Pope Innocent IV in 1252 CE) to extract confessions.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=8.0,21.0&zoom=4&size=280x180&markers=8.0,21.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=1.0,-12.0,41.0,28.0&layer=mapnik&marker=8.0,21.0", "map_label": "Africa"}, {"fact": "Roger Bacon (~1214–1294 CE), the English Franciscan friar, advocated for experimental science and predicted flying machines, motorized ships, and microscopes — centuries ahead of his time, his work blended gen
