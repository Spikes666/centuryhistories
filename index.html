<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Century Histories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e8e0d0;
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(160deg, #0f0a1a 0%, #1a0f2e 100%);
      border-bottom: 2px solid #c9184a;
      padding: 36px 24px 28px;
      text-align: center;
    }
    .header-day {
      font-size: 11px;
      color: #666;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .header-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(28px, 7vw, 44px);
      font-style: italic;
      color: #f5edd8;
      margin-bottom: 8px;
      line-height: 1.15;
    }
    .header-era {
      font-size: 14px;
      color: #c9184a;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .header-date {
      font-size: 12px;
      color: #444;
      font-style: italic;
    }

    /* ── Nav tabs ── */
    .nav {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 20px 20px 0;
      max-width: 680px;
      margin: 0 auto;
    }
    .nav-btn {
      background: none;
      border: 1px solid #2a2a3a;
      border-radius: 20px;
      color: #888;
      cursor: pointer;
      font-family: 'Lora', Georgia, serif;
      font-size: 12px;
      letter-spacing: 0.1em;
      padding: 6px 16px;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .nav-btn:hover { border-color: #c9184a44; color: #c0b8a8; }
    .nav-btn.active { border-color: #c9184a; color: #c9184a; }

    /* ── Century browser ── */
    .century-nav {
      display: none;
      max-width: 680px;
      margin: 24px auto 0;
      padding: 0 20px;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .century-nav.visible { display: flex; }
    .century-btn {
      background: #111118;
      border: 1px solid #1e1e2e;
      border-radius: 20px;
      color: #888;
      cursor: pointer;
      font-family: 'Lora', Georgia, serif;
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 5px 14px;
      transition: all 0.2s;
    }
    .century-btn:hover { border-color: #c9184a44; color: #c0b8a8; }
    .century-btn.active { border-color: #c9184a; color: #c9184a; background: #1a0f1f; }

    /* ── Cards ── */
    .cards {
      max-width: 680px;
      margin: 0 auto;
      padding: 32px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .card {
      background: #111118;
      border: 1px solid #1e1e2e;
      border-radius: 14px;
      padding: 28px 24px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.5s ease forwards;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #c9184a44; }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .card-num {
      font-size: 10px;
      color: #c9184a;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .card-fact {
      font-size: 15px;
      line-height: 1.8;
      color: #c0b8a8;
    }

    /* ── Century summary card ── */
    .summary-card {
      background: linear-gradient(135deg, #0f0a1a, #1a0f2e);
      border: 1px solid #c9184a33;
      border-radius: 14px;
      padding: 28px 24px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }
    .summary-label {
      font-size: 10px;
      color: #c9184a;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .summary-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(18px, 4vw, 24px);
      font-style: italic;
      color: #f0e8d8;
      margin-bottom: 14px;
      line-height: 1.3;
    }
    .summary-text {
      font-size: 14px;
      line-height: 1.8;
      color: #9090a0;
      font-style: italic;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      margin-top: 48px;
      padding: 0 20px;
      font-size: 11px;
      color: #333;
      letter-spacing: 0.08em;
      line-height: 1.8;
    }
    .footer a {
      color: #c9184a;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }

    /* ── Loading / error ── */
    .state-msg {
      text-align: center;
      padding: 60px 20px;
      color: #444;
      font-style: italic;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-day" id="header-day">Loading…</div>
    <h1 class="header-title" id="header-title">Century Histories</h1>
    <div class="header-era" id="header-era"></div>
    <div class="header-date" id="header-date"></div>
  </div>

  <div class="nav">
    <button class="nav-btn active" id="btn-today" onclick="showToday()">Today</button>
    <button class="nav-btn" id="btn-browse" onclick="showBrowse()">Browse Centuries</button>
  </div>

  <div class="century-nav" id="century-nav"></div>

  <div class="cards" id="cards">
    <div class="state-msg">Loading flashcards…</div>
  </div>

  <div class="footer" id="footer">
    Sources: Misquoting Jesus / Bart Ehrman · The Rest is History (Holland &amp; Sandbrook)<br>
    Page refreshes daily at 8am CT
  </div>

<script>
  const FACTS_PER_DAY = 10;
  const START_DATE    = new Date('2025-01-01');

  let allData   = null;
  let allFacts  = [];
  let mode      = 'today';   // 'today' | 'browse'
  let activeCentury = 0;

  // ── Fetch content ──────────────────────────────────────────────────────────
  async function init() {
    try {
      const res = await fetch('flashcards/content.json');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allData = await res.json();

      // Flatten facts
      for (const century of allData.centuries) {
        for (const fact of century.facts) {
          allFacts.push({ century_label: century.label, century_summary: century.summary, fact });
        }
      }

      buildCenturyNav();
      renderToday();
    } catch (e) {
      document.getElementById('cards').innerHTML =
        `<div class="state-msg">Could not load flashcards.<br><small>${e.message}</small></div>`;
    }
  }

  // ── Day index ──────────────────────────────────────────────────────────────
  function getDayIndex() {
    const today = new Date();
    today.setHours(0,0,0,0);
    return Math.floor((today - START_DATE) / 86400000);
  }

  // ── Today's block ──────────────────────────────────────────────────────────
  function getTodaysFacts() {
    const total      = allFacts.length;
    const dayIndex   = getDayIndex();
    const blockStart = (dayIndex * FACTS_PER_DAY) % total;
    const blockEnd   = blockStart + FACTS_PER_DAY;
    if (blockEnd <= total) return allFacts.slice(blockStart, blockEnd);
    return [...allFacts.slice(blockStart), ...allFacts.slice(0, blockEnd - total)];
  }

  // ── Render today ───────────────────────────────────────────────────────────
  function renderToday() {
    const dayIndex  = getDayIndex();
    const totalDays = Math.ceil(allFacts.length / FACTS_PER_DAY);
    const cycleDay  = (dayIndex % totalDays) + 1;
    const block     = getTodaysFacts();

    const centuries = [...new Set(block.map(f => f.century_label))];
    const era       = centuries.join(' & ');
    const dateStr   = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

    document.getElementById('header-day').textContent   = `Day ${cycleDay} of ${totalDays} · Century Histories`;
    document.getElementById('header-title').textContent = era;
    document.getElementById('header-era').textContent   = '';
    document.getElementById('header-date').textContent  = dateStr;
    document.getElementById('century-nav').classList.remove('visible');

    const cards = document.getElementById('cards');
    cards.innerHTML = block.map((item, i) => `
      <div class="card" style="animation-delay:${i * 0.08}s">
        <div class="card-num">Fact ${i + 1} of ${block.length}</div>
        <p class="card-fact">${item.fact}</p>
      </div>
    `).join('');
  }

  // ── Build century nav ──────────────────────────────────────────────────────
  function buildCenturyNav() {
    const nav = document.getElementById('century-nav');
    nav.innerHTML = allData.centuries.map((c, i) => `
      <button class="century-btn${i === 0 ? ' active' : ''}" onclick="selectCentury(${i})">${c.label}</button>
    `).join('');
  }

  // ── Select century ─────────────────────────────────────────────────────────
  function selectCentury(idx) {
    activeCentury = idx;
    document.querySelectorAll('.century-btn').forEach((b, i) =>
      b.classList.toggle('active', i === idx));
    renderCentury(idx);
  }

  // ── Render century browser ─────────────────────────────────────────────────
  function renderCentury(idx) {
    const century = allData.centuries[idx];

    document.getElementById('header-day').textContent   = 'Century Histories · Browse';
    document.getElementById('header-title').textContent = century.label;
    document.getElementById('header-era').textContent   = `${century.facts.length} facts`;
    document.getElementById('header-date').textContent  = '';

    const cards = document.getElementById('cards');
    const summaryHTML = `
      <div class="summary-card">
        <div class="summary-label">Overview</div>
        <div class="summary-title">${century.label}</div>
        <p class="summary-text">${century.summary}</p>
      </div>`;

    const factsHTML = century.facts.map((fact, i) => `
      <div class="card" style="animation-delay:${(i + 1) * 0.06}s">
        <div class="card-num">Fact ${i + 1} of ${century.facts.length}</div>
        <p class="card-fact">${fact}</p>
      </div>
    `).join('');

    cards.innerHTML = summaryHTML + factsHTML;
  }

  // ── Tab switching ──────────────────────────────────────────────────────────
  function showToday() {
    mode = 'today';
    document.getElementById('btn-today').classList.add('active');
    document.getElementById('btn-browse').classList.remove('active');
    document.getElementById('century-nav').classList.remove('visible');
    renderToday();
  }

  function showBrowse() {
    mode = 'browse';
    document.getElementById('btn-browse').classList.add('active');
    document.getElementById('btn-today').classList.remove('active');
    document.getElementById('century-nav').classList.add('visible');
    selectCentury(activeCentury);
  }

  init();
</script>
</body>
</html>
