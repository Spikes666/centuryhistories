<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Century Histories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1c1510;
      --bg2:       #241c14;
      --bg3:       #2e2418;
      --border:    #3d3020;
      --border2:   #4a3a28;
      --text:      #e8dcc8;
      --text2:     #b8a888;
      --text3:     #786050;
      --accent:    #c9184a;
      --gold:      #c8922a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(160deg, #221810 0%, #2e2010 60%, #1c1408 100%);
      border-bottom: 2px solid var(--gold);
      padding: 36px 24px 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, #c8922a18 0%, transparent 70%);
      pointer-events: none;
    }
    .header-day   { font-size: 11px; color: var(--text3); letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 10px; }
    .header-title { font-family: 'Playfair Display', Georgia, serif; font-size: clamp(28px, 7vw, 46px); font-style: italic; color: #f0e4cc; margin-bottom: 10px; line-height: 1.15; }
    .header-era-badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 20px; padding: 5px 14px; margin-bottom: 8px;
      font-size: 12px; color: var(--gold); letter-spacing: 0.06em;
    }
    .header-date { font-size: 12px; color: var(--text3); font-style: italic; }

    /* ── Nav tabs ── */
    .nav { display: flex; justify-content: center; gap: 8px; padding: 20px 20px 0; max-width: 920px; margin: 0 auto; }
    .nav-btn {
      background: none; border: 1px solid var(--border); border-radius: 20px;
      color: var(--text3); cursor: pointer; font-family: 'Lora', Georgia, serif;
      font-size: 12px; letter-spacing: 0.1em; padding: 7px 18px;
      text-transform: uppercase; transition: all 0.2s;
    }
    .nav-btn:hover  { border-color: var(--border2); color: var(--text2); }
    .nav-btn.active { border-color: var(--gold); color: var(--gold); background: #c8922a12; }

    /* ── Era filter bar ── */
    .era-bar {
      display: none; max-width: 920px; margin: 20px auto 0; padding: 0 20px;
      flex-direction: column; gap: 12px;
    }
    .era-bar.visible { display: flex; }
    .era-section { display: flex; flex-direction: column; gap: 6px; }
    .era-label {
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--text3); padding-left: 2px; display: flex; align-items: center; gap: 6px;
    }
    .era-label-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .era-centuries { display: flex; flex-wrap: wrap; gap: 6px; }
    .century-btn {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 16px;
      color: var(--text3); cursor: pointer; font-family: 'Lora', Georgia, serif;
      font-size: 11px; letter-spacing: 0.06em; padding: 5px 13px; transition: all 0.2s;
    }
    .century-btn:hover  { border-color: var(--border2); color: var(--text2); }
    .century-btn.active { color: #fff; }

    /* ── Era divider in browse ── */
    .era-divider {
      display: flex; align-items: center; gap: 14px;
      padding: 28px 0 8px; opacity: 0; animation: fadeUp 0.4s ease forwards;
    }
    .era-divider-line { flex: 1; height: 1px; background: var(--border); }
    .era-divider-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
      white-space: nowrap; padding: 4px 12px; border-radius: 12px;
      border: 1px solid; background: var(--bg2);
    }

    /* ── Cards container ── */
    .cards { max-width: 920px; margin: 0 auto; padding: 28px 20px 0; display: flex; flex-direction: column; gap: 18px; }

    /* ── Individual card ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(14px);
      animation: fadeUp 0.45s ease forwards;
      transition: border-color 0.2s, box-shadow 0.2s;
      display: grid;
      grid-template-columns: 1fr 200px;
    }
    .card:hover { border-color: var(--border2); box-shadow: 0 4px 24px #00000030; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .card-body { padding: 22px 22px; display: flex; flex-direction: column; gap: 10px; }
    .card-meta { display: flex; align-items: center; gap: 8px; }
    .card-num  { font-size: 10px; color: var(--text3); letter-spacing: 0.2em; text-transform: uppercase; }
    .card-era-pip { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .card-fact { font-size: 14px; line-height: 1.85; color: var(--text2); flex: 1; }

    /* ── Map panel ── */
    .card-map {
      position: relative; border-left: 1px solid var(--border);
      background: #161008; display: flex; flex-direction: column;
    }
    .card-map iframe {
      width: 100%; height: 160px; display: block; border: none;
      filter: brightness(0.82) saturate(0.6) sepia(0.25);
      flex: 1; pointer-events: none;
    }
    .card-map-label {
      padding: 7px 10px; font-size: 10px; color: var(--text3);
      letter-spacing: 0.07em; font-style: italic;
      border-top: 1px solid var(--border); text-align: center; line-height: 1.4;
    }

    /* ── Summary card ── */
    .summary-card {
      background: linear-gradient(135deg, var(--bg2), var(--bg3));
      border: 1px solid var(--border2);
      border-radius: 14px; padding: 28px 26px;
      opacity: 0; animation: fadeUp 0.4s ease forwards;
    }
    .summary-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 10px; }
    .summary-title { font-family: 'Playfair Display', Georgia, serif; font-size: clamp(18px, 4vw, 24px); font-style: italic; color: #f0e4cc; margin-bottom: 14px; line-height: 1.3; }
    .summary-text  { font-size: 14px; line-height: 1.85; color: var(--text3); font-style: italic; }

    /* ── Footer ── */
    .footer { text-align: center; margin-top: 52px; padding: 0 20px; font-size: 11px; color: var(--text3); letter-spacing: 0.08em; line-height: 2; }

    .state-msg { text-align: center; padding: 60px 20px; color: var(--text3); font-style: italic; font-size: 14px; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .card { grid-template-columns: 1fr; }
      .card-map { border-left: none; border-top: 1px solid var(--border); }
      .card-map iframe { height: 130px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-day" id="header-day">Loading…</div>
  <h1 class="header-title" id="header-title">Century Histories</h1>
  <div id="header-era-badge" class="header-era-badge" style="display:none"></div>
  <div class="header-date" id="header-date"></div>
</div>

<div class="nav">
  <button class="nav-btn active" id="btn-today"  onclick="showToday()">Today</button>
  <button class="nav-btn"        id="btn-browse" onclick="showBrowse()">Browse Eras</button>
</div>

<div class="era-bar" id="era-bar"></div>

<div class="cards" id="cards">
  <div class="state-msg">Loading flashcards…</div>
</div>

<div class="footer">
  Sources: <em>Misquoting Jesus</em> / Bart Ehrman &nbsp;·&nbsp;
  <em>The Rest is History</em> (Holland &amp; Sandbrook) &nbsp;·&nbsp;
  <em>Dominion</em> / Tom Holland<br>
  Refreshes daily · 460 facts across 23 centuries
</div>

<script>
const FACTS_PER_DAY = 10;
const START_DATE    = new Date('2025-01-01');
const allData       = {"centuries": [{"id": "pre_ce_middle_east", "label": "Pre-CE Middle East (3000 BCE – 1 BCE)", "summary": "The ancient Middle East is the cradle of civilization, writing, law, and monotheism. The region saw the rise of Sumer, Babylon, Egypt, Assyria, and Persia — and gave birth to the Hebrew scriptures that would shape Judaism, Christianity, and Islam.", "facts": [{"fact": "Around 3100 BCE, the Sumerians of Mesopotamia invented the earliest known writing system — cuneiform — pressing wedge-shaped marks into clay tablets to track grain and livestock.", "map_label": "Mesopotamia", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=32.5,44.5&zoom=5&size=280x180&markers=32.5,44.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=34.5,22.5,54.5,42.5&layer=mapnik&marker=32.5,44.5"}, {"fact": "The Epic of Gilgamesh, written around 2100 BCE, is the world's oldest surviving literary work. It includes a flood narrative strikingly similar to the later story of Noah — predating Genesis by over a thousand years.", "map_label": "Mesopotamia", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=32.5,44.5&zoom=5&size=280x180&markers=32.5,44.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=34.5,22.5,54.5,42.5&layer=mapnik&marker=32.5,44.5"}, {"fact": "Hammurabi, king of Babylon (~1792–1750 BCE), produced one of history's first written legal codes. Its 282 laws introduced the principle of proportional justice: 'an eye for an eye, a tooth for a tooth.'", "map_label": "Mesopotamia", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=32.5,44.5&zoom=5&size=280x180&markers=32.5,44.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=34.5,22.5,54.5,42.5&layer=mapnik&marker=32.5,44.5"}, {"fact": "The Egyptians built the Great Pyramid of Giza around 2560 BCE — the tallest man-made structure in the world for nearly 4,000 years. Contrary to popular myth, it was built by paid laborers, not slaves.", "map_label": "Egypt", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=26.8,30.8&zoom=5&size=280x180&markers=26.8,30.8,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=20.8,16.8,40.8,36.8&layer=mapnik&marker=26.8,30.8"}, {"fact": "The Hittites of Anatolia (~1600–1180 BCE) were among the first peoples to master iron smelting, giving them a military advantage that reshaped the ancient Near East.", "map_label": "Anatolia (modern Turkey)", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=39.0,35.0&zoom=5&size=280x180&markers=39.0,35.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=25.0,29.0,45.0,49.0&layer=mapnik&marker=39.0,35.0"}, {"fact": "The Hebrew Exodus story, if historical, is generally dated to around 1250 BCE under Pharaoh Ramesses II — though no Egyptian records confirm a mass exodus of Israelites.", "map_label": "Egypt", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=26.8,30.8&zoom=5&size=280x180&markers=26.8,30.8,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=20.8,16.8,40.8,36.8&layer=mapnik&marker=26.8,30.8"}, {"fact": "The Assyrian Empire (~900–612 BCE) was the ancient world's first true military superpower, using iron weapons, siege engines, and systematic deportation of conquered peoples to control a vast territory from Egypt to Iran.", "map_label": "Egypt", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=26.8,30.8&zoom=5&size=280x180&markers=26.8,30.8,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=20.8,16.8,40.8,36.8&layer=mapnik&marker=26.8,30.8"}, {"fact": "In 586 BCE, the Babylonian king Nebuchadnezzar destroyed Solomon's Temple in Jerusalem and deported the Jewish elite to Babylon — a traumatic event that transformed Israelite religion into Judaism.", "map_label": "Mesopotamia", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=32.5,44.5&zoom=5&size=280x180&markers=32.5,44.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=34.5,22.5,54.5,42.5&layer=mapnik&marker=32.5,44.5"}, {"fact": "Cyrus the Great of Persia conquered Babylon in 539 BCE and famously freed the Jewish exiles, allowing them to return to Judea. He is the only non-Israelite called 'messiah' (anointed one) in the Hebrew Bible (Isaiah 45:1).", "map_label": "Mesopotamia", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=32.5,44.5&zoom=5&size=280x180&markers=32.5,44.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=34.5,22.5,54.5,42.5&layer=mapnik&marker=32.5,44.5"}, {"fact": "The Persian Achaemenid Empire (~550–330 BCE), at its height under Darius I, stretched from Greece to India — the largest empire the world had yet seen, administered through a remarkably tolerant policy of local autonomy.", "map_label": "Persia (modern Iran)", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=32.4,53.7&zoom=5&size=280x180&markers=32.4,53.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=43.7,22.4,63.7,42.4&layer=mapnik&marker=32.4,53.7"}, {"fact": "Alexander the Great conquered the Persian Empire between 334–323 BCE, spreading Greek language and culture (Hellenism) across the Middle East — a cultural shift that would directly shape the world in which the New Testament was written.", "map_label": "Persia (modern Iran)", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=32.4,53.7&zoom=5&size=280x180&markers=32.4,53.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=43.7,22.4,63.7,42.4&layer=mapnik&marker=32.4,53.7"}, {"fact": "After Alexander's death, his empire split among his generals. Judea fell under the Seleucid dynasty, whose ruler Antiochus IV Epiphanes desecrated the Jerusalem Temple in 167 BCE, sparking the Maccabean Revolt.", "map_label": "Judea / Israel", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=31.8,35.2&zoom=6&size=280x180&markers=31.8,35.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=30.200000000000003,26.8,40.2,36.8&layer=mapnik&marker=31.8,35.2"}, {"fact": "The Maccabean Revolt (167–160 BCE) led to a brief period of Jewish independence under the Hasmonean dynasty. The victory is celebrated in the Jewish festival of Hanukkah.", "map_label": "Judea / Israel", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=31.8,35.2&zoom=6&size=280x180&markers=31.8,35.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=30.200000000000003,26.8,40.2,36.8&layer=mapnik&marker=31.8,35.2"}, {"fact": "By 63 BCE, the Roman general Pompey captured Jerusalem, ending Jewish independence. Judea became a client state of Rome — the political backdrop for the entire New Testament.", "map_label": "Judea / Israel", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=31.8,35.2&zoom=6&size=280x180&markers=31.8,35.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=30.200000000000003,26.8,40.2,36.8&layer=mapnik&marker=31.8,35.2"}, {"fact": "The Dead Sea Scrolls, discovered in 1947, contain Hebrew manuscripts from roughly 250 BCE–70 CE — the oldest known copies of the Hebrew Bible and evidence of a diverse, sectarian Judaism that is often flattened in later tradition.", "map_label": "Judea / Israel", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=31.8,35.2&zoom=6&size=280x180&markers=31.8,35.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=30.200000000000003,26.8,40.2,36.8&layer=mapnik&marker=31.8,35.2"}, {"fact": "Bart Ehrman emphasizes that the Hebrew Bible was not written as a unified document — it was composed by many authors over nearly a thousand years, edited and re-edited, with contradictions that reflect evolving theological ideas rather than a single consistent theology.", "map_label": "The Early Christian World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,25.0&zoom=4&size=280x180&markers=35.0,25.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.0,15.0,45.0,55.0&layer=mapnik&marker=35.0,25.0"}, {"fact": "The concept of a suffering, dying-and-rising god appears across ancient Middle Eastern religions — in the myths of Osiris (Egypt), Tammuz (Babylon), and later Baal (Canaan) — providing a broader religious context for understanding early Christian claims about Jesus.", "map_label": "Mesopotamia", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=32.5,44.5&zoom=5&size=280x180&markers=32.5,44.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=34.5,22.5,54.5,42.5&layer=mapnik&marker=32.5,44.5"}, {"fact": "Zoroastrianism, the religion of Persia, introduced concepts of cosmic dualism (good vs. evil), a final judgment, heaven and hell, and a future savior figure (Saoshyant) — ideas that heavily influenced late Jewish apocalypticism and, through it, early Christianity.", "map_label": "Persia (modern Iran)", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=32.4,53.7&zoom=5&size=280x180&markers=32.4,53.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=43.7,22.4,63.7,42.4&layer=mapnik&marker=32.4,53.7"}, {"fact": "The Septuagint — a Greek translation of the Hebrew scriptures — was produced in Alexandria, Egypt around 250 BCE. It became the Bible of the early church, and many New Testament authors quote it rather than the original Hebrew.", "map_label": "Alexandria, Egypt", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=31.2,29.9&zoom=7&size=280x180&markers=31.2,29.9,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=27.4,28.7,32.4,33.7&layer=mapnik&marker=31.2,29.9"}, {"fact": "By the 1st century BCE, Judaism was not a monolithic religion. Groups included Pharisees (focused on oral law), Sadducees (priestly aristocracy), Essenes (apocalyptic separatists), and Zealots (revolutionary nationalists) — a diversity Ehrman stresses as essential context for understanding Jesus.", "map_label": "Judea / Israel", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=31.8,35.2&zoom=6&size=280x180&markers=31.8,35.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=30.200000000000003,26.8,40.2,36.8&layer=mapnik&marker=31.8,35.2"}], "era": "Ancient World (Pre-CE – 500 CE)"}, {"id": "1st_century_ce", "label": "1st Century CE (1–99 CE)", "summary": "The first century CE is dominated by the Roman Empire at its height, the life of Jesus, the birth of Christianity, and the catastrophic Jewish-Roman War ending in the destruction of the Temple. Bart Ehrman's work is especially rich for this period.", "facts": [{"fact": "Jesus of Nazareth was most likely born between 6–4 BCE (before Herod the Great's death in 4 BCE) — meaning the common era calendar, established centuries later, is off by several years.", "map_label": "Judea / Israel", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=31.8,35.2&zoom=6&size=280x180&markers=31.8,35.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=30.200000000000003,26.8,40.2,36.8&layer=mapnik&marker=31.8,35.2"}, {"fact": "Bart Ehrman argues that Jesus was an apocalyptic Jewish preacher who believed God was about to intervene in history and establish a kingdom on earth — not the founder of a new religion, but a reformer within Judaism.", "map_label": "The Early Christian World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,25.0&zoom=4&size=280x180&markers=35.0,25.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.0,15.0,45.0,55.0&layer=mapnik&marker=35.0,25.0"}, {"fact": "The four Gospels (Matthew, Mark, Luke, John) were not written by eyewitnesses. Ehrman dates them: Mark (~65–70 CE), Matthew and Luke (~80–85 CE), and John (~90–95 CE) — all decades after Jesus's death.", "map_label": "The Early Christian World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,25.0&zoom=4&size=280x180&markers=35.0,25.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.0,15.0,45.0,55.0&layer=mapnik&marker=35.0,25.0"}, {"fact": "Mark is the earliest Gospel and the source used by Matthew and Luke — a scholarly consensus called the 'Two-Source Hypothesis.' John is independent and theologically the most developed.", "map_label": "The Early Christian World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,25.0&zoom=4&size=280x180&markers=35.0,25.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.0,15.0,45.0,55.0&layer=mapnik&marker=35.0,25.0"}, {"fact": "Jesus was crucified under the Roman prefect Pontius Pilate around 30–33 CE. Crucifixion was a Roman punishment specifically for political troublemakers and slaves — not a Jewish execution method.", "map_label": "The Mediterranean World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=4&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=0.0,15.0,40.0,55.0&layer=mapnik&marker=35.0,20.0"}, {"fact": "Paul of Tarsus wrote his letters in the 50s CE — before any of the Gospels were written. His letters are the earliest Christian documents we have, and his theology (salvation through faith, not works of the law) shaped Christianity more than any other single author.", "map_label": "Tarsus (modern Turkey)", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=36.9,36.9&zoom=7&size=280x180&markers=36.9,36.9,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=34.4,34.4,39.4,39.4&layer=mapnik&marker=36.9,36.9"}, {"fact": "Ehrman points out that Paul never met the living Jesus and rarely quotes his teachings. Paul's Christ is a cosmic figure — pre-existent, crucified, resurrected — which differs in emphasis from the earthly Jesus of the Synoptic Gospels.", "map_label": "The Early Christian World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,25.0&zoom=4&size=280x180&markers=35.0,25.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.0,15.0,45.0,55.0&layer=mapnik&marker=35.0,25.0"}, {"fact": "In 66 CE, Jewish revolutionaries launched a revolt against Rome. The Romans responded with overwhelming force under General Vespasian and his son Titus.", "map_label": "Rome, Italy", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=6&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=7.5,36.9,17.5,46.9&layer=mapnik&marker=41.9,12.5"}, {"fact": "In 70 CE, Roman forces under Titus destroyed the Second Temple in Jerusalem — an event so catastrophic it reshaped both Judaism and Christianity forever. Judaism became a synagogue-based, text-centered religion; Christianity increasingly separated from its Jewish roots.", "map_label": "Judea / Israel", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=31.8,35.2&zoom=6&size=280x180&markers=31.8,35.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=30.200000000000003,26.8,40.2,36.8&layer=mapnik&marker=31.8,35.2"}, {"fact": "The Arch of Titus in Rome, still standing today, depicts Roman soldiers carrying the Temple menorah as war spoils — a vivid monument to the 70 CE destruction.", "map_label": "Jerusalem", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=31.8,35.2&zoom=6&size=280x180&markers=31.8,35.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=30.200000000000003,26.8,40.2,36.8&layer=mapnik&marker=31.8,35.2"}, {"fact": "The Roman historian Tacitus (writing ~116 CE) confirms that a man called Christus was executed by Pontius Pilate during the reign of Tiberius — one of only two non-Christian Roman references to Jesus.", "map_label": "The Mediterranean World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=4&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=0.0,15.0,40.0,55.0&layer=mapnik&marker=35.0,20.0"}, {"fact": "Josephus, a Jewish historian writing in the 90s CE, mentions Jesus twice. One passage (the 'Testimonium Flavianum') was almost certainly edited by later Christian scribes — Ehrman and most scholars consider the current version partially interpolated.", "map_label": "The Early Christian World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,25.0&zoom=4&size=280x180&markers=35.0,25.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.0,15.0,45.0,55.0&layer=mapnik&marker=35.0,25.0"}, {"fact": "The book of Revelation was written around 95 CE during the reign of Emperor Domitian. Tom Holland (The Rest is History) emphasizes it as a coded political document aimed at Rome, not a literal prediction of the modern future.", "map_label": "The Roman Empire", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5"}, {"fact": "Emperor Augustus (ruled 27 BCE–14 CE) transformed Rome from a republic into an empire. His reign established the 'Pax Romana' — two centuries of relative peace across the Mediterranean world.", "map_label": "The Roman Empire", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=4&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.5,21.9,32.5,61.9&layer=mapnik&marker=41.9,12.5"}, {"fact": "Augustus used religion as statecraft: he was declared 'Son of God' (divi filius) after Julius Caesar's deification — a title that early Christians deliberately echoed in calling Jesus 'Son of God.'", "map_label": "The Mediterranean World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=4&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=0.0,15.0,40.0,55.0&layer=mapnik&marker=35.0,20.0"}, {"fact": "Nero (ruled 54–68 CE) became the first emperor to officially persecute Christians, blaming them for the Great Fire of Rome in 64 CE. This persecution likely claimed the lives of both Peter and Paul.", "map_label": "Rome, Italy", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=6&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=7.5,36.9,17.5,46.9&layer=mapnik&marker=41.9,12.5"}, {"fact": "The year 69 CE is called the 'Year of the Four Emperors' — after Nero's suicide, Rome descended into civil war with four men claiming the throne in a single year, before Vespasian stabilized the empire.", "map_label": "Rome, Italy", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=6&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=7.5,36.9,17.5,46.9&layer=mapnik&marker=41.9,12.5"}, {"fact": "Pompeii and Herculaneum were destroyed by the eruption of Mount Vesuvius on August 24, 79 CE — an event described in vivid detail by Pliny the Younger in letters that survive today.", "map_label": "Bay of Naples, Italy", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=40.7,14.4&zoom=8&size=280x180&markers=40.7,14.4,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=13.200000000000001,39.5,15.6,41.900000000000006&layer=mapnik&marker=40.7,14.4"}, {"fact": "The Colosseum (Flavian Amphitheatre) was completed in 80 CE under Emperor Titus. It could hold 50,000–80,000 spectators and hosted gladiatorial games, animal hunts, and public executions.", "map_label": "Rome, Italy", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=7&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=10.0,39.4,15.0,44.4&layer=mapnik&marker=41.9,12.5"}, {"fact": "By the end of the 1st century, Christianity had spread across the Roman Empire — from Jerusalem to Antioch, Alexandria, Corinth, and Rome — but remained a tiny, often persecuted minority sect.", "map_label": "Alexandria, Egypt", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=31.2,29.9&zoom=7&size=280x180&markers=31.2,29.9,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=27.4,28.7,32.4,33.7&layer=mapnik&marker=31.2,29.9"}], "era": "Ancient World (Pre-CE – 500 CE)"}, {"id": "2nd_century_ce", "label": "2nd Century CE (100–199 CE)", "summary": "The 2nd century sees Rome at its imperial peak under the 'Five Good Emperors,' the continued spread and diversification of Christianity, fierce theological debates, and the final suppression of Jewish revolt. Gnosticism flourishes alongside proto-orthodox Christianity.", "facts": [{"fact": "The 'Five Good Emperors' — Nerva, Trajan, Hadrian, Antoninus Pius, and Marcus Aurelius — ruled from 96–180 CE, a period Edward Gibbon called the epoch 'in the history of the world during which the condition of the human race was most happy and prosperous.'", "map_label": "The Roman Empire", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5"}, {"fact": "Trajan (98–117 CE) expanded the Roman Empire to its greatest territorial extent, conquering Dacia (modern Romania) and briefly taking Mesopotamia — feats celebrated on Trajan's Column in Rome, which still stands.", "map_label": "Mesopotamia", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=32.5,44.5&zoom=5&size=280x180&markers=32.5,44.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=34.5,22.5,54.5,42.5&layer=mapnik&marker=32.5,44.5"}, {"fact": "Hadrian (117–138 CE) famously pulled back from Trajan's eastern conquests and consolidated the empire's borders. He built Hadrian's Wall across northern Britain — 73 miles long — to mark the empire's northern limit.", "map_label": "Roman Britain", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=55.0,-2.5&zoom=6&size=280x180&markers=55.0,-2.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.5,50.0,2.5,60.0&layer=mapnik&marker=55.0,-2.5"}, {"fact": "The Bar Kokhba Revolt (132–135 CE) was the third and final Jewish revolt against Rome. After its brutal suppression by Hadrian, Jews were banned from Jerusalem, which was rebuilt as the Roman city Aelia Capitolina.", "map_label": "Judea / Israel", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=31.8,35.2&zoom=6&size=280x180&markers=31.8,35.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=30.200000000000003,26.8,40.2,36.8&layer=mapnik&marker=31.8,35.2"}, {"fact": "Hadrian's suppression of the Bar Kokhba revolt effectively ended the Jewish homeland for nearly 1,800 years. Ehrman notes this further severed the already strained relationship between Judaism and the growing Christian movement.", "map_label": "Judea / Israel", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=31.8,35.2&zoom=6&size=280x180&markers=31.8,35.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=30.200000000000003,26.8,40.2,36.8&layer=mapnik&marker=31.8,35.2"}, {"fact": "Marcus Aurelius (161–180 CE) was both a philosopher-emperor and a military commander. His private journal, 'Meditations,' is a foundational Stoic text — written in Greek as a personal exercise, never intended for publication.", "map_label": "The Roman Empire", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5"}, {"fact": "Bart Ehrman's work highlights that in the 2nd century, Christianity was not a unified religion but a sprawling collection of competing sects — including Gnostics, Marcionites, and proto-orthodox groups — each claiming to represent the true teaching of Jesus.", "map_label": "The Early Christian World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,25.0&zoom=4&size=280x180&markers=35.0,25.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.0,15.0,45.0,55.0&layer=mapnik&marker=35.0,25.0"}, {"fact": "Marcion of Sinope (~85–160 CE) argued that the God of the Old Testament was a different, inferior deity from the loving Father of Jesus. His radical canon — only Paul's letters and a edited Luke — forced the proto-orthodox church to begin defining its own canon.", "map_label": "The Early Christian World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,25.0&zoom=4&size=280x180&markers=35.0,25.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.0,15.0,45.0,55.0&layer=mapnik&marker=35.0,25.0"}, {"fact": "Gnosticism was a diverse religious movement that held secret spiritual knowledge ('gnosis') as the path to salvation. Gnostic Christians produced their own gospels — including the Gospel of Thomas and the Gospel of Philip — discovered at Nag Hammadi, Egypt in 1945.", "map_label": "Nag Hammadi, Egypt", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=26.0,32.3&zoom=8&size=280x180&markers=26.0,32.3,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=31.099999999999998,24.8,33.5,27.2&layer=mapnik&marker=26.0,32.3"}, {"fact": "The Gospel of Thomas, likely compiled in the 2nd century, contains 114 sayings attributed to Jesus with no narrative framework and no death/resurrection. Some sayings may preserve authentic early traditions; others are distinctly Gnostic.", "map_label": "The Early Christian World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,25.0&zoom=4&size=280x180&markers=35.0,25.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.0,15.0,45.0,55.0&layer=mapnik&marker=35.0,25.0"}, {"fact": "Polycarp of Smyrna (~69–155 CE), a bishop who claimed to have known the Apostle John, was martyred by Roman authorities. His execution is one of the earliest detailed accounts of Christian martyrdom and became a template for later martyr literature.", "map_label": "Smyrna (modern Izmir, Turkey)", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=38.4,27.1&zoom=8&size=280x180&markers=38.4,27.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=25.900000000000002,37.199999999999996,28.3,39.6&layer=mapnik&marker=38.4,27.1"}, {"fact": "Justin Martyr (~100–165 CE) was one of the first Christian 'apologists' — intellectuals who defended Christianity to pagan audiences using Greek philosophy. He was executed in Rome for refusing to sacrifice to Roman gods.", "map_label": "The Mediterranean World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=4&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=0.0,15.0,40.0,55.0&layer=mapnik&marker=35.0,20.0"}, {"fact": "Irenaeus of Lyon (~130–202 CE) wrote 'Against Heresies,' a massive attack on Gnostic Christianity. He championed four Gospels — Matthew, Mark, Luke, John — as the only legitimate ones, a crucial step toward the later canonical New Testament.", "map_label": "Lyon, France", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=45.7,4.8&zoom=7&size=280x180&markers=45.7,4.8,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.3,43.2,7.3,48.2&layer=mapnik&marker=45.7,4.8"}, {"fact": "Ehrman argues that what we call 'orthodoxy' was not the original form of Christianity but the version that won a power struggle — written by the victors who then branded all competitors as 'heretics.'", "map_label": "The Early Christian World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,25.0&zoom=4&size=280x180&markers=35.0,25.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.0,15.0,45.0,55.0&layer=mapnik&marker=35.0,25.0"}, {"fact": "The Antonine Plague (165–180 CE) swept through the Roman Empire, killing an estimated 5–10 million people — possibly smallpox. It was brought back by soldiers returning from campaigns in Mesopotamia and significantly weakened the empire.", "map_label": "Mesopotamia", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=32.5,44.5&zoom=5&size=280x180&markers=32.5,44.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=34.5,22.5,54.5,42.5&layer=mapnik&marker=32.5,44.5"}, {"fact": "Ptolemy's 'Almagest,' written around 150 CE, compiled the Greco-Roman world's astronomical knowledge into a geocentric model of the universe that would dominate Western science for over 1,300 years.", "map_label": "Egypt", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=26.8,30.8&zoom=5&size=280x180&markers=26.8,30.8,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=20.8,16.8,40.8,36.8&layer=mapnik&marker=26.8,30.8"}, {"fact": "Galen of Pergamon (~129–216 CE) became the most influential physician in Roman history, synthesizing Greek medical knowledge. His writings on anatomy and medicine remained authoritative in Europe and the Islamic world until the Renaissance.", "map_label": "Pergamon (modern Turkey)", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=39.1,27.2&zoom=8&size=280x180&markers=39.1,27.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.0,37.9,28.4,40.300000000000004&layer=mapnik&marker=39.1,27.2"}, {"fact": "The rise of Roman roads — over 250,000 miles by the 2nd century — enabled not just military movement but the rapid spread of ideas, goods, and religions including Christianity and Mithraism across the empire.", "map_label": "The Roman Empire", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=4&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.5,21.9,32.5,61.9&layer=mapnik&marker=41.9,12.5"}, {"fact": "Mithraism, a mystery religion popular among Roman soldiers, shared several features with early Christianity: a savior figure, communal meals, baptism, and a focus on life after death. Scholars debate whether Christianity borrowed from Mithraism or both drew on common cultural wells.", "map_label": "The Mediterranean World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=4&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=0.0,15.0,40.0,55.0&layer=mapnik&marker=35.0,20.0"}, {"fact": "By the end of the 2nd century, the New Testament canon was beginning to take shape — but was far from settled. Different churches used different collections of texts, and debates over which books counted as authoritative would continue for centuries.", "map_label": "The Early Christian World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,25.0&zoom=4&size=280x180&markers=35.0,25.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.0,15.0,45.0,55.0&layer=mapnik&marker=35.0,25.0"}], "era": "Ancient World (Pre-CE – 500 CE)"}, {"id": "3rd_century_ce", "label": "3rd Century CE (200–299 CE)", "summary": "The 3rd century is Rome's crisis period — a revolving door of emperors, military chaos, plague, economic collapse, and near-disintegration. Meanwhile Christianity grows rapidly, survives brutal persecution, and begins to develop institutional structures.", "facts": [{"fact": "The 'Crisis of the Third Century' (235–284 CE) saw Rome nearly collapse: over 50 emperors or claimants in 50 years, constant civil war, barbarian invasions on multiple frontiers, and devastating plague.", "map_label": "The Roman Empire", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5"}, {"fact": "The Antonine dynasty ended with Commodus (180–192 CE), an erratic emperor who declared himself a god and the reincarnation of Hercules. He was assassinated by his wrestling partner, plunging Rome back into civil war.", "map_label": "The Roman Empire", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5"}, {"fact": "Septimius Severus (193–211 CE) won the civil war after 193 CE's 'Year of the Five Emperors' and founded the Severan dynasty. He was born in North Africa — the first African-born Roman emperor.", "map_label": "North Africa", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=34.0,9.0&zoom=5&size=280x180&markers=34.0,9.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-1.0,24.0,19.0,44.0&layer=mapnik&marker=34.0,9.0"}, {"fact": "Caracalla (211–217 CE), son of Severus, issued the Edict of Caracalla in 212 CE, granting Roman citizenship to virtually all free inhabitants of the empire — a massive legal and political transformation.", "map_label": "The Roman Empire", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=4&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.5,21.9,32.5,61.9&layer=mapnik&marker=41.9,12.5"}, {"fact": "The Plague of Cyprian (249–262 CE) killed up to 5,000 people per day in Rome at its peak. The Christian response — caring for the sick regardless of faith — contributed significantly to the religion's rapid growth in this era.", "map_label": "The Mediterranean World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=4&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=0.0,15.0,40.0,55.0&layer=mapnik&marker=35.0,20.0"}, {"fact": "Decius (249–251 CE) launched the first empire-wide, systematic persecution of Christians, requiring all citizens to sacrifice to Roman gods and obtain a certificate of compliance. Christians who refused faced imprisonment, torture, or death.", "map_label": "The Roman Empire", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5"}, {"fact": "The Decian persecution forced a crisis within Christianity: what to do with 'lapsed' Christians who had sacrificed to avoid execution? The debate over whether they could be readmitted to the church split communities and produced lasting theological controversy.", "map_label": "The Mediterranean World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=4&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=0.0,15.0,40.0,55.0&layer=mapnik&marker=35.0,20.0"}, {"fact": "Origen of Alexandria (~185–253 CE) was the most prolific and intellectually ambitious Christian scholar of the early church. He produced the Hexapla (a six-column comparison of Old Testament versions) and wrote hundreds of theological works, though later declared heretical.", "map_label": "Alexandria, Egypt", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=31.2,29.9&zoom=7&size=280x180&markers=31.2,29.9,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=27.4,28.7,32.4,33.7&layer=mapnik&marker=31.2,29.9"}, {"fact": "Ehrman highlights Origen as an example of how diverse early Christian thought was — Origen believed in the pre-existence of souls and the eventual salvation of all beings (apokatastasis), positions later condemned as heresy.", "map_label": "The Early Christian World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,25.0&zoom=4&size=280x180&markers=35.0,25.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.0,15.0,45.0,55.0&layer=mapnik&marker=35.0,25.0"}, {"fact": "The Manichaean religion was founded by the prophet Mani (~216–274 CE) in Persia. A radical dualistic faith blending Zoroastrianism, Buddhism, and Christianity, it spread across the Roman Empire and into China — and would later captivate the young Augustine of Hippo.", "map_label": "Hippo, North Africa", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=36.9,7.8&zoom=7&size=280x180&markers=36.9,7.8,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.3,34.4,10.3,39.4&layer=mapnik&marker=36.9,7.8"}, {"fact": "Zenobia, Queen of Palmyra, carved out a breakaway empire in the eastern Roman provinces (~270–272 CE), briefly ruling Egypt and much of the Middle East before being defeated by Emperor Aurelian.", "map_label": "Egypt", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=26.8,30.8&zoom=5&size=280x180&markers=26.8,30.8,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=20.8,16.8,40.8,36.8&layer=mapnik&marker=26.8,30.8"}, {"fact": "Aurelian (270–275 CE) reunified the fragmented Roman Empire after the Crisis of the Third Century — earning the title 'Restorer of the World.' He also built the Aurelian Wall around Rome, still visible today.", "map_label": "Rome, Italy", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=7&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=10.0,39.4,15.0,44.4&layer=mapnik&marker=41.9,12.5"}, {"fact": "Diocletian (284–305 CE) ended the Crisis of the Third Century through radical administrative reform, splitting the empire into four zones ruled by two senior and two junior emperors — the 'Tetrarchy.'", "map_label": "The Roman Empire", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5"}, {"fact": "Diocletian launched the 'Great Persecution' (303–312 CE) — the most severe and systematic Roman persecution of Christians. Churches were destroyed, scriptures burned, and Christians stripped of legal rights across the empire.", "map_label": "The Early Christian World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,25.0&zoom=4&size=280x180&markers=35.0,25.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.0,15.0,45.0,55.0&layer=mapnik&marker=35.0,25.0"}, {"fact": "The concept of 'scripture' itself was contested during this period. When Roman authorities demanded Christians hand over their sacred texts, some complied — earning the label 'traditor' (one who hands over), the root of the English word 'traitor.'", "map_label": "The Early Christian World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,25.0&zoom=4&size=280x180&markers=35.0,25.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.0,15.0,45.0,55.0&layer=mapnik&marker=35.0,25.0"}, {"fact": "Neoplatonism, developed by Plotinus (~205–270 CE), became the dominant philosophical school of the late Roman world. Its concept of a transcendent, ineffable 'One' as the source of all existence deeply influenced Christian theology.", "map_label": "The Roman Empire", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=4&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.5,21.9,32.5,61.9&layer=mapnik&marker=41.9,12.5"}, {"fact": "The Sassanid Persian Empire (founded 224 CE) replaced the Parthian Empire as Rome's great eastern rival, initiating centuries of warfare that would drain both empires and eventually leave them vulnerable to the Arab conquests of the 7th century.", "map_label": "Persia (modern Iran)", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=32.4,53.7&zoom=5&size=280x180&markers=32.4,53.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=43.7,22.4,63.7,42.4&layer=mapnik&marker=32.4,53.7"}, {"fact": "Bart Ehrman notes that the diversity of early Christianity is most visible in the manuscripts of this era — copyists regularly altered texts, whether accidentally or deliberately, to harmonize discrepancies or promote particular theological views.", "map_label": "The Early Christian World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,25.0&zoom=4&size=280x180&markers=35.0,25.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.0,15.0,45.0,55.0&layer=mapnik&marker=35.0,25.0"}, {"fact": "By the mid-3rd century, the Christian church had developed a clear hierarchical structure: bishops overseeing individual cities, with Rome, Alexandria, and Antioch emerging as the most prestigious sees — foreshadowing the later power of the papacy.", "map_label": "Alexandria, Egypt", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=31.2,29.9&zoom=7&size=280x180&markers=31.2,29.9,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=27.4,28.7,32.4,33.7&layer=mapnik&marker=31.2,29.9"}, {"fact": "Despite three major empire-wide persecutions by the end of the 3rd century, Christianity had grown from a small Jewish sect to a religion with millions of adherents across the Roman Empire — remarkable growth that historians attribute to community care, apocalyptic appeal, and organizational strength.", "map_label": "The Roman Empire", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=4&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.5,21.9,32.5,61.9&layer=mapnik&marker=41.9,12.5"}], "era": "Ancient World (Pre-CE – 500 CE)"}, {"id": "4th_century_ce", "label": "4th Century CE (300–399 CE)", "summary": "The 4th century is one of history's great turning points: Constantine converts to Christianity, transforming a persecuted sect into the empire's favored religion. The Council of Nicaea defines orthodoxy, and by century's end Christianity becomes Rome's official religion.", "facts": [{"fact": "Constantine I defeated his rivals at the Battle of Milvian Bridge (312 CE), allegedly after seeing a vision of a Christian symbol. Whether his conversion was genuine or politically calculated, it permanently changed the Roman Empire.", "map_label": "Rome — Milvian Bridge", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=7&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=10.0,39.4,15.0,44.4&layer=mapnik&marker=41.9,12.5"}, {"fact": "The Edict of Milan (313 CE), issued by Constantine and his co-emperor Licinius, granted religious tolerance throughout the Roman Empire — ending official persecution of Christians and restoring confiscated church property.", "map_label": "Milan, Italy", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=45.5,9.2&zoom=7&size=280x180&markers=45.5,9.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=6.699999999999999,43.0,11.7,48.0&layer=mapnik&marker=45.5,9.2"}, {"fact": "Constantine convened the Council of Nicaea in 325 CE — the first empire-wide Christian council — to resolve the Arian controversy: whether Jesus was co-eternal with God the Father or a created being subordinate to him.", "map_label": "The Early Christian World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,25.0&zoom=4&size=280x180&markers=35.0,25.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.0,15.0,45.0,55.0&layer=mapnik&marker=35.0,25.0"}, {"fact": "The Council of Nicaea produced the Nicene Creed, declaring the Son 'of the same substance' (homoousios) as the Father — a position that condemned Arianism as heresy. Ehrman notes this was a political as much as theological resolution.", "map_label": "The Early Christian World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,25.0&zoom=4&size=280x180&markers=35.0,25.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.0,15.0,45.0,55.0&layer=mapnik&marker=35.0,25.0"}, {"fact": "Arianism — the belief that Jesus was divine but subordinate to and created by God the Father — was not immediately defeated by Nicaea. It remained dominant in much of the empire and spread to Germanic tribes, persisting for centuries.", "map_label": "The Roman Empire", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5"}, {"fact": "Constantine founded Constantinople (modern Istanbul) in 330 CE on the site of the Greek city Byzantium, dedicating it as the new eastern capital of the empire. It would remain one of the world's great cities for over 1,000 years.", "map_label": "Constantinople (Istanbul)", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0"}, {"fact": "Bart Ehrman emphasizes that Constantine's patronage transformed Christianity institutionally: churches were lavishly funded, clergy received tax exemptions, and Sunday became an official day of rest — changes that permanently shaped Western civilization.", "map_label": "The Early Christian World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,25.0&zoom=4&size=280x180&markers=35.0,25.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.0,15.0,45.0,55.0&layer=mapnik&marker=35.0,25.0"}, {"fact": "Julian 'the Apostate' (361–363 CE) was the last pagan Roman emperor. A nephew of Constantine who was raised Christian but abandoned the faith, he tried to restore traditional Roman religion — and died on campaign against Persia before he could succeed.", "map_label": "The Roman Empire", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5"}, {"fact": "Ambrose, Bishop of Milan (374–397 CE), famously forced Emperor Theodosius I to do public penance for ordering a massacre at Thessalonica — an extraordinary assertion of church authority over imperial power.", "map_label": "Milan, Italy", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=45.5,9.2&zoom=7&size=280x180&markers=45.5,9.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=6.699999999999999,43.0,11.7,48.0&layer=mapnik&marker=45.5,9.2"}, {"fact": "Theodosius I issued the Edict of Thessalonica (380 CE), declaring Nicene Christianity the official state religion of the Roman Empire. Paganism was effectively outlawed, and heresy became a crime against the state.", "map_label": "The Roman Empire", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=4&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.5,21.9,32.5,61.9&layer=mapnik&marker=41.9,12.5"}, {"fact": "The First Council of Constantinople (381 CE) expanded the Nicene Creed to its current form, settling debates about the Holy Spirit and establishing the Trinity doctrine that defines mainstream Christianity to this day.", "map_label": "Constantinople (Istanbul)", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0"}, {"fact": "The Sack of the Serapeum (391 CE) — destruction of Alexandria's great temple to the god Serapis by a Christian mob, allegedly with imperial approval — symbolized the violent suppression of paganism in the newly Christian empire.", "map_label": "Alexandria, Egypt", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=31.2,29.9&zoom=7&size=280x180&markers=31.2,29.9,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=27.4,28.7,32.4,33.7&layer=mapnik&marker=31.2,29.9"}, {"fact": "The great Library of Alexandria was not destroyed in a single dramatic event. It declined gradually over centuries; a significant portion may have been damaged during Julius Caesar's visit (48 BCE), with further losses under various rulers including Christian ones.", "map_label": "Alexandria, Egypt", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=31.2,29.9&zoom=7&size=280x180&markers=31.2,29.9,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=27.4,28.7,32.4,33.7&layer=mapnik&marker=31.2,29.9"}, {"fact": "Athanasius of Alexandria (296–373 CE) was exiled five times for defending Nicene orthodoxy against Arian emperors. In 367 CE, his Easter Letter listed the 27 books of the New Testament — the first known list matching the modern canon exactly.", "map_label": "Alexandria, Egypt", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=31.2,29.9&zoom=7&size=280x180&markers=31.2,29.9,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=27.4,28.7,32.4,33.7&layer=mapnik&marker=31.2,29.9"}, {"fact": "Jerome (~347–420 CE) began his Latin translation of the Bible — the Vulgate — which would become the authoritative Bible of the Western church for over a thousand years. His translation choices shaped Christian theology in profound ways.", "map_label": "The Early Christian World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,25.0&zoom=4&size=280x180&markers=35.0,25.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.0,15.0,45.0,55.0&layer=mapnik&marker=35.0,25.0"}, {"fact": "Augustine of Hippo (354–430 CE) was born in North Africa, lived as a Manichaean for nine years, and converted to Christianity in 386 CE under Ambrose's influence. He would become the most influential theologian in Western Christianity.", "map_label": "Hippo, North Africa", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=36.9,7.8&zoom=7&size=280x180&markers=36.9,7.8,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.3,34.4,10.3,39.4&layer=mapnik&marker=36.9,7.8"}, {"fact": "The Huns, nomadic warriors from the Eurasian steppe, pushed westward under Attila's predecessors, driving Germanic peoples — Visigoths, Ostrogoths, Vandals — into Roman territory and triggering the migrations that would end the Western Empire.", "map_label": "North Africa", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=34.0,9.0&zoom=5&size=280x180&markers=34.0,9.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-1.0,24.0,19.0,44.0&layer=mapnik&marker=34.0,9.0"}, {"fact": "The Battle of Adrianople (378 CE) was a catastrophic Roman defeat by the Visigoths — the first time a Roman emperor (Valens) died in battle against a foreign enemy in centuries. Tom Holland (The Rest is History) describes it as the moment Rome lost control of its frontiers.", "map_label": "Adrianople (modern Turkey)", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.7,26.6&zoom=7&size=280x180&markers=41.7,26.6,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=24.1,39.2,29.1,44.2&layer=mapnik&marker=41.7,26.6"}, {"fact": "Ehrman's 'Misquoting Jesus' focuses heavily on this period — by the 4th century, thousands of manuscript copies of Christian texts existed, and scribal variations (both accidental and deliberate) had multiplied enormously, making the recovery of 'original' texts enormously difficult.", "map_label": "The Early Christian World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,25.0&zoom=4&size=280x180&markers=35.0,25.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.0,15.0,45.0,55.0&layer=mapnik&marker=35.0,25.0"}, {"fact": "The Codex Sinaiticus, produced around 330–360 CE and discovered at St. Catherine's Monastery on the Sinai Peninsula, is one of the oldest and most complete manuscripts of the Christian Bible — and contains books not in the modern canon alongside some that are.", "map_label": "Judea / Israel", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=31.8,35.2&zoom=6&size=280x180&markers=31.8,35.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=30.200000000000003,26.8,40.2,36.8&layer=mapnik&marker=31.8,35.2"}], "era": "Ancient World (Pre-CE – 500 CE)"}, {"id": "5th_century_ce", "label": "5th Century CE (400–499 CE)", "summary": "The 5th century witnesses the fall of the Western Roman Empire, the rise of Augustine's theology, the great Christological controversies, and the emergence of a new post-Roman world shaped by Germanic kingdoms and the enduring Eastern Empire.", "facts": [{"fact": "In 410 CE, the Visigoths under Alaric sacked Rome — the first time the city had been taken by a foreign enemy in 800 years. The shock reverberated across the empire and the Christian world, prompting Augustine to write 'The City of God.'", "map_label": "Rome, Italy", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=6&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=7.5,36.9,17.5,46.9&layer=mapnik&marker=41.9,12.5"}, {"fact": "Augustine's 'The City of God' (413–426 CE) argued that Rome's fall was irrelevant to the true Christian — whose citizenship was in the eternal City of God, not any earthly empire. It became the foundational text of Western Christian political theology.", "map_label": "The Roman Empire", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5"}, {"fact": "Augustine's doctrine of original sin — that Adam's sin corrupted all humanity, who are therefore born guilty and deserve damnation without God's grace — was largely his invention, shaped by his debates with the monk Pelagius.", "map_label": "The Mediterranean World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=4&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=0.0,15.0,40.0,55.0&layer=mapnik&marker=35.0,20.0"}, {"fact": "Pelagius (~354–418 CE) argued that humans have free will and can choose good without God's grace — a position condemned as heresy at Augustine's urging. The debate between Augustinian predestination and Pelagian free will echoes through Christianity to the present day.", "map_label": "The Early Christian World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,25.0&zoom=4&size=280x180&markers=35.0,25.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.0,15.0,45.0,55.0&layer=mapnik&marker=35.0,25.0"}, {"fact": "The Council of Ephesus (431 CE) condemned Nestorius, who argued that Mary should be called 'Christotokos' (bearer of Christ) rather than 'Theotokos' (bearer of God). The council declared Mary 'Mother of God' — a title that elevated Marian devotion enormously.", "map_label": "Ephesus (modern Turkey)", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=37.9,27.3&zoom=8&size=280x180&markers=37.9,27.3,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.1,36.699999999999996,28.5,39.1&layer=mapnik&marker=37.9,27.3"}, {"fact": "The Council of Chalcedon (451 CE) declared that Christ has two complete natures — fully divine and fully human — united in one person. This formula was rejected by many Eastern churches (Coptic, Armenian, Ethiopian), causing splits that persist today.", "map_label": "The Early Christian World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,25.0&zoom=4&size=280x180&markers=35.0,25.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.0,15.0,45.0,55.0&layer=mapnik&marker=35.0,25.0"}, {"fact": "Attila the Hun terrorized the Western Empire in the 440s–450s CE, extracting enormous tribute and raiding deep into Gaul and Italy. Pope Leo I's negotiation with Attila in 452 CE, convincing him to spare Rome, became legendary.", "map_label": "Gaul (modern France)", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=46.6,2.3&zoom=5&size=280x180&markers=46.6,2.3,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.7,36.6,12.3,56.6&layer=mapnik&marker=46.6,2.3"}, {"fact": "The Western Roman Empire's final collapse is conventionally dated to 476 CE, when the Germanic chieftain Odoacer deposed Romulus Augustulus, the last Western emperor, and sent the imperial regalia to Constantinople.", "map_label": "Constantinople (Istanbul)", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0"}, {"fact": "Tom Holland (The Rest is History) argues that 476 CE was less a dramatic collapse than a gradual transformation — many Romans in the West continued daily life under Germanic kings who largely preserved Roman administrative structures.", "map_label": "The Mediterranean World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=4&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=0.0,15.0,40.0,55.0&layer=mapnik&marker=35.0,20.0"}, {"fact": "The Vandals, a Germanic people, crossed into North Africa in 429 CE and established a kingdom there. In 455 CE they sacked Rome — giving their name permanently to the English language as a byword for mindless destruction.", "map_label": "Rome, Italy", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=6&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=7.5,36.9,17.5,46.9&layer=mapnik&marker=41.9,12.5"}, {"fact": "Patrick (~387–461 CE) was taken as a slave to Ireland as a teenager, escaped, and returned as a missionary bishop, converting much of the island to Christianity. Ireland would become a crucial center of learning preserving classical texts through the 'Dark Ages.'", "map_label": "Ireland", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=53.4,-8.2&zoom=6&size=280x180&markers=53.4,-8.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-13.2,48.4,-3.1999999999999993,58.4&layer=mapnik&marker=53.4,-8.2"}, {"fact": "The monastic movement expanded dramatically in the 5th century. John Cassian (~360–435 CE) brought Eastern desert monasticism to the West, and his writings on the spiritual life shaped Benedictine monasticism and Western Christianity.", "map_label": "The Mediterranean World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=4&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=0.0,15.0,40.0,55.0&layer=mapnik&marker=35.0,20.0"}, {"fact": "Proclus (~412–485 CE), the last great Neoplatonist philosopher in Athens, synthesized centuries of pagan philosophy into a comprehensive system. His work profoundly influenced Islamic, Jewish, and Christian mysticism.", "map_label": "Greece", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=37.9,23.7&zoom=6&size=280x180&markers=37.9,23.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=18.7,32.9,28.7,42.9&layer=mapnik&marker=37.9,23.7"}, {"fact": "The Eastern Roman (Byzantine) Empire not only survived the 5th century but thrived. Emperor Theodosius II (408–450 CE) built the massive Theodosian Walls around Constantinople — walls that would protect the city for a thousand years.", "map_label": "Constantinople (Istanbul)", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0"}, {"fact": "The Theodosian Code (438 CE) compiled all Roman imperial legislation since Constantine — a massive legal project that preserved Roman law and influenced the legal systems of medieval Europe and, through them, the modern Western world.", "map_label": "The Mediterranean World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=4&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=0.0,15.0,40.0,55.0&layer=mapnik&marker=35.0,20.0"}, {"fact": "Clovis I (~466–511 CE), king of the Franks, converted to Catholic Christianity (rather than Arian) around 496 CE — a conversion with enormous long-term consequences, as it aligned the most powerful Germanic kingdom with Rome and set the stage for medieval Christendom.", "map_label": "Gaul (modern France)", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=46.6,2.3&zoom=5&size=280x180&markers=46.6,2.3,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.7,36.6,12.3,56.6&layer=mapnik&marker=46.6,2.3"}, {"fact": "Boethius (~477–524 CE), a Roman senator serving the Ostrogothic king Theodoric, wrote 'The Consolation of Philosophy' while awaiting execution. It became one of the most widely read books in the Middle Ages — notably, it makes almost no mention of Christianity.", "map_label": "Balkans / Thrace", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.7,26.6&zoom=6&size=280x180&markers=41.7,26.6,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=21.6,36.7,31.6,46.7&layer=mapnik&marker=41.7,26.6"}, {"fact": "Ehrman points out that the 5th century saw the effective closure of the New Testament canon in the West — though Eastern churches continued to dispute several books (Revelation, 2 Peter, 2–3 John) well into subsequent centuries.", "map_label": "The Early Christian World", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,25.0&zoom=4&size=280x180&markers=35.0,25.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=5.0,15.0,45.0,55.0&layer=mapnik&marker=35.0,25.0"}, {"fact": "The great Alexandrian philosopher Hypatia (born ~360 CE) was murdered by a Christian mob in 415 CE. She has become an iconic symbol of the conflict between classical learning and religious fanaticism — though the reality was more politically complex.", "map_label": "Egypt", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=26.8,30.8&zoom=5&size=280x180&markers=26.8,30.8,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=20.8,16.8,40.8,36.8&layer=mapnik&marker=26.8,30.8"}, {"fact": "By 500 CE, the Mediterranean world had been fundamentally transformed: the unified Roman Empire was gone, replaced by a Latin Christian West fragmented among Germanic kingdoms, a Greek Christian Byzantine East, and a Persian Sassanid Empire — a tripartite world that set the stage for the rise of Islam.", "map_label": "Persia (modern Iran)", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=32.4,53.7&zoom=5&size=280x180&markers=32.4,53.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=43.7,22.4,63.7,42.4&layer=mapnik&marker=32.4,53.7"}], "era": "Ancient World (Pre-CE – 500 CE)"}, {"id": "6th_century", "era": "Medieval (500–1300)", "label": "6th Century CE (500–599 CE)", "summary": "The 6th century sees the final dissolution of the Western Roman order, the rise of Justinian's Byzantine Empire, the birth of Islam's precursor conditions, the spread of monasticism, and the devastating Plague of Justinian — the first great pandemic of the medieval world.", "facts": [{"fact": "Justinian I (527–565 CE) was the most ambitious Byzantine emperor, reconquering North Africa, Italy, and parts of Spain from Germanic kingdoms in a bold attempt to restore the Roman Empire.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "The Hagia Sophia, built by Justinian in Constantinople between 532–537 CE, was the largest cathedral in the world for nearly a thousand years — an architectural marvel that still stands today.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "The Plague of Justinian (541–549 CE) was the first pandemic of bubonic plague in recorded history, killing an estimated 25–50 million people and devastating the Byzantine Empire's economy and military.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "The Justinian Code (Corpus Juris Civilis, 529–534 CE) compiled and rationalized Roman law into a single authoritative text — the foundation of legal systems across Europe and Latin America to this day.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5", "map_label": "Italy"}, {"fact": "Benedict of Nursia (~480–547 CE) wrote the Benedictine Rule, establishing the framework for Western monasticism: communal life, regular prayer, manual labor, and stability. Benedictine monasteries would become the cultural backbone of medieval Europe.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=53.4,-8.2&zoom=6&size=280x180&markers=53.4,-8.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-13.2,48.4,-3.1999999999999993,58.4&layer=mapnik&marker=53.4,-8.2", "map_label": "Ireland / Western Monasticism"}, {"fact": "The Nika Riots (532 CE) nearly toppled Justinian — Constantinople's chariot-racing factions united against him, burning half the city. His empress Theodora famously shamed him out of fleeing, and the rebellion was crushed with 30,000 deaths.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "Theodora (~500–548 CE), Justinian's empress, was one of the most powerful women in Byzantine history — a former actress who became co-ruler, influencing theology, law, and foreign policy.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "The Ostrogothic Kingdom of Italy, established by Theodoric the Great, collapsed under Byzantine pressure during
