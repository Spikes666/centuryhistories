-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=0.5,41.2,20.5,61.2&layer=mapnik&marker=51.2,10.5", "map_label": "Germany"}, {"fact": "The Manhattan Project produced the atomic bomb — tested at Trinity, New Mexico in July 1945 CE — and the bombs dropped on Hiroshima (August 6) and Nagasaki (August 9) killed 130,000–226,000 people and ended World War II in the Pacific.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=36.2,138.3&zoom=5&size=280x180&markers=36.2,138.3,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=128.3,26.200000000000003,148.3,46.2&layer=mapnik&marker=36.2,138.3", "map_label": "Japan"}, {"fact": "The Great Depression (1929–1939 CE) was triggered by the Wall Street Crash and spread globally — unemployment reached 25% in America, destroying the economic and political stability that might have prevented Hitler's rise and the second World War.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=38.9,-95.7&zoom=4&size=280x180&markers=38.9,-95.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-115.7,18.9,-75.7,58.9&layer=mapnik&marker=38.9,-95.7", "map_label": "United States"}, {"fact": "Stalin's collectivization of Soviet agriculture (1929–1933 CE) and the Holodomor — a famine that killed 3.5–5 million Ukrainians — was a man-made catastrophe resulting from forced collectivization, proving that communist ideology could produce mass murder on par with fascism.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=55.8,37.6&zoom=4&size=280x180&markers=55.8,37.6,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=17.6,35.8,57.6,75.8&layer=mapnik&marker=55.8,37.6", "map_label": "Russia"}, {"fact": "Mahatma Gandhi's non-violent resistance movement (satyagraha) challenged British rule in India — his Salt March (1930 CE), civil disobedience campaigns, and moral authority made him the most influential figure in the anti-colonial movement.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "Albert Einstein's special relativity (1905 CE) and general relativity (1915 CE) overthrew Newtonian physics — redefining space, time, and gravity in ways that GPS technology, nuclear energy, and cosmology all depend on today.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=3&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-10.0,5.0,50.0,65.0&layer=mapnik&marker=35.0,20.0", "map_label": "The Mediterranean / World"}, {"fact": "The Chinese Communist Revolution, following decades of warlordism, Japanese invasion, and civil war, brought Mao Zedong to power in 1949 CE — the People's Republic of China was proclaimed on October 1, establishing a communist state of 550 million people.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "The Nuremberg Trials (1945–1946 CE) prosecuted Nazi leaders for war crimes and crimes against humanity — establishing the principle that individuals can be held accountable under international law, a foundation of the modern human rights framework.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=50.0,14.0&zoom=4&size=280x180&markers=50.0,14.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-6.0,30.0,34.0,70.0&layer=mapnik&marker=50.0,14.0", "map_label": "World War II Europe"}, {"fact": "Penicillin, discovered by Alexander Fleming in 1928 CE and developed by Florey and Chain in the 1940s, was the first antibiotic — transforming medicine and saving hundreds of millions of lives from bacterial infections that had previously been death sentences.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5", "map_label": "Italy"}, {"fact": "The United Nations was founded in 1945 CE by 51 nations in the aftermath of World War II — embodying the hope that international institutions could prevent future wars, a hope partly realized and partly not, as the Cold War began almost immediately.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=50.0,14.0&zoom=4&size=280x180&markers=50.0,14.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-6.0,30.0,34.0,70.0&layer=mapnik&marker=50.0,14.0", "map_label": "World War II Europe"}, {"fact": "By 1945 CE, the old European empires were fatally weakened, America and the Soviet Union had emerged as superpowers, the atomic bomb had made total war between great powers suicidal, and the world was about to embark on the Cold War — the defining geopolitical contest of the century's second half.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=55.8,37.6&zoom=4&size=280x180&markers=55.8,37.6,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=17.6,35.8,57.6,75.8&layer=mapnik&marker=55.8,37.6", "map_label": "Russia"}]}, {"id": "20th_century_late", "era": "Modern World (1900–present)", "label": "Late 20th Century (1945–1999 CE)", "summary": "The second half of the 20th century is shaped by the Cold War, decolonization, the civil rights movement, the digital revolution, and the collapse of the Soviet Union — an era of both nuclear terror and extraordinary human progress.", "facts": [{"fact": "The Cold War (1947–1991 CE) divided the world between American-led capitalism and Soviet-led communism — a geopolitical contest that never became direct military conflict between the superpowers but produced proxy wars, nuclear terror, and an arms race that consumed vast resources.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=55.8,37.6&zoom=4&size=280x180&markers=55.8,37.6,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=17.6,35.8,57.6,75.8&layer=mapnik&marker=55.8,37.6", "map_label": "Russia"}, {"fact": "The Marshall Plan (1948 CE) provided $13 billion in American aid to rebuild Western Europe after World War II — one of the most successful foreign policy initiatives in history, creating the prosperous, stable democracies that became America's Cold War allies.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=38.9,-95.7&zoom=4&size=280x180&markers=38.9,-95.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-115.7,18.9,-75.7,58.9&layer=mapnik&marker=38.9,-95.7", "map_label": "United States"}, {"fact": "The founding of Israel (1948 CE) fulfilled the Zionist dream but immediately triggered the Arab-Israeli War — Palestinian Arabs call 1948 the Nakba ('catastrophe'), as 700,000 Palestinians were displaced, a conflict whose wounds remain open today.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "India's independence and partition (1947 CE) created two nations — India and Pakistan — along religious lines, triggering one of history's largest mass migrations (15 million people) and communal violence that killed up to 2 million people.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=20.6,79.0&zoom=4&size=280x180&markers=20.6,79.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=59.0,0.6000000000000014,99.0,40.6&layer=mapnik&marker=20.6,79.0", "map_label": "India"}, {"fact": "The Korean War (1950–1953 CE) was the first 'hot' conflict of the Cold War — American-led UN forces and Chinese troops fought to a stalemate, dividing the peninsula at the 38th parallel. The armistice that ended fighting left Korea divided, as it remains today.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "The Cuban Missile Crisis (October 1962 CE) brought the world closest to nuclear war — Soviet missiles in Cuba, discovered by American reconnaissance, triggered 13 days of superpower confrontation that ended with Soviet withdrawal in exchange for US pledges not to invade Cuba.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "The Civil Rights Movement in America, led by Martin Luther King Jr., used non-violent resistance to challenge racial segregation — the March on Washington (1963 CE), the Civil Rights Act (1964 CE), and the Voting Rights Act (1965 CE) dismantled the legal architecture of American apartheid.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=38.9,-95.7&zoom=4&size=280x180&markers=38.9,-95.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-115.7,18.9,-75.7,58.9&layer=mapnik&marker=38.9,-95.7", "map_label": "United States"}, {"fact": "The Vietnam War (1955–1975 CE) was America's defining Cold War trauma — 58,000 Americans and 2 million Vietnamese died in a conflict that ended in American defeat, shattered domestic consensus, and produced the 'Vietnam syndrome' of reluctance to commit military force.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5", "map_label": "Italy"}, {"fact": "The decolonization of Africa and Asia (1945–1975 CE) ended European empires — dozens of new nations gained independence, but colonial borders drawn without regard to ethnic realities, resource extraction, and Cold War interference left many in poverty and conflict.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=8.0,21.0&zoom=4&size=280x180&markers=8.0,21.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=1.0,-12.0,41.0,28.0&layer=mapnik&marker=8.0,21.0", "map_label": "Africa"}, {"fact": "The moon landing (July 20, 1969 CE) — Neil Armstrong's first steps on the Moon during Apollo 11 — was the greatest human technological achievement and the culmination of the Space Race between America and the Soviet Union.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=55.8,37.6&zoom=4&size=280x180&markers=55.8,37.6,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=17.6,35.8,57.6,75.8&layer=mapnik&marker=55.8,37.6", "map_label": "Russia"}, {"fact": "The Cultural Revolution in China (1966–1976 CE) under Mao Zedong mobilized youth to destroy 'bourgeois' culture — temples, books, and artifacts were destroyed, intellectuals were persecuted, and an estimated 500,000–2 million people died in political violence.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "The collapse of the Soviet Union (1991 CE) — the most consequential geopolitical event since World War II — ended the Cold War, liberated Eastern Europe, and left America as the world's sole superpower, raising hopes for a 'unipolar moment' of democratic peace.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=55.8,37.6&zoom=4&size=280x180&markers=55.8,37.6,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=17.6,35.8,57.6,75.8&layer=mapnik&marker=55.8,37.6", "map_label": "Russia"}, {"fact": "The invention of the internet — ARPANET (1969 CE) evolving into the World Wide Web (Tim Berners-Lee, 1989 CE) — began the Information Revolution that would transform communication, commerce, politics, and human social life as profoundly as the printing press.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=38.9,-95.7&zoom=4&size=280x180&markers=38.9,-95.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-115.7,18.9,-75.7,58.9&layer=mapnik&marker=38.9,-95.7", "map_label": "United States"}, {"fact": "The HIV/AIDS pandemic, identified in 1981 CE, killed over 35 million people by the early 21st century — disproportionately affecting gay men, Africans, and intravenous drug users, it exposed both medical ignorance and social prejudice before antiretroviral drugs transformed it into a manageable condition.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=8.0,21.0&zoom=4&size=280x180&markers=8.0,21.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=1.0,-12.0,41.0,28.0&layer=mapnik&marker=8.0,21.0", "map_label": "Africa"}, {"fact": "The fall of the Berlin Wall (November 9, 1989 CE) symbolized the end of communist Eastern Europe — images of jubilant Germans tearing down the wall were among the most powerful of the 20th century, marking the end of Europe's division.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.2,10.5&zoom=5&size=280x180&markers=51.2,10.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=0.5,41.2,20.5,61.2&layer=mapnik&marker=51.2,10.5", "map_label": "Germany"}, {"fact": "The Rwandan Genocide (1994 CE) killed approximately 800,000 Tutsis and moderate Hutus in 100 days — the international community's failure to intervene despite clear warning became a defining moment of shame and produced the 'Responsibility to Protect' doctrine in international law.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=8.0,21.0&zoom=4&size=280x180&markers=8.0,21.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=1.0,-12.0,41.0,28.0&layer=mapnik&marker=8.0,21.0", "map_label": "Africa"}, {"fact": "The Human Genome Project, completed in 2003 CE (begun in 1990), sequenced the entire human DNA — opening the era of genomic medicine, gene therapy, and ethical debates about genetic engineering that continue today.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5", "map_label": "Italy"}, {"fact": "The 1990s saw unprecedented economic globalization — the World Trade Organization (1995 CE), NAFTA, and China's integration into world trade created a global economy that lifted hundreds of millions from poverty while also producing inequality, environmental damage, and political backlash.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "Nelson Mandela's release from prison (1990 CE) and election as South Africa's president (1994 CE) ended apartheid through negotiated transition rather than civil war — his model of reconciliation over revenge remains one of the 20th century's most inspiring political achievements.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "By 2000 CE, global life expectancy had risen from 47 years in 1950 to 66 years, child mortality had fallen dramatically, and extreme poverty had declined significantly — the second half of the 20th century saw the greatest improvement in human welfare in history, even amid its unprecedented violence.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=20.0,0.0&zoom=2&size=280x180&markers=20.0,0.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-60.0,-40.0,60.0,80.0&layer=mapnik&marker=20.0,0.0", "map_label": "The Modern World"}]}, {"id": "21st_century", "era": "Modern World (1900–present)", "label": "21st Century (2000–present)", "summary": "The 21st century is defined by the aftermath of 9/11, the rise of China, the digital revolution, climate change, and a global pandemic — an era in which the certainties of the post-Cold War order have dissolved and the shape of the future remains deeply uncertain.", "facts": [{"fact": "The September 11, 2001 attacks — Al-Qaeda hijackers killed 2,977 people in New York, Washington, and Pennsylvania — triggered the Global War on Terror, the invasions of Afghanistan and Iraq, and a reshaping of American foreign policy and civil liberties that continues today.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "The invasion of Iraq (2003 CE) by the US-led coalition, based on false intelligence about weapons of mass destruction, toppled Saddam Hussein but created a power vacuum that produced ISIS and regional chaos — widely regarded as one of the greatest foreign policy blunders of the modern era.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=20.0,100.0&zoom=4&size=280x180&markers=20.0,100.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=80.0,0.0,120.0,40.0&layer=mapnik&marker=20.0,100.0", "map_label": "Asia / Middle East Conflicts"}, {"fact": "China's economic rise has been the most consequential geopolitical development of the 21st century — growing from the world's 6th largest economy in 2000 to the 2nd largest by 2010, lifting 800 million people from poverty in the most rapid economic transformation in history.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "The 2008 global financial crisis — triggered by the collapse of the US subprime mortgage market — was the worst economic disaster since the Great Depression, requiring massive government bailouts of banks and producing a decade of austerity, inequality, and political polarization.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=20.0,100.0&zoom=4&size=280x180&markers=20.0,100.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=80.0,0.0,120.0,40.0&layer=mapnik&marker=20.0,100.0", "map_label": "Asia / Middle East Conflicts"}, {"fact": "The Arab Spring (2010–2012 CE) brought mass protests that toppled governments in Tunisia, Egypt, Libya, and Yemen — initially celebrated as a democratic awakening, it mostly produced civil wars, authoritarian retrenchment, and the rise of ISIS in Syria and Iraq.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Syrian Civil War (began 2011 CE) produced the worst refugee crisis since World War II — over 13 million Syrians were displaced, 6.6 million as refugees, contributing to the migration crisis that fueled populist nationalism across Europe.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=38.9,-95.7&zoom=4&size=280x180&markers=38.9,-95.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-115.7,18.9,-75.7,58.9&layer=mapnik&marker=38.9,-95.7", "map_label": "United States"}, {"fact": "The smartphone revolution — Apple's iPhone launched in 2007 CE — put the internet in everyone's pocket, transforming social interaction, commerce, politics, and attention spans. By 2020, over 3.5 billion people owned smartphones.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "The rise of social media — Facebook (2004 CE), Twitter (2006 CE), YouTube (2005 CE), Instagram (2010 CE) — transformed political communication, enabled Arab Spring organizing, spread misinformation, amplified polarization, and created new forms of surveillance capitalism.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "CRISPR-Cas9 gene editing technology, developed by Jennifer Doudna and Emmanuelle Charpentier (Nobel Prize 2020 CE), allows precise editing of DNA — opening possibilities for curing genetic diseases and raising profound ethical questions about human genetic engineering.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=20.0,0.0&zoom=2&size=280x180&markers=20.0,0.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-60.0,-40.0,60.0,80.0&layer=mapnik&marker=20.0,0.0", "map_label": "The Modern World"}, {"fact": "Climate change emerged as the defining long-term challenge of the 21st century — the Paris Agreement (2015 CE) committed nearly every nation to reducing carbon emissions, but implementation has fallen far short of what scientists say is necessary to avoid catastrophic warming.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=46.2,2.2&zoom=5&size=280x180&markers=46.2,2.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.8,36.2,12.2,56.2&layer=mapnik&marker=46.2,2.2", "map_label": "France"}, {"fact": "The COVID-19 pandemic (2020–2023 CE) killed over 7 million people officially (likely 15–20 million excess deaths) and disrupted global society more profoundly than any event since World War II — accelerating remote work, e-commerce, and vaccine development while exposing deep inequalities.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "mRNA vaccines, developed with unprecedented speed during COVID-19 (Pfizer/BioNTech and Moderna, 2020 CE), represented human species that Bart Ehrman's generation of scholars never imagined possible.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=38.9,-95.7&zoom=4&size=280x180&markers=38.9,-95.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-115.7,18.9,-75.7,58.9&layer=mapnik&marker=38.9,-95.7", "map_label": "United States"}, {"fact": "As of 2024 CE, humanity faces an unprecedented convergence of challenges — climate change, artificial intelligence, nuclear proliferation, democratic backsliding, and pandemic risk — alongside extraordinary opportunities in medicine, clean energy, and human connection. The outcome of these tensions will determine the shape of human civilization for centuries.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5", "map_label": "Italy"}]}]};
const ERA_STYLES    = {"Ancient World (Pre-CE \u2013 500 CE)": {"color": "#c17f3a", "bg": "#2a1f10", "icon": "\ud83c\udfdb\ufe0f"}, "Medieval (500\u20131300)": {"color": "#7a9e5f", "bg": "#111a0f", "icon": "\u2694\ufe0f"}, "Renaissance & Reformation (1300\u20131600)": {"color": "#a06fc0", "bg": "#1a1025", "icon": "\ud83c\udfa8"}, "Age of Exploration & Enlightenment (1600\u20131800)": {"color": "#4a9ec0", "bg": "#0d1e2a", "icon": "\ud83d\udd2d"}, "Revolutionary Era (1776\u20131900)": {"color": "#c04a4a", "bg": "#2a0f0f", "icon": "\u26a1"}, "Modern World (1900\u2013present)": {"color": "#5aa8a0", "bg": "#0d2220", "icon": "\ud83c\udf10"}};

// ── Flatten facts ──────────────────────────────────────────
let allFacts = [];
for (const century of allData.centuries) {
  for (const f of century.facts) {
    allFacts.push({ century_label: century.label, era: century.era, century_summary: century.summary, ...f });
  }
}

// ── Era groupings ──────────────────────────────────────────
const eraOrder = Object.keys(ERA_STYLES);

function getCenturiesByEra() {
  const map = {};
  for (const era of eraOrder) map[era] = [];
  for (const c of allData.centuries) {
    if (map[c.era]) map[c.era].push(c);
  }
  return map;
}

// ── Day logic ──────────────────────────────────────────────
function getDayIndex() {
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.floor((today - START_DATE) / 86400000);
}

function getTodaysFacts() {
  const total = allFacts.length, d = getDayIndex();
  const s = (d * FACTS_PER_DAY) % total;
  const e = s + FACTS_PER_DAY;
  return e <= total ? allFacts.slice(s, e) : [...allFacts.slice(s), ...allFacts.slice(0, e - total)];
}

// ── Card HTML ──────────────────────────────────────────────
function cardHTML(f, num, total, delay) {
  const es = ERA_STYLES[f.era] || ERA_STYLES[eraOrder[0]];
  return `
    <div class="card" style="animation-delay:${delay}s; --era-color:${es.color}">
      <div class="card-body">
        <div class="card-meta">
          <span class="card-num">Fact ${num} of ${total}</span>
          <span class="card-era-pip" style="background:${es.color}" title="${f.era}"></span>
        </div>
        <p class="card-fact">${f.fact}</p>
      </div>
      <div class="card-map">
        <iframe src="${f.map_iframe}" loading="lazy" scrolling="no" frameborder="0" title="${f.map_label}"></iframe>
        <div class="card-map-label">📍 ${f.map_label}</div>
      </div>
    </div>`;
}

// ── Today view ─────────────────────────────────────────────
function renderToday() {
  const d         = getDayIndex();
  const totalDays = Math.ceil(allFacts.length / FACTS_PER_DAY);
  const cycleDay  = (d % totalDays) + 1;
  const block     = getTodaysFacts();
  const centuries = [...new Set(block.map(f => f.century_label))];
  const dateStr   = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  const eras      = [...new Set(block.map(f => f.era))];
  const era       = eras[0];
  const es        = ERA_STYLES[era] || {};

  document.getElementById('header-day').textContent   = `Day ${cycleDay} of ${totalDays}`;
  document.getElementById('header-title').textContent = centuries.join(' & ');
  document.getElementById('header-date').textContent  = dateStr;

  const badge = document.getElementById('header-era-badge');
  badge.style.display = 'inline-flex';
  badge.style.color   = es.color || '#c8922a';
  badge.style.borderColor = (es.color || '#c8922a') + '55';
  badge.innerHTML = `${es.icon || ''} ${era || ''}`;

  document.getElementById('era-bar').classList.remove('visible');
  document.getElementById('cards').innerHTML = block.map((f,i) => cardHTML(f, i+1, block.length, i*0.07)).join('');
}

// ── Browse view ────────────────────────────────────────────
let activeCentury = 0;

function buildEraBar() {
  const byEra = getCenturiesByEra();
  const bar   = document.getElementById('era-bar');
  bar.innerHTML = eraOrder.map(era => {
    const es = ERA_STYLES[era];
    const centuries = byEra[era];
    if (!centuries || !centuries.length) return '';
    const btns = centuries.map((c, i) => {
      const globalIdx = allData.centuries.indexOf(c);
      return `<button class="century-btn" data-idx="${globalIdx}" onclick="selectCentury(${globalIdx})">${c.label.replace(/ CE.*|\(.*\)/g,'').trim()}</button>`;
    }).join('');
    return `
      <div class="era-section">
        <div class="era-label">
          <span class="era-label-dot" style="background:${es.color}"></span>
          ${es.icon} ${era}
        </div>
        <div class="era-centuries">${btns}</div>
      </div>`;
  }).join('');
}

function selectCentury(idx) {
  activeCentury = idx;
  document.querySelectorAll('.century-btn').forEach(b => {
    const isActive = parseInt(b.dataset.idx) === idx;
    b.classList.toggle('active', isActive);
    if (isActive) {
      const era = allData.centuries[idx].era;
      const es  = ERA_STYLES[era] || {};
      b.style.background   = (es.color || '#888') + '22';
      b.style.borderColor  = es.color || '#888';
      b.style.color        = es.color || '#888';
    } else {
      b.style.background  = '';
      b.style.borderColor = '';
      b.style.color       = '';
    }
  });
  renderCentury(idx);
}

function renderCentury(idx) {
  const century = allData.centuries[idx];
  const es      = ERA_STYLES[century.era] || {};

  document.getElementById('header-day').textContent   = 'Browse · Century Histories';
  document.getElementById('header-title').textContent = century.label;
  document.getElementById('header-date').textContent  = '';

  const badge = document.getElementById('header-era-badge');
  badge.style.display = 'inline-flex';
  badge.style.color   = es.color || '#c8922a';
  badge.style.borderColor = (es.color || '#c8922a') + '55';
  badge.innerHTML = `${es.icon || ''} ${century.era}`;

  const summaryHTML = `
    <div class="summary-card" style="border-color:${es.color}33">
      <div class="summary-label" style="color:${es.color}">${es.icon} ${century.era}</div>
      <div class="summary-title">${century.label}</div>
      <p class="summary-text">${century.summary}</p>
    </div>`;

  document.getElementById('cards').innerHTML =
    summaryHTML +
    century.facts.map((f, i) => cardHTML({...f, era: century.era}, i+1, century.facts.length, (i+1)*0.05)).join('');
}

// ── Tab switching ──────────────────────────────────────────
function showToday() {
  document.getElementById('btn-today').classList.add('active');
  document.getElementById('btn-browse').classList.remove('active');
  document.getElementById('era-bar').classList.remove('visible');
  renderToday();
}

function showBrowse() {
  document.getElementById('btn-browse').classList.add('active');
  document.getElementById('btn-today').classList.remove('active');
  document.getElementById('era-bar').classList.add('visible');
  selectCentury(activeCentury);
}

// ── Init ───────────────────────────────────────────────────
buildEraBar();
renderToday();
</script>
</body>
</html>
