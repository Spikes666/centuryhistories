uine insight with medieval mysticism.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=3&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-10.0,5.0,50.0,65.0&layer=mapnik&marker=35.0,20.0", "map_label": "The Mediterranean / World"}, {"fact": "The Battle of Ain Jalut (1260 CE) was the first decisive Mongol defeat — Mamluk forces from Egypt stopped the Mongol advance into the Middle East, saving Egypt, North Africa, and western Islam from conquest.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The founding of the mendicant orders — Franciscans (1209 CE) and Dominicans (1216 CE) — transformed medieval Catholicism, creating mobile orders of friars who preached in cities, staffed the inquisition, and dominated Europe's universities.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=3&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-10.0,5.0,50.0,65.0&layer=mapnik&marker=35.0,20.0", "map_label": "The Mediterranean / World"}, {"fact": "Dante Alighieri was born in 1265 CE — his 'Divine Comedy,' written in the early 14th century, is the supreme literary achievement of medieval Europe, a comprehensive vision of Christian cosmology that defined Italian as a literary language.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5", "map_label": "Italy"}, {"fact": "The Mongol Pax (Pax Mongolica) that followed the conquests created the conditions for unprecedented Eurasian trade — the Silk Road functioned more safely than ever before, enabling the exchange of goods, peoples, diseases, and ideas across the entire continent.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=47.9,106.9&zoom=4&size=280x180&markers=47.9,106.9,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=86.9,27.9,126.9,67.9&layer=mapnik&marker=47.9,106.9", "map_label": "Mongolia"}, {"fact": "Kublai Khan (1215–1294 CE), grandson of Genghis, conquered China and founded the Yuan Dynasty — he employed foreign administrators (including Marco Polo), patronized the arts, and attempted failed invasions of Japan and Java.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=47.9,106.9&zoom=4&size=280x180&markers=47.9,106.9,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=86.9,27.9,126.9,67.9&layer=mapnik&marker=47.9,106.9", "map_label": "Mongolia"}, {"fact": "The Black Death's preconditions developed in the 13th century — the Mongol trade routes that facilitated commerce also created the pathways along which Yersinia pestis, the plague bacterium, would travel westward to devastate Europe in the 1340s.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=47.9,106.9&zoom=4&size=280x180&markers=47.9,106.9,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=86.9,27.9,126.9,67.9&layer=mapnik&marker=47.9,106.9", "map_label": "Mongolia"}, {"fact": "The Third Council of the Lateran (1215 CE) under Pope Innocent III required Jews to wear distinctive clothing, prohibited them from public office, and mandated separate neighborhoods — institutionalizing the medieval persecution that would mark European Jews for centuries.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=3&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-10.0,5.0,50.0,65.0&layer=mapnik&marker=35.0,20.0", "map_label": "The Mediterranean / World"}, {"fact": "The Reconquista advanced dramatically in the 13th century — the Battle of Las Navas de Tolosa (1212 CE) broke Almohad power, and by 1250 CE only the emirate of Granada remained under Muslim rule in Iberia.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "By 1300 CE, Europe's population had reached perhaps 75 million — the highest it would reach before the Black Death. Cities were growing, trade was expanding, universities were multiplying, and Gothic cathedrals were rising. The great medieval experiment in civilization was at its peak — and on the verge of catastrophe.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=3&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-10.0,5.0,50.0,65.0&layer=mapnik&marker=35.0,20.0", "map_label": "The Mediterranean / World"}]}, {"id": "14th_century", "era": "Renaissance & Reformation (1300–1600)", "label": "14th Century CE (1300–1399 CE)", "summary": "The 14th century is one of catastrophe: the Black Death kills a third of Europe, the Hundred Years' War begins, the papacy moves to Avignon, and the medieval synthesis begins to crack. Yet it also sees Chaucer, Petrarch, and the early stirrings of the Renaissance.", "facts": [{"fact": "The Black Death (1347–1351 CE) killed between a third and half of Europe's population — approximately 25 million people — in four years. It was the greatest demographic catastrophe in European history, transforming society, economics, and religion permanently.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "The Black Death arrived in Europe via Crimean trading posts in 1346 CE — Genoese merchants fleeing the Mongol siege of Caffa may have brought it to Sicily, and it spread with devastating speed along trade routes across the continent.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5", "map_label": "Italy"}, {"fact": "The psychological impact of the Black Death was immense — the 'Dance of Death' (Danse Macabre) imagery, the flagellant movement, pogroms against Jews blamed for poisoning wells, and a profound questioning of the church's authority all followed in its wake.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=20.0,0.0&zoom=2&size=280x180&markers=20.0,0.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-60.0,-40.0,60.0,80.0&layer=mapnik&marker=20.0,0.0", "map_label": "The Modern World"}, {"fact": "The Hundred Years' War (1337–1453 CE) between England and France began over succession disputes — a century of intermittent warfare that defined both nations' identities, produced Joan of Arc, and ended English territorial claims in France.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=46.2,2.2&zoom=5&size=280x180&markers=46.2,2.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.8,36.2,12.2,56.2&layer=mapnik&marker=46.2,2.2", "map_label": "France"}, {"fact": "The Battle of Crécy (1346 CE) demonstrated the devastating effectiveness of the English longbow against French heavy cavalry — the first of several battles that showed medieval knights were no longer the dominant force on the battlefield.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=20.0,0.0&zoom=2&size=280x180&markers=20.0,0.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-60.0,-40.0,60.0,80.0&layer=mapnik&marker=20.0,0.0", "map_label": "The Modern World"}, {"fact": "The Avignon Papacy (1309–1377 CE) saw seven popes reside in Avignon rather than Rome under French influence — undermining papal credibility and contributing to the Great Schism (1378–1417 CE) when rival popes simultaneously claimed the throne of St. Peter.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5", "map_label": "Italy"}, {"fact": "Petrarch (1304–1374 CE), often called the 'first humanist,' revived the study of classical Latin literature and wrote poetry in Italian — his love poems to Laura in the 'Canzoniere' established the sonnet form that would influence Shakespeare.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=3&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-10.0,5.0,50.0,65.0&layer=mapnik&marker=35.0,20.0", "map_label": "The Mediterranean / World"}, {"fact": "Giovanni Boccaccio's 'Decameron' (1353 CE), written in the wake of the Black Death, told 100 stories through characters sheltering from the plague — a landmark of Italian literature and a window into 14th-century attitudes toward mortality, sex, and social class.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=3&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-10.0,5.0,50.0,65.0&layer=mapnik&marker=35.0,20.0", "map_label": "The Mediterranean / World"}, {"fact": "Geoffrey Chaucer's 'Canterbury Tales' (~1387–1400 CE) is the first great work of English literature — a sophisticated, funny, and psychologically acute portrait of medieval English society told through pilgrims on their way to Thomas Becket's shrine.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=20.0,0.0&zoom=2&size=280x180&markers=20.0,0.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-60.0,-40.0,60.0,80.0&layer=mapnik&marker=20.0,0.0", "map_label": "The Modern World"}, {"fact": "The Peasants' Revolt in England (1381 CE) was a massive popular uprising triggered by a poll tax — the rebels briefly controlled London and killed the Archbishop of Canterbury before being suppressed. It reflected the social upheaval the Black Death had caused.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "William of Ockham (~1287–1347 CE) developed 'Ockham's Razor' — the principle that the simplest explanation is preferable — and argued for the separation of faith and reason, undermining the Thomistic synthesis and pointing toward empirical science.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=20.0,0.0&zoom=2&size=280x180&markers=20.0,0.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-60.0,-40.0,60.0,80.0&layer=mapnik&marker=20.0,0.0", "map_label": "The Modern World"}, {"fact": "The Ottoman Empire was founded by Osman I (~1299 CE) — beginning as a small Anatolian principality, the Ottomans would eventually conquer Constantinople (1453 CE) and become one of the world's great empires.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "The Mali Empire under Mansa Musa (1312–1337 CE) was one of the wealthiest states in the world — his famous pilgrimage to Mecca in 1324 CE, during which he gave away so much gold that he depressed Egyptian gold prices for a decade, demonstrated Sub-Saharan Africa's sophistication.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Yuan Dynasty's collapse in China (1368 CE) and the founding of the Ming Dynasty represented a Chinese rejection of Mongol rule and foreign influence — the Ming would build the Great Wall to its present extent and dispatch Zheng He's great naval expeditions.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=47.9,106.9&zoom=4&size=280x180&markers=47.9,106.9,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=86.9,27.9,126.9,67.9&layer=mapnik&marker=47.9,106.9", "map_label": "Mongolia"}, {"fact": "John Wycliffe (~1320–1384 CE) argued that the Bible should be available in English and that the church had no legitimate claim to temporal power — his followers (the Lollards) were precursors of the Protestant Reformation, and his ideas influenced Jan Hus in Bohemia.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=52.4,4.9&zoom=6&size=280x180&markers=52.4,4.9,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-0.09999999999999964,47.4,9.9,57.4&layer=mapnik&marker=52.4,4.9", "map_label": "Netherlands"}, {"fact": "The Aztec Empire had its origins in this period — the Mexica people settled at Tenochtitlan (modern Mexico City) in 1325 CE, beginning the city that would become the largest in the Americas before the Spanish conquest.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=38.9,-95.7&zoom=4&size=280x180&markers=38.9,-95.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-115.7,18.9,-75.7,58.9&layer=mapnik&marker=38.9,-95.7", "map_label": "United States"}, {"fact": "The Bubonic Plague recurred repeatedly after the initial 1347–1351 outbreak — it would return to Europe in waves for the next three centuries, keeping population levels depressed and labor scarce, inadvertently creating conditions for peasant empowerment and wage increases.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=3&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-10.0,5.0,50.0,65.0&layer=mapnik&marker=35.0,20.0", "map_label": "The Mediterranean / World"}, {"fact": "The Mongol Empire's dissolution into competing successor states — the Golden Horde, the Ilkhanate, the Chagatai Khanate, and the Yuan Dynasty — ended the Pax Mongolica and disrupted the Eurasian trade routes that had connected East and West.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=47.9,106.9&zoom=4&size=280x180&markers=47.9,106.9,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=86.9,27.9,126.9,67.9&layer=mapnik&marker=47.9,106.9", "map_label": "Mongolia"}, {"fact": "Timur (Tamerlane, 1336–1405 CE) rose to power in Central Asia, conquering an empire from Turkey to India in campaigns of extraordinary brutality — his sack of Delhi (1398 CE) left 100,000 civilians dead and set back Indian civilization by decades.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=20.6,79.0&zoom=4&size=280x180&markers=20.6,79.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=59.0,0.6000000000000014,99.0,40.6&layer=mapnik&marker=20.6,79.0", "map_label": "India"}, {"fact": "By 1400 CE, Europe was a transformed continent — the Black Death had killed millions but inadvertently empowered survivors with higher wages and social mobility, the church's authority was contested, and the humanist movement was beginning to look back to classical antiquity for inspiration rather than medieval theology.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}]}, {"id": "15th_century", "era": "Renaissance & Reformation (1300–1600)", "label": "15th Century CE (1400–1499 CE)", "summary": "The 15th century is one of history's great pivots: the fall of Constantinople ends the Byzantine Empire, Gutenberg's printing press transforms communication, Columbus reaches the Americas, and the Italian Renaissance produces Leonardo, Michelangelo, and Botticelli.", "facts": [{"fact": "The fall of Constantinople to Ottoman Sultan Mehmed II on May 29, 1453 CE ended the Byzantine Empire after 1,100 years — the last Roman emperor, Constantine XI, died fighting on the walls. Greek scholars fleeing to Italy brought classical manuscripts that fueled the Renaissance.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "Gutenberg's printing press (~1440–1450 CE) was the most transformative communication technology between writing and the internet — within 50 years of its invention, over 20 million books had been printed across Europe, democratizing access to knowledge.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=20.0,0.0&zoom=2&size=280x180&markers=20.0,0.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-60.0,-40.0,60.0,80.0&layer=mapnik&marker=20.0,0.0", "map_label": "The Modern World"}, {"fact": "Christopher Columbus's first voyage to the Americas (1492 CE) initiated the Columbian Exchange — the transfer of plants, animals, diseases, and peoples between hemispheres that transformed global ecology, demographics, and economics more profoundly than any other event.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "The Spanish Inquisition, established in 1478 CE, was more about enforcing religious and social conformity than hunting witches — its targets were primarily conversos (Jewish converts to Christianity) suspected of secretly practicing Judaism.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "Joan of Arc (1412–1431 CE), an illiterate French peasant girl who claimed divine visions, led French armies to decisive victories in the Hundred Years' War, was captured, tried for heresy, and burned at the stake at 19 — becoming France's greatest national heroine.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=46.2,2.2&zoom=5&size=280x180&markers=46.2,2.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.8,36.2,12.2,56.2&layer=mapnik&marker=46.2,2.2", "map_label": "France"}, {"fact": "The Italian Renaissance reached its peak in Florence under the Medici family — bankers who became the greatest art patrons in history, employing Botticelli, Leonardo, Michelangelo, and Raphael in the most extraordinary concentration of artistic genius in Western history.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5", "map_label": "Italy"}, {"fact": "Leonardo da Vinci (1452–1519 CE) was the supreme Renaissance figure — painter of the Last Supper and Mona Lisa, designer of flying machines, tanks, and solar power, anatomist, geologist, and botanist. His notebooks contain ideas 300 years ahead of their time.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5", "map_label": "Italy"}, {"fact": "The Ottoman Empire under Mehmed II (1444–1481 CE) consolidated control over Anatolia and the Balkans, conquered Constantinople, and transformed from a frontier emirate into a sophisticated multi-ethnic empire with a legal system, professional bureaucracy, and patronage of the arts.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "The Portuguese Age of Exploration, driven by Prince Henry the Navigator, systematically mapped the African coast — reaching the Cape of Good Hope (1488 CE) and, under Vasco da Gama, India (1498 CE), ending the Islamic monopoly on Eastern trade.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Aztec Empire under Moctezuma I (1440–1469 CE) dominated central Mexico — Tenochtitlan had a population of 200,000, larger than any European city, with sophisticated agriculture, astronomy, and a writing system, when the Spanish arrived in 1519.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "Jan Hus (1369–1415 CE), the Bohemian reformer who built on Wycliffe's ideas, was burned at the Council of Constance after being promised safe conduct — his execution triggered the Hussite Wars, a foretaste of the Reformation's violence a century later.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=45.0,18.0&zoom=5&size=280x180&markers=45.0,18.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=8.0,35.0,28.0,55.0&layer=mapnik&marker=45.0,18.0", "map_label": "Central/Eastern Europe"}, {"fact": "The Medici Bank, founded by Giovanni di Bicci de' Medici in 1397 CE, developed double-entry bookkeeping, letters of credit, and branch banking — financial innovations that laid the groundwork for modern capitalism.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5", "map_label": "Italy"}, {"fact": "Nicolaus Copernicus (1473–1543 CE) was born in this century and was developing his heliocentric theory by its end — his 'De Revolutionibus' (1543 CE) would trigger the Scientific Revolution, but he waited until his deathbed to publish, fearing the reaction.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=38.9,-95.7&zoom=4&size=280x180&markers=38.9,-95.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-115.7,18.9,-75.7,58.9&layer=mapnik&marker=38.9,-95.7", "map_label": "United States"}, {"fact": "The Wars of the Roses (1455–1487 CE) in England — a dynastic civil war between the houses of Lancaster and York — ended with the Tudor dynasty's establishment under Henry VII, creating the stable monarchy that would produce Henry VIII and Elizabeth I.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "Sandro Botticelli's 'Birth of Venus' (~1484 CE) is emblematic of the Renaissance's rediscovery of classical mythology and the nude human form — commissioned by the Medici, it represents a confident, secular celebration of beauty shocking by medieval standards.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5", "map_label": "Italy"}, {"fact": "The Songhai Empire dominated West Africa in the 15th century — under Sunni Ali (1464–1492 CE) and Askia the Great, Timbuktu became a major center of Islamic scholarship with a university that attracted scholars from across the Muslim world.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The invention of the printing press had immediate religious consequences — the Bible could now be mass-produced, read by individuals in their vernacular languages, and interpreted without priestly mediation, making the Reformation both possible and inevitable.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=3&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-10.0,5.0,50.0,65.0&layer=mapnik&marker=35.0,20.0", "map_label": "The Mediterranean / World"}, {"fact": "Vlad III 'the Impaler' of Wallachia (~1428–1477 CE) — the inspiration for Bram Stoker's Dracula — was a real ruler who resisted Ottoman expansion with extraordinary cruelty, impaling thousands of prisoners as a psychological deterrent.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=39.0,35.0&zoom=5&size=280x180&markers=39.0,35.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=25.0,29.0,45.0,49.0&layer=mapnik&marker=39.0,35.0", "map_label": "Ottoman Empire / Turkey"}, {"fact": "The expulsion of Jews and Muslims from Spain (1492 CE) — the same year as Columbus — was one of medieval Europe's great tragedies. Spanish Jews (Sephardim) dispersed across the Ottoman Empire, North Africa, and the Netherlands, carrying Iberian culture with them.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "By 1500 CE, the world was on the verge of its greatest transformation — the Americas were about to be 'discovered' by Europeans who would conquer, colonize, and devastate indigenous civilizations; the printing press was about to rupture religious unity; and science was about to challenge faith.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=38.9,-95.7&zoom=4&size=280x180&markers=38.9,-95.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-115.7,18.9,-75.7,58.9&layer=mapnik&marker=38.9,-95.7", "map_label": "United States"}]}, {"id": "16th_century", "era": "Renaissance & Reformation (1300–1600)", "label": "16th Century CE (1500–1599 CE)", "summary": "The 16th century reshapes the world: the Protestant Reformation splits Christianity, the Spanish conquer the Americas, Copernicus and Galileo begin the Scientific Revolution, and the Ottoman Empire reaches its peak under Suleiman the Magnificent.", "facts": [{"fact": "Martin Luther nailed his 95 Theses to the Wittenberg church door on October 31, 1517 CE — a protest against the sale of indulgences that, amplified by the printing press, ignited the Protestant Reformation and permanently fractured Western Christianity.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.2,10.5&zoom=5&size=280x180&markers=51.2,10.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=0.5,41.2,20.5,61.2&layer=mapnik&marker=51.2,10.5", "map_label": "Germany"}, {"fact": "The Spanish conquest of the Aztec Empire under Hernán Cortés (1519–1521 CE) and of the Inca Empire under Francisco Pizarro (1532–1533 CE) were among history's most consequential events — sophisticated civilizations of millions were destroyed within decades.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=4.0,-74.0&zoom=3&size=280x180&markers=4.0,-74.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-104.0,-26.0,-44.0,34.0&layer=mapnik&marker=4.0,-74.0", "map_label": "Latin America"}, {"fact": "The Columbian Exchange introduced European diseases — smallpox, measles, influenza — to American populations with no immunity. Estimates suggest 50–90% of indigenous Americans died within a century of contact, the greatest demographic catastrophe in human history.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "Copernicus's 'De Revolutionibus' (1543 CE) proposed that the Earth orbits the Sun — the heliocentric model that displaced humanity from the center of the universe and began the Scientific Revolution that would transform humanity's self-understanding.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=38.9,-95.7&zoom=4&size=280x180&markers=38.9,-95.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-115.7,18.9,-75.7,58.9&layer=mapnik&marker=38.9,-95.7", "map_label": "United States"}, {"fact": "Henry VIII's break with Rome (1534 CE), motivated primarily by his desire to annul his marriage to Catherine of Aragon, created the Church of England — a schism driven by dynastic politics that nevertheless triggered genuine religious debate and eventually produced English Protestantism.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "The Council of Trent (1545–1563 CE) was the Catholic Church's systematic response to the Protestant Reformation — reaffirming core Catholic doctrines, reforming clerical abuses, and launching the Counter-Reformation that won back much of Central Europe.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "Suleiman the Magnificent (1520–1566 CE) ruled the Ottoman Empire at its peak — his armies besieged Vienna twice, controlled the Mediterranean, and his court in Constantinople was a center of law, poetry, and architecture that rivaled anything in Europe.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.0,29.0&zoom=7&size=280x180&markers=41.0,29.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=26.5,38.5,31.5,43.5&layer=mapnik&marker=41.0,29.0", "map_label": "Constantinople (Istanbul)"}, {"fact": "Michelangelo painted the Sistine Chapel ceiling (1508–1512 CE) and carved the David — the supreme achievements of Renaissance art that represent the ultimate expression of human dignity and beauty in the Western tradition.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5", "map_label": "Italy"}, {"fact": "The Spanish silver mines of Potosí (Bolivia, discovered 1545 CE) produced such quantities of silver that they caused inflation across Europe — the 'Price Revolution' of the 16th century disrupted economies from England to China, demonstrating the Americas' global economic impact.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "John Calvin (1509–1564 CE) established a theocratic republic in Geneva — his theology of predestination and emphasis on discipline, hard work, and individual Bible reading shaped Puritanism, Presbyterianism, and (via Max Weber's argument) the spirit of capitalism.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=52.4,4.9&zoom=6&size=280x180&markers=52.4,4.9,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-0.09999999999999964,47.4,9.9,57.4&layer=mapnik&marker=52.4,4.9", "map_label": "Netherlands"}, {"fact": "Ferdinand Magellan's expedition completed the first circumnavigation of the globe (1519–1522 CE), proving Earth's spherical nature and vastness — Magellan himself was killed in the Philippines, but 18 of his 270 men completed the journey.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=10.0,-30.0&zoom=3&size=280x180&markers=10.0,-30.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-60.0,-20.0,0.0,40.0&layer=mapnik&marker=10.0,-30.0", "map_label": "Age of Exploration"}, {"fact": "The Battle of Lepanto (1571 CE) was a decisive naval victory by the Holy League (Spain, Venice, the papacy) over the Ottoman fleet — halting Ottoman expansion in the western Mediterranean and demonstrating that the 'invincible' Ottomans could be defeated.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=37.9,-4.8&zoom=6&size=280x180&markers=37.9,-4.8,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-9.8,32.9,0.20000000000000018,42.9&layer=mapnik&marker=37.9,-4.8", "map_label": "Al-Andalus (Spain)"}, {"fact": "William Shakespeare (1564–1616 CE) wrote his plays during this century's final decades — his works represent the pinnacle of English literature and a comprehensive exploration of human psychology that remains unsurpassed.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=10.0,-30.0&zoom=3&size=280x180&markers=10.0,-30.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-60.0,-20.0,0.0,40.0&layer=mapnik&marker=10.0,-30.0", "map_label": "Age of Exploration"}, {"fact": "The Elizabethan Age (1558–1603 CE) under Queen Elizabeth I was England's golden age — the defeat of the Spanish Armada (1588 CE), the voyages of Francis Drake, the poetry of Edmund Spenser, and the plays of Marlowe and Shakespeare made England a major European power.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "The Mughal Empire, founded by Babur in 1526 CE, became one of the world's great empires under Akbar the Great (1556–1605 CE) — a Muslim ruler who practiced religious tolerance, patronized the arts, and presided over a sophisticated multi-ethnic civilization in India.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "Galileo Galilei (1564–1642 CE) was born in this century — his later astronomical observations with the telescope would confirm Copernicus, challenge Aristotle, and bring him into conflict with the Inquisition in the most famous science-versus-religion confrontation in history.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5", "map_label": "Italy"}, {"fact": "The St. Bartholomew's Day Massacre (1572 CE) — the murder of thousands of French Protestants (Huguenots) in Paris — was the most violent episode of the French Wars of Religion, demonstrating how the Reformation had made sectarian violence a permanent feature of European life.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=46.2,2.2&zoom=5&size=280x180&markers=46.2,2.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.8,36.2,12.2,56.2&layer=mapnik&marker=46.2,2.2", "map_label": "France"}, {"fact": "Francis Bacon (1561–1626 CE) formulated the scientific method — the idea that knowledge should be based on observation, experiment, and induction rather than classical authority — a philosophical revolution that laid the groundwork for modern science.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "The Atlantic slave trade expanded dramatically in the 16th century — Portuguese traders initially brought enslaved Africans to sugar plantations in Brazil and the Caribbean, establishing the horrific system that would transport 12 million people across the Atlantic over the next three centuries.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=8.0,21.0&zoom=4&size=280x180&markers=8.0,21.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=1.0,-12.0,41.0,28.0&layer=mapnik&marker=8.0,21.0", "map_label": "Africa"}, {"fact": "By 1600 CE, the world had been fundamentally transformed — European powers controlled the Americas, the global silver trade connected China to Peru, the Reformation had shattered Christian unity, and the Scientific Revolution was beginning to provide new tools for understanding a universe that was far stranger and larger than anyone had imagined.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}]}, {"id": "17th_century", "era": "Age of Exploration & Enlightenment (1600–1800)", "label": "17th Century CE (1600–1699 CE)", "summary": "The 17th century is the age of scientific revolution and religious war: Galileo, Newton, Descartes, and Locke transform how humanity understands the world; the Thirty Years' War devastates Central Europe; and England undergoes revolution, regicide, and the birth of constitutional monarchy.", "facts": [{"fact": "The Thirty Years' War (1618–1648 CE) devastated Central Europe — beginning as a religious conflict between Catholic and Protestant states, it became a struggle for European dominance, killing up to 8 million people and reducing the population of some German regions by a third.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=52.4,4.9&zoom=6&size=280x180&markers=52.4,4.9,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-0.09999999999999964,47.4,9.9,57.4&layer=mapnik&marker=52.4,4.9", "map_label": "Netherlands"}, {"fact": "The Peace of Westphalia (1648 CE) ended the Thirty Years' War and established the modern system of sovereign nation-states — the principle that states have supreme authority within their borders, regardless of religious affiliation, is the foundation of modern international relations.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=20.0,0.0&zoom=2&size=280x180&markers=20.0,0.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-60.0,-40.0,60.0,80.0&layer=mapnik&marker=20.0,0.0", "map_label": "The Modern World"}, {"fact": "Galileo Galilei's observations with the telescope confirmed Copernicus's heliocentric model, discovered Jupiter's moons, and revealed the Moon's craters — his confrontation with the Inquisition (1633 CE) and forced recantation became the defining symbol of science versus religious authority.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5", "map_label": "Italy"}, {"fact": "Isaac Newton's 'Principia Mathematica' (1687 CE) unified terrestrial and celestial mechanics — his laws of motion and universal gravitation explained everything from falling apples to planetary orbits, representing perhaps the greatest intellectual achievement in human history.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "René Descartes (1596–1650 CE) declared 'I think, therefore I am' — his radical skepticism and dualism of mind and body defined modern philosophy and established the framework of individual rational inquiry that underpins Enlightenment thought.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=3&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-10.0,5.0,50.0,65.0&layer=mapnik&marker=35.0,20.0", "map_label": "The Mediterranean / World"}, {"fact": "The English Civil War (1642–1651 CE) pitted Parliament against King Charles I — the king was defeated, tried, and executed in 1649 CE, the first time a European monarch was publicly tried and executed by his own subjects.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=38.9,-95.7&zoom=4&size=280x180&markers=38.9,-95.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-115.7,18.9,-75.7,58.9&layer=mapnik&marker=38.9,-95.7", "map_label": "United States"}, {"fact": "The Glorious Revolution (1688 CE) replaced the Catholic James II with the Protestant William of Orange — establishing constitutional monarchy in England, the Bill of Rights (1689 CE), and parliamentary sovereignty that directly influenced the American Constitution.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "John Locke (1632–1704 CE) argued that government derives legitimacy from the consent of the governed and must protect natural rights of life, liberty, and property — his political philosophy directly inspired the American Declaration of Independence and French Revolution.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=38.9,-95.7&zoom=4&size=280x180&markers=38.9,-95.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-115.7,18.9,-75.7,58.9&layer=mapnik&marker=38.9,-95.7", "map_label": "United States"}, {"fact": "The founding of Jamestown (1607 CE) and Plymouth Colony (1620 CE) established permanent English settlements in North America — the Pilgrim Fathers' voyage on the Mayflower and the Mayflower Compact became founding myths of American identity.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=38.9,-95.7&zoom=4&size=280x180&markers=38.9,-95.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-115.7,18.9,-75.7,58.9&layer=mapnik&marker=38.9,-95.7", "map_label": "United States"}, {"fact": "The Tokugawa shogunate (established 1603 CE) unified Japan under a military government that expelled Christian missionaries, closed Japan to foreign trade except through Nagasaki, and enforced a rigid social hierarchy — creating the stable, isolated Japan that persisted until 1868.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=36.2,138.3&zoom=5&size=280x180&markers=36.2,138.3,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=128.3,26.200000000000003,148.3,46.2&layer=mapnik&marker=36.2,138.3", "map_label": "Japan"}, {"fact": "The Ottoman siege of Vienna (1683 CE) was the high-water mark of Ottoman expansion into Europe — the failure of the siege and the subsequent Holy League's counteroffensive began the Ottoman Empire's long retreat from Central Europe.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.2,10.5&zoom=5&size=280x180&markers=51.2,10.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=0.5,41.2,20.5,61.2&layer=mapnik&marker=51.2,10.5", "map_label": "Germany"}, {"fact": "The slave trade reached its catastrophic peak in the 17th century — the Royal African Company (founded 1660 CE) transported hundreds of thousands of enslaved Africans to the Caribbean and Americas, while European powers competed for control of the Atlantic trade.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=8.0,21.0&zoom=4&size=280x180&markers=8.0,21.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=1.0,-12.0,41.0,28.0&layer=mapnik&marker=8.0,21.0", "map_label": "Africa"}, {"fact": "Baruch Spinoza (1632–1677 CE) argued that God and Nature are one (pantheism), that the Bible was a human document, and that free thought is essential to good government — he was excommunicated by his Jewish community and his works condemned by Catholics, but his ideas deeply influenced the Enlightenment.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=3&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-10.0,5.0,50.0,65.0&layer=mapnik&marker=35.0,20.0", "map_label": "The Mediterranean / World"}, {"fact": "The Mughal Emperor Aurangzeb (1658–1707 CE) reversed Akbar's religious tolerance, imposing Islamic law on India's Hindu majority and destroying temples — triggering rebellions that weakened the Mughal Empire and eventually enabled British conquest.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=24.7,46.7&zoom=5&size=280x180&markers=24.7,46.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=36.7,14.7,56.7,34.7&layer=mapnik&marker=24.7,46.7", "map_label": "Arabian Peninsula"}, {"fact": "The Scientific Revolution produced not just new knowledge but a new method — the Royal Society (founded 1660 CE) institutionalized peer review, experimental verification, and the publication of results, creating the social structure of modern science.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=38.9,-95.7&zoom=4&size=280x180&markers=38.9,-95.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-115.7,18.9,-75.7,58.9&layer=mapnik&marker=38.9,-95.7", "map_label": "United States"}, {"fact": "The Great Fire of London (1666 CE) destroyed 13,000 houses and 87 churches — its rebuilding by Christopher Wren, including St. Paul's Cathedral, created the architectural framework of modern London.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "Blaise Pascal (1623–1662 CE) pioneered probability theory, invented the mechanical calculator, and wrote the 'Pensées' — his famous 'wager' argued it is rational to believe in God since the potential gain (eternal life) outweighs the cost of belief.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "The Ming Dynasty collapsed in 1644 CE and was replaced by the Qing (Manchu) Dynasty — foreign conquerors who required Chinese men to wear the Manchu queue (braid) as a sign of submission but who largely adopted Chinese culture and governance.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "The Dutch Golden Age (1580–1672 CE) saw the Netherlands become the world's leading trading and financial power — the Dutch East India Company (VOC) was the world's first multinational corporation, and Rembrandt, Vermeer, and Spinoza all flourished in Amsterdam.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=20.6,79.0&zoom=4&size=280x180&markers=20.6,79.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=59.0,0.6000000000000014,99.0,40.6&layer=mapnik&marker=20.6,79.0", "map_label": "India"}, {"fact": "By 1700 CE, Europe had achieved decisive military and economic advantages over other world civilizations — gunpowder weapons, oceanic navigation, and capitalist finance were giving European powers the tools to dominate the globe over the next two centuries.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=10.0,-30.0&zoom=3&size=280x180&markers=10.0,-30.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-60.0,-20.0,0.0,40.0&layer=mapnik&marker=10.0,-30.0", "map_label": "Age of Exploration"}]}, {"id": "18th_century", "era": "Age of Exploration & Enlightenment (1600–1800)", "label": "18th Century CE (1700–1799 CE)", "summary": "The 18th century is the Age of Enlightenment and Revolution: Voltaire, Rousseau, and Hume challenge authority; the American and French Revolutions remake politics; the Industrial Revolution begins; and James Cook maps the Pacific.", "facts": [{"fact": "The Enlightenment was an 18th-century intellectual movement that subjected tradition, religion, and authority to rational scrutiny — Voltaire, Hume, Rousseau, Kant, and Diderot argued that reason, not revelation, should guide human affairs.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=20.0,0.0&zoom=2&size=280x180&markers=20.0,0.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-60.0,-40.0,60.0,80.0&layer=mapnik&marker=20.0,0.0", "map_label": "The Modern World"}, {"fact": "The American Declaration of Independence (1776 CE), largely written by Thomas Jefferson, declared that 'all men are created equal' and possess inalienable rights of life, liberty, and the pursuit of happiness — applying Locke's philosophy to create a new political order.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=38.9,-95.7&zoom=4&size=280x180&markers=38.9,-95.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-115.7,18.9,-75.7,58.9&layer=mapnik&marker=38.9,-95.7", "map_label": "United States"}, {"fact": "The French Revolution (1789 CE) overthrew the monarchy, declared the Rights of Man, and executed King Louis XVI — initiating a decade of radical politics, the Terror, and eventually Napoleon, that permanently transformed European politics.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=38.9,-95.7&zoom=4&size=280x180&markers=38.9,-95.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-115.7,18.9,-75.7,58.9&layer=mapnik&marker=38.9,-95.7", "map_label": "United States"}, {"fact": "The Reign of Terror (1793–1794 CE) killed approximately 40,000 people under Robespierre's Committee of Public Safety — demonstrating how revolutionary idealism could produce political violence, a paradox that haunted 19th and 20th century radicalism.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=38.9,-95.7&zoom=4&size=280x180&markers=38.9,-95.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-115.7,18.9,-75.7,58.9&layer=mapnik&marker=38.9,-95.7", "map_label": "United States"}, {"fact": "James Watt's improved steam engine (1769 CE) began the Industrial Revolution — the shift from human and animal power to fossil fuel energy that would transform human civilization more profoundly than any event since the agricultural revolution.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "Adam Smith's 'Wealth of Nations' (1776 CE) — published the same year as the American Declaration — argued that free markets, specialization, and the 'invisible hand' of self-interest produce prosperity more efficiently than government control. It became the bible of capitalism.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "Immanuel Kant (1724–1804 CE) argued that the mind actively structures experience rather than passively receiving it — his 'Critique of Pure Reason' (1781 CE) is perhaps the most important work of modern philosophy, synthesizing rationalism and empiricism.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "Voltaire (1694–1778 CE) was the Enlightenment's most famous polemicist — his satirical novel 'Candide' (1759 CE) mocked religious optimism, his attacks on the Catholic Church's power and intolerance made him the symbol of freethought across Europe.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=20.0,0.0&zoom=2&size=280x180&markers=20.0,0.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-60.0,-40.0,60.0,80.0&layer=mapnik&marker=20.0,0.0", "map_label": "The Modern World"}, {"fact": "Jean-Jacques Rousseau (1712–1778 CE) argued in the 'Social Contract' that legitimate government requires the consent of the governed and reflects the 'general will' — his ideas inspired both democratic republicanism and, in their collectivist form, later totalitarianism.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=3&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-10.0,5.0,50.0,65.0&layer=mapnik&marker=35.0,20.0", "map_label": "The Mediterranean / World"}, {"fact": "The Seven Years' War (1756–1763 CE) was the first truly global conflict — fought across Europe, North America, the Caribbean, West Africa, India, and the Philippines, it established British dominance and set the stage for American independence.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "Captain James Cook's three voyages (1768–1779 CE) completed the mapping of the Pacific Ocean — encountering Australia, New Zealand, Hawaii, and dozens of Pacific islands, making the first sustained European contact with Polynesian civilizations.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=10.0,-30.0&zoom=3&size=280x180&markers=10.0,-30.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-60.0,-20.0,0.0,40.0&layer=mapnik&marker=10.0,-30.0", "map_label": "Age of Exploration"}, {"fact": "The Haitian Revolution (1791–1804 CE) was the only successful slave revolt in history — enslaved Africans overthrew French colonial rule in Saint-Domingue to create Haiti, the world's first Black republic, sending shockwaves through slaveholding societies worldwide.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "David Hume (1711–1776 CE) was the most radical of Enlightenment skeptics — arguing against miracles, the immortality of the soul, and a providential God, he established empiricism as the foundation of modern philosophy of science.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=20.0,0.0&zoom=2&size=280x180&markers=20.0,0.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-60.0,-40.0,60.0,80.0&layer=mapnik&marker=20.0,0.0", "map_label": "The Modern World"}, {"fact": "Napoleon Bonaparte rose from Corsican obscurity to become Emperor of France (1804 CE) — his legal code (the Code Napoleon), continental conquests, and eventual defeat reshaped Europe's boundaries, institutions, and nationalist movements.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=46.2,2.2&zoom=5&size=280x180&markers=46.2,2.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.8,36.2,12.2,56.2&layer=mapnik&marker=46.2,2.2", "map_label": "France"}, {"fact": "The abolition movement began in earnest in the 18th century — Quakers banned slaveholding among members (1776 CE), and the Society for Effecting the Abolition of the Slave Trade was founded in London (1787 CE), beginning the campaign that ended British slavery in 1833.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "Textiles industrialized first in England — Hargreaves's spinning jenny (1764), Arkwright's water frame (1769), and Cartwright's power loom (1784) transformed textile production from cottage craft to factory system, beginning urbanization and the proletariat.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "The United States Constitution (1787 CE) created the first modern democratic republic — its separation of powers, federalism, and Bill of Rights (1791 CE) established a template for constitutional government that influenced democracies worldwide.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=38.9,-95.7&zoom=4&size=280x180&markers=38.9,-95.7,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-115.7,18.9,-75.7,58.9&layer=mapnik&marker=38.9,-95.7", "map_label": "United States"}, {"fact": "Edward Jenner developed the smallpox vaccine in 1796 CE — the first vaccine in history, beginning the era of immunization that would eventually eliminate diseases that had killed tens of millions throughout history.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=3&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-10.0,5.0,50.0,65.0&layer=mapnik&marker=35.0,20.0", "map_label": "The Mediterranean / World"}, {"fact": "The Encyclopédie, edited by Diderot and d'Alembert (1751–1772 CE), compiled the knowledge of the Enlightenment into 35 volumes — a deliberate project to democratize knowledge and undermine the authority of church and aristocracy.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=3&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-10.0,5.0,50.0,65.0&layer=mapnik&marker=35.0,20.0", "map_label": "The Mediterranean / World"}, {"fact": "By 1800 CE, the world was transforming at unprecedented speed — the Industrial Revolution was beginning to generate wealth on a scale never before seen, democratic ideas were threatening traditional hierarchies, and European empires were extending their reach across the globe in ways that would define the next century.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}]}, {"id": "19th_century", "era": "Revolutionary Era (1776–1900)", "label": "19th Century CE (1800–1899 CE)", "summary": "The 19th century is the age of nationalism, industrialization, imperialism, and Darwin: Europe colonizes the world, the United States tears itself apart over slavery, Marx predicts revolution, and Victorian science transforms humanity's understanding of its origins.", "facts": [{"fact": "Napoleon's defeat at Waterloo (1815 CE) and the Congress of Vienna restored European monarchies but could not undo the French Revolution's ideas — nationalism, liberalism, and the concept of popular sovereignty would drive European revolutions in 1830 and 1848.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.2,10.5&zoom=5&size=280x180&markers=51.2,10.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=0.5,41.2,20.5,61.2&layer=mapnik&marker=51.2,10.5", "map_label": "Germany"}, {"fact": "The Industrial Revolution transformed Britain first, then Europe and America — by 1850 CE, Britain produced half the world's iron and cotton, its railways connected its cities, and the factory system had created both unprecedented wealth and a new urban working class living in squalor.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "Charles Darwin's 'On the Origin of Species' (1859 CE) established evolution by natural selection — one of the most consequential scientific ideas in history, it transformed biology, challenged religious accounts of creation, and (when misapplied) provided pseudo-scientific justification for racism and imperialism.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=3&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-10.0,5.0,50.0,65.0&layer=mapnik&marker=35.0,20.0", "map_label": "The Mediterranean / World"}, {"fact": "The American Civil War (1861–1865 CE) killed 620,000 soldiers — more Americans than died in all other American wars combined — and ended slavery in the United States. Lincoln's Emancipation Proclamation (1863 CE) made abolition the war's explicit goal.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "Karl Marx and Friedrich Engels published the 'Communist Manifesto' (1848 CE) — arguing that history is driven by class struggle and that capitalism would inevitably be overthrown by the proletariat, creating a classless society. It became the most influential political document of the 20th century.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=3&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-10.0,5.0,50.0,65.0&layer=mapnik&marker=35.0,20.0", "map_label": "The Mediterranean / World"}, {"fact": "The abolition of slavery in the British Empire (1833 CE), then the US (1865 CE), then Brazil (1888 CE) ended the transatlantic slave trade after 400 years — but the racism that had justified slavery persisted and took new forms in Jim Crow laws and colonial ideology.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "The Scramble for Africa (1881–1914 CE) saw European powers partition the entire African continent among themselves — by 1914 CE, only Ethiopia and Liberia remained independent, and Africa's colonial borders (drawn without regard to ethnic or political realities) created problems that persist today.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=37.9,-4.8&zoom=6&size=280x180&markers=37.9,-4.8,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-9.8,32.9,0.20000000000000018,42.9&layer=mapnik&marker=37.9,-4.8", "map_label": "Al-Andalus (Spain)"}, {"fact": "The Opium Wars (1839–1842 CE, 1856–1860 CE) forced China to open its ports to British trade — the Treaty of Nanking ceded Hong Kong to Britain and forced 'unequal treaties' on China that humiliated the Qing Dynasty and fueled Chinese nationalism.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "The Indian Rebellion of 1857 CE ('Indian Mutiny' or 'First War of Independence') ended the East India Company's rule — the British Crown took direct control of India, beginning the era of the British Raj that lasted until 1947.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "The unification of Germany (1871 CE) under Bismarck's Prussia created Europe's most powerful new state — the German Empire's industrial and military strength would destabilize European balance of power and contribute to both World Wars.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.2,10.5&zoom=5&size=280x180&markers=51.2,10.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=0.5,41.2,20.5,61.2&layer=mapnik&marker=51.2,10.5", "map_label": "Germany"}, {"fact": "The germ theory of disease, developed by Louis Pasteur and Robert Koch in the 1860s–1880s, explained that infectious diseases are caused by microorganisms — a discovery that transformed medicine, enabled vaccination, and dramatically increased human life expectancy.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5", "map_label": "Italy"}, {"fact": "The Italian Risorgimento unified Italy under the House of Savoy (1861 CE) — Giuseppe Garibaldi's 'Thousand Redshirts' captured Sicily and Naples, while Cavour's diplomacy secured French support, creating modern Italy from a patchwork of kingdoms and papal territories.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=41.9,12.5&zoom=5&size=280x180&markers=41.9,12.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=2.5,31.9,22.5,51.9&layer=mapnik&marker=41.9,12.5", "map_label": "Italy"}, {"fact": "The construction of the transcontinental railroad in America (completed 1869 CE), primarily by Chinese and Irish immigrant laborers, connected the continent and enabled westward expansion — at the cost of displacing and destroying Native American peoples and cultures.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "Friedrich Nietzsche (1844–1900 CE) declared 'God is dead' — not as celebration but as diagnosis, arguing that the collapse of Christian metaphysics left Western civilization without a foundation for values, necessitating the creation of new ones.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=3&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-10.0,5.0,50.0,65.0&layer=mapnik&marker=35.0,20.0", "map_label": "The Mediterranean / World"}, {"fact": "Sigmund Freud developed psychoanalysis in the 1890s CE — his theories of the unconscious, repression, and the Oedipus complex transformed how Western culture understood the human mind, sexuality, and the irrational forces driving behavior.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=3&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-10.0,5.0,50.0,65.0&layer=mapnik&marker=35.0,20.0", "map_label": "The Mediterranean / World"}, {"fact": "The Russian serfs were emancipated in 1861 CE by Tsar Alexander II — but the liberation was incomplete, burdening freed serfs with redemption payments for land they'd worked for generations, fueling the resentment that would produce the 1917 Revolution.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=55.8,37.6&zoom=4&size=280x180&markers=55.8,37.6,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=17.6,35.8,57.6,75.8&layer=mapnik&marker=55.8,37.6", "map_label": "Russia"}, {"fact": "The Meiji Restoration (1868 CE) transformed Japan from a feudal society to a modern industrial state in a single generation — Japan adopted Western technology, law, and military organization with astonishing speed, becoming the first non-Western great power.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "James Clerk Maxwell's equations (1865 CE) unified electricity, magnetism, and light as aspects of a single electromagnetic phenomenon — among the most beautiful achievements in physics, they enabled radio, television, and modern telecommunications.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.0,20.0&zoom=3&size=280x180&markers=35.0,20.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-10.0,5.0,50.0,65.0&layer=mapnik&marker=35.0,20.0", "map_label": "The Mediterranean / World"}, {"fact": "The Dreyfus Affair (1894–1906 CE) — the wrongful conviction of a Jewish French officer on treason charges — exposed virulent French antisemitism and convinced Theodor Herzl that Jews needed their own state, leading to the founding of modern Zionism.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=20.0,0.0&zoom=2&size=280x180&markers=20.0,0.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-60.0,-40.0,60.0,80.0&layer=mapnik&marker=20.0,0.0", "map_label": "The Modern World"}, {"fact": "By 1900 CE, European empires controlled 84% of the world's land surface — the technological, military, and economic advantages of industrialization had given a handful of Western nations dominance over the rest of humanity, creating a global order of colonizer and colonized whose consequences still shape our world.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}]}, {"id": "20th_century_early", "era": "Modern World (1900–present)", "label": "Early 20th Century (1900–1945 CE)", "summary": "The first half of the 20th century is defined by catastrophe on an unprecedented scale: two World Wars, the Russian Revolution, the Holocaust, and the atomic bomb — events that killed over 100 million people and remade the world order entirely.", "facts": [{"fact": "World War I (1914–1918 CE) killed 17 million people and destroyed four empires — the German, Austro-Hungarian, Ottoman, and Russian — in four years of industrial slaughter. The war's causes, course, and consequences shape the modern world more than any other event.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "The assassination of Archduke Franz Ferdinand in Sarajevo (June 28, 1914 CE) triggered a chain of alliance obligations that plunged Europe into war within six weeks — demonstrating how a system of interlocking alliances can make local conflicts global catastrophes.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=20.0,0.0&zoom=2&size=280x180&markers=20.0,0.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-60.0,-40.0,60.0,80.0&layer=mapnik&marker=20.0,0.0", "map_label": "The Modern World"}, {"fact": "The Russian Revolution (1917 CE) overthrew the tsar in February, then brought the Bolsheviks to power in October — Lenin's coup created the world's first communist state, triggering a civil war, a Red Terror, and eventually the Soviet Union.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=55.8,37.6&zoom=4&size=280x180&markers=55.8,37.6,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=17.6,35.8,57.6,75.8&layer=mapnik&marker=55.8,37.6", "map_label": "Russia"}, {"fact": "The Treaty of Versailles (1919 CE) imposed harsh reparations and territorial losses on Germany — the 'war guilt' clause and economic devastation created the resentment that Hitler exploited, making Versailles a direct cause of World War II.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=46.2,2.2&zoom=5&size=280x180&markers=46.2,2.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-7.8,36.2,12.2,56.2&layer=mapnik&marker=46.2,2.2", "map_label": "France"}, {"fact": "The influenza pandemic of 1918–1919 CE killed 50–100 million people worldwide — more than World War I itself, and possibly the deadliest single event in human history. It infected a third of the world's population and disproportionately killed healthy young adults.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=35.9,104.2&zoom=4&size=280x180&markers=35.9,104.2,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=84.2,15.899999999999999,124.2,55.9&layer=mapnik&marker=35.9,104.2", "map_label": "China"}, {"fact": "The rise of fascism in Italy (Mussolini, 1922 CE) and Nazi Germany (Hitler, 1933 CE) represented a new form of totalitarianism — ultranationalist, violently antisemitic, and contemptuous of democracy, promising national rebirth through violence and racial purity.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.2,10.5&zoom=5&size=280x180&markers=51.2,10.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=0.5,41.2,20.5,61.2&layer=mapnik&marker=51.2,10.5", "map_label": "Germany"}, {"fact": "The Holocaust (1941–1945 CE) was the systematic murder of six million Jews and millions of others (Roma, disabled people, LGBTQ+ people, Slavs, political opponents) by Nazi Germany — industrialized genocide using gas chambers, a crime against humanity with no precedent.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.2,10.5&zoom=5&size=280x180&markers=51.2,10.5,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=0.5,41.2,20.5,61.2&layer=mapnik&marker=51.2,10.5", "map_label": "Germany"}, {"fact": "World War II (1939–1945 CE) killed approximately 70–85 million people — the deadliest conflict in human history, fought across Europe, Asia, Africa, and the Pacific, involving nearly every nation on Earth.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=8.0,21.0&zoom=4&size=280x180&markers=8.0,21.0,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=1.0,-12.0,41.0,28.0&layer=mapnik&marker=8.0,21.0", "map_label": "Africa"}, {"fact": "The Battle of Britain (1940 CE) was the first military campaign fought entirely in the air — the RAF's successful defense against the Luftwaffe preserved British independence and Churchill's determination to continue fighting, preventing a Nazi-dominated Europe.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.5,-0.1&zoom=6&size=280x180&markers=51.5,-0.1,red-pushpin", "map_iframe": "https://www.openstreetmap.org/export/embed.html?bbox=-5.1,46.5,4.9,56.5&layer=mapnik&marker=51.5,-0.1", "map_label": "England"}, {"fact": "Operation Barbarossa (June 1941 CE), Germany's invasion of the Soviet Union, was the largest military operation in history — eventually costing Germany the war, as the USSR absorbed devastating losses but fought back with a ferocity that ground down the Wehrmacht.", "map_url": "https://staticmap.openstreetmap.de/staticmap.php?center=51.2,10.5&zoom=5&size=280x180&markers=51.2,10.5,red
