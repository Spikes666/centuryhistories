<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Century Histories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e8e0d0;
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(160deg, #0f0a1a 0%, #1a0f2e 100%);
      border-bottom: 2px solid #c9184a;
      padding: 36px 24px 28px;
      text-align: center;
    }
    .header-day { font-size: 11px; color: #666; letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 10px; }
    .header-title { font-family: 'Playfair Display', Georgia, serif; font-size: clamp(28px, 7vw, 44px); font-style: italic; color: #f5edd8; margin-bottom: 8px; line-height: 1.15; }
    .header-era { font-size: 14px; color: #c9184a; letter-spacing: 0.06em; margin-bottom: 6px; }
    .header-date { font-size: 12px; color: #444; font-style: italic; }

    /* ── Nav ── */
    .nav { display: flex; justify-content: center; gap: 8px; padding: 20px 20px 0; max-width: 1100px; margin: 0 auto; }
    .nav-btn { background: none; border: 1px solid #2a2a3a; border-radius: 20px; color: #888; cursor: pointer; font-family: 'Lora', Georgia, serif; font-size: 12px; letter-spacing: 0.1em; padding: 6px 16px; text-transform: uppercase; transition: all 0.2s; }
    .nav-btn:hover { border-color: #c9184a44; color: #c0b8a8; }
    .nav-btn.active { border-color: #c9184a; color: #c9184a; }

    /* ── Century browser pills ── */
    .century-nav { display: none; max-width: 1100px; margin: 24px auto 0; padding: 0 20px; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .century-nav.visible { display: flex; }
    .century-btn { background: #111118; border: 1px solid #1e1e2e; border-radius: 20px; color: #888; cursor: pointer; font-family: 'Lora', Georgia, serif; font-size: 11px; letter-spacing: 0.08em; padding: 5px 14px; transition: all 0.2s; }
    .century-btn:hover { border-color: #c9184a44; color: #c0b8a8; }
    .century-btn.active { border-color: #c9184a; color: #c9184a; background: #1a0f1f; }

    /* ── Main layout: two columns ── */
    .main-layout {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 0;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 28px;
      align-items: start;
    }
    @media (max-width: 800px) {
      .main-layout { grid-template-columns: 1fr; }
      .map-column { order: -1; }
    }

    /* ── Cards column ── */
    .cards { display: flex; flex-direction: column; gap: 20px; }

    .card {
      background: #111118;
      border: 1px solid #1e1e2e;
      border-radius: 14px;
      padding: 28px 24px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.5s ease forwards;
      transition: border-color 0.2s;
      cursor: pointer;
    }
    .card:hover { border-color: #c9184a44; }
    .card.map-active { border-color: #c9184a88; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .card-num { font-size: 10px; color: #c9184a; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 10px; }
    .card-fact { font-size: 15px; line-height: 1.8; color: #c0b8a8; }
    .card-region { font-size: 11px; color: #555; letter-spacing: 0.08em; margin-top: 12px; font-style: italic; }

    /* ── Summary card ── */
    .summary-card {
      background: linear-gradient(135deg, #0f0a1a, #1a0f2e);
      border: 1px solid #c9184a33;
      border-radius: 14px;
      padding: 28px 24px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }
    .summary-label { font-size: 10px; color: #c9184a; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 10px; }
    .summary-title { font-family: 'Playfair Display', Georgia, serif; font-size: clamp(18px, 4vw, 24px); font-style: italic; color: #f0e8d8; margin-bottom: 14px; line-height: 1.3; }
    .summary-text { font-size: 14px; line-height: 1.8; color: #9090a0; font-style: italic; }

    /* ── Map column ── */
    .map-column { position: sticky; top: 20px; }
    .map-wrapper {
      background: #111118;
      border: 1px solid #1e1e2e;
      border-radius: 14px;
      overflow: hidden;
    }
    .map-header {
      padding: 14px 18px 10px;
      border-bottom: 1px solid #1e1e2e;
    }
    .map-label { font-size: 10px; color: #c9184a; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 4px; }
    .map-region-name { font-family: 'Playfair Display', Georgia, serif; font-size: 16px; font-style: italic; color: #f0e8d8; }
    #map {
      height: 300px;
      width: 100%;
      filter: brightness(0.85) saturate(0.7);
    }
    .map-hint { padding: 10px 18px; font-size: 11px; color: #444; font-style: italic; }

    /* ── Footer ── */
    .footer { text-align: center; margin-top: 48px; padding: 0 20px; font-size: 11px; color: #333; letter-spacing: 0.08em; line-height: 1.8; }
    .footer a { color: #c9184a; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .state-msg { text-align: center; padding: 60px 20px; color: #444; font-style: italic; font-size: 14px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-day" id="header-day">Loading…</div>
    <h1 class="header-title" id="header-title">Century Histories</h1>
    <div class="header-era" id="header-era"></div>
    <div class="header-date" id="header-date"></div>
  </div>

  <div class="nav">
    <button class="nav-btn active" id="btn-today" onclick="showToday()">Today</button>
    <button class="nav-btn" id="btn-browse" onclick="showBrowse()">Browse Centuries</button>
  </div>

  <div class="century-nav" id="century-nav"></div>

  <div class="main-layout">
    <div class="cards" id="cards">
      <div class="state-msg">Loading flashcards…</div>
    </div>

    <div class="map-column">
      <div class="map-wrapper">
        <div class="map-header">
          <div class="map-label">Region</div>
          <div class="map-region-name" id="map-region-name">—</div>
        </div>
        <div id="map"></div>
        <div class="map-hint">Click a card to focus the map</div>
      </div>
    </div>
  </div>

  <div class="footer">
    Sources: <em>Misquoting Jesus</em> / Bart Ehrman &nbsp;·&nbsp;
    <em>The Rest is History</em> (Holland &amp; Sandbrook) &nbsp;·&nbsp;
    <em>Dominion</em> / Tom Holland<br>
    Page refreshes daily at 8am CT
  </div>

<script>
const FACTS_PER_DAY = 10;
const START_DATE    = new Date('2025-01-01');

let allData      = null;
let allFacts     = [];
let activeCentury = 0;
let leafletMap   = null;
let mapMarker    = null;

// ── Region map: keywords → {lat, lng, zoom, label} ─────────────────────────
const REGIONS = [
  // Mesopotamia / Iraq
  { keys: ['sumer','sumerian','mesopotamia','cuneiform','babylon','babylonian','hammurabi','nebuchadnezzar','tammuz','akkad','ur'],
    lat: 32.5, lng: 44.5, zoom: 5, label: 'Mesopotamia (modern Iraq)' },
  // Egypt
  { keys: ['egypt','egyptian','giza','pyramid','alexandria','pharaoh','ramesses','osiris','nile','ptolem'],
    lat: 26.8, lng: 30.8, zoom: 5, label: 'Egypt' },
  // Persia / Iran
  { keys: ['persian','persia','cyrus','darius','achaemenid','zoroastrian','sassanid','mani','manichaean','parthian'],
    lat: 32.4, lng: 53.7, zoom: 5, label: 'Persia (modern Iran)' },
  // Anatolia / Turkey
  { keys: ['hittite','anatolia','turkish','byzantine','constantinople','istanbul','ephesus','smyrna','cappadocia'],
    lat: 39.0, lng: 35.0, zoom: 5, label: 'Anatolia (modern Turkey)' },
  // Jerusalem / Judea / Israel
  { keys: ['jerusalem','judea','judah','israel','hebrew','jewish','jew','temple','nazareth','galilee','sinai','dead sea','maccab','hasmonean','zealot','pharisee','sadducee','essene','bar kokhba'],
    lat: 31.8, lng: 35.2, zoom: 6, label: 'Judea / Israel' },
  // Roman Empire broadly
  { keys: ['rome','roman','roman empire','romans','colosseum','tiber','augustus','caesar','nero','trajan','hadrian','marcus aurelius','diocletian','constantine','theodosius','julian','caracalla','septimius','commodus','vespasian','titus','palatine'],
    lat: 41.9, lng: 12.5, zoom: 5, label: 'Rome, Italy' },
  // Roman Britain
  { keys: ["hadrian's wall",'britain','britannia','roman britain'],
    lat: 55.0, lng: -2.5, zoom: 6, label: 'Roman Britain' },
  // Gaul / France
  { keys: ['gaul','frankish','franks','clovis','merovingian'],
    lat: 46.6, lng: 2.3, zoom: 5, label: 'Gaul (modern France)' },
  // North Africa
  { keys: ['north africa','carthage','vandal','augustine','hippo','numidia','libya','tunisia'],
    lat: 34.0, lng: 9.0, zoom: 5, label: 'North Africa' },
  // Greece / Athens
  { keys: ['greek','greece','athens','athen','helleni','corinth','sparta','macedon','alexander','neoplatonism','plotinus','proclus'],
    lat: 37.9, lng: 23.7, zoom: 6, label: 'Greece' },
  // Syria / Antioch / Palmyra
  { keys: ['antioch','syria','syrian','palmyra','zenobia','damascus'],
    lat: 35.5, lng: 38.0, zoom: 6, label: 'Syria' },
  // China
  { keys: ['china','chinese','han dynasty','silk road','confuci','beijing'],
    lat: 35.9, lng: 104.2, zoom: 4, label: 'China' },
  // India
  { keys: ['india','indian','buddhis'],
    lat: 20.6, lng: 79.0, zoom: 4, label: 'India' },
  // Ireland / Celtic
  { keys: ['ireland','irish','patrick','celtic'],
    lat: 53.4, lng: -8.2, zoom: 6, label: 'Ireland' },
  // Balkans / Adrianople
  { keys: ['adrianople','thrace','visigoth','ostrogoth','dacia','dacian','balkans','thessalonica'],
    lat: 41.7, lng: 26.6, zoom: 6, label: 'Balkans / Thrace' },
  // Mediterranean broadly
  { keys: ['mediterranean','roman world','empire'],
    lat: 37.0, lng: 18.0, zoom: 4, label: 'The Mediterranean World' },
  // Middle East broadly (fallback for region)
  { keys: ['middle east','near east','levant','phoenician','canaan'],
    lat: 31.0, lng: 38.0, zoom: 4, label: 'The Ancient Near East' },
];

function getRegionForFact(factText, centuryLabel) {
  const lower = factText.toLowerCase() + ' ' + centuryLabel.toLowerCase();
  for (const r of REGIONS) {
    if (r.keys.some(k => lower.includes(k))) return r;
  }
  // Century-level fallback
  if (lower.includes('middle east') || lower.includes('bce')) {
    return { lat: 31.0, lng: 38.0, zoom: 4, label: 'The Ancient Near East' };
  }
  return { lat: 37.0, lng: 18.0, zoom: 4, label: 'The Mediterranean World' };
}

// ── Init map ─────────────────────────────────────────────────────────────────
function initMap(region) {
  if (!leafletMap) {
    leafletMap = L.map('map', { zoomControl: true, attributionControl: false });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 19
    }).addTo(leafletMap);
  }
  leafletMap.setView([region.lat, region.lng], region.zoom);
  if (mapMarker) mapMarker.remove();
  mapMarker = L.circleMarker([region.lat, region.lng], {
    radius: 7, color: '#c9184a', fillColor: '#c9184a', fillOpacity: 0.7, weight: 2
  }).addTo(leafletMap);
  document.getElementById('map-region-name').textContent = region.label;
}

// ── Fetch content ─────────────────────────────────────────────────────────────
async function init() {
  try {
    allData = {"centuries": [{"id": "pre_ce_middle_east", "label": "Pre-CE Middle East (3000 BCE – 1 BCE)", "summary": "The ancient Middle East is the cradle of civilization, writing, law, and monotheism. The region saw the rise of Sumer, Babylon, Egypt, Assyria, and Persia — and gave birth to the Hebrew scriptures that would shape Judaism, Christianity, and Islam.", "facts": ["Around 3100 BCE, the Sumerians of Mesopotamia invented the earliest known writing system — cuneiform — pressing wedge-shaped marks into clay tablets to track grain and livestock.", "The Epic of Gilgamesh, written around 2100 BCE, is the world's oldest surviving literary work. It includes a flood narrative strikingly similar to the later story of Noah — predating Genesis by over a thousand years.", "Hammurabi, king of Babylon (~1792–1750 BCE), produced one of history's first written legal codes. Its 282 laws introduced the principle of proportional justice: 'an eye for an eye, a tooth for a tooth.'", "The Egyptians built the Great Pyramid of Giza around 2560 BCE — the tallest man-made structure in the world for nearly 4,000 years. Contrary to popular myth, it was built by paid laborers, not slaves.", "The Hittites of Anatolia (~1600–1180 BCE) were among the first peoples to master iron smelting, giving them a military advantage that reshaped the ancient Near East.", "The Hebrew Exodus story, if historical, is generally dated to around 1250 BCE under Pharaoh Ramesses II — though no Egyptian records confirm a mass exodus of Israelites.", "The Assyrian Empire (~900–612 BCE) was the ancient world's first true military superpower, using iron weapons, siege engines, and systematic deportation of conquered peoples to control a vast territory from Egypt to Iran.", "In 586 BCE, the Babylonian king Nebuchadnezzar destroyed Solomon's Temple in Jerusalem and deported the Jewish elite to Babylon — a traumatic event that transformed Israelite religion into Judaism.", "Cyrus the Great of Persia conquered Babylon in 539 BCE and famously freed the Jewish exiles, allowing them to return to Judea. He is the only non-Israelite called 'messiah' (anointed one) in the Hebrew Bible (Isaiah 45:1).", "The Persian Achaemenid Empire (~550–330 BCE), at its height under Darius I, stretched from Greece to India — the largest empire the world had yet seen, administered through a remarkably tolerant policy of local autonomy.", "Alexander the Great conquered the Persian Empire between 334–323 BCE, spreading Greek language and culture (Hellenism) across the Middle East — a cultural shift that would directly shape the world in which the New Testament was written.", "After Alexander's death, his empire split among his generals. Judea fell under the Seleucid dynasty, whose ruler Antiochus IV Epiphanes desecrated the Jerusalem Temple in 167 BCE, sparking the Maccabean Revolt.", "The Maccabean Revolt (167–160 BCE) led to a brief period of Jewish independence under the Hasmonean dynasty. The victory is celebrated in the Jewish festival of Hanukkah.", "By 63 BCE, the Roman general Pompey captured Jerusalem, ending Jewish independence. Judea became a client state of Rome — the political backdrop for the entire New Testament.", "The Dead Sea Scrolls, discovered in 1947, contain Hebrew manuscripts from roughly 250 BCE–70 CE — the oldest known copies of the Hebrew Bible and evidence of a diverse, sectarian Judaism that is often flattened in later tradition.", "Bart Ehrman emphasizes that the Hebrew Bible was not written as a unified document — it was composed by many authors over nearly a thousand years, edited and re-edited, with contradictions that reflect evolving theological ideas rather than a single consistent theology.", "The concept of a suffering, dying-and-rising god appears across ancient Middle Eastern religions — in the myths of Osiris (Egypt), Tammuz (Babylon), and later Baal (Canaan) — providing a broader religious context for understanding early Christian claims about Jesus.", "Zoroastrianism, the religion of Persia, introduced concepts of cosmic dualism (good vs. evil), a final judgment, heaven and hell, and a future savior figure (Saoshyant) — ideas that heavily influenced late Jewish apocalypticism and, through it, early Christianity.", "The Septuagint — a Greek translation of the Hebrew scriptures — was produced in Alexandria, Egypt around 250 BCE. It became the Bible of the early church, and many New Testament authors quote it rather than the original Hebrew.", "By the 1st century BCE, Judaism was not a monolithic religion. Groups included Pharisees (focused on oral law), Sadducees (priestly aristocracy), Essenes (apocalyptic separatists), and Zealots (revolutionary nationalists) — a diversity Ehrman stresses as essential context for understanding Jesus."]}, {"id": "1st_century_ce", "label": "1st Century CE (1–99 CE)", "summary": "The first century CE is dominated by the Roman Empire at its height, the life of Jesus, the birth of Christianity, and the catastrophic Jewish-Roman War ending in the destruction of the Temple. Bart Ehrman's work is especially rich for this period.", "facts": ["Jesus of Nazareth was most likely born between 6–4 BCE (before Herod the Great's death in 4 BCE) — meaning the common era calendar, established centuries later, is off by several years.", "Bart Ehrman argues that Jesus was an apocalyptic Jewish preacher who believed God was about to intervene in history and establish a kingdom on earth — not the founder of a new religion, but a reformer within Judaism.", "The four Gospels (Matthew, Mark, Luke, John) were not written by eyewitnesses. Ehrman dates them: Mark (~65–70 CE), Matthew and Luke (~80–85 CE), and John (~90–95 CE) — all decades after Jesus's death.", "Mark is the earliest Gospel and the source used by Matthew and Luke — a scholarly consensus called the 'Two-Source Hypothesis.' John is independent and theologically the most developed.", "Jesus was crucified under the Roman prefect Pontius Pilate around 30–33 CE. Crucifixion was a Roman punishment specifically for political troublemakers and slaves — not a Jewish execution method.", "Paul of Tarsus wrote his letters in the 50s CE — before any of the Gospels were written. His letters are the earliest Christian documents we have, and his theology (salvation through faith, not works of the law) shaped Christianity more than any other single author.", "Ehrman points out that Paul never met the living Jesus and rarely quotes his teachings. Paul's Christ is a cosmic figure — pre-existent, crucified, resurrected — which differs in emphasis from the earthly Jesus of the Synoptic Gospels.", "In 66 CE, Jewish revolutionaries launched a revolt against Rome. The Romans responded with overwhelming force under General Vespasian and his son Titus.", "In 70 CE, Roman forces under Titus destroyed the Second Temple in Jerusalem — an event so catastrophic it reshaped both Judaism and Christianity forever. Judaism became a synagogue-based, text-centered religion; Christianity increasingly separated from its Jewish roots.", "The Arch of Titus in Rome, still standing today, depicts Roman soldiers carrying the Temple menorah as war spoils — a vivid monument to the 70 CE destruction.", "The Roman historian Tacitus (writing ~116 CE) confirms that a man called Christus was executed by Pontius Pilate during the reign of Tiberius — one of only two non-Christian Roman references to Jesus.", "Josephus, a Jewish historian writing in the 90s CE, mentions Jesus twice. One passage (the 'Testimonium Flavianum') was almost certainly edited by later Christian scribes — Ehrman and most scholars consider the current version partially interpolated.", "The book of Revelation was written around 95 CE during the reign of Emperor Domitian. Tom Holland (The Rest is History) emphasizes it as a coded political document aimed at Rome, not a literal prediction of the modern future.", "Emperor Augustus (ruled 27 BCE–14 CE) transformed Rome from a republic into an empire. His reign established the 'Pax Romana' — two centuries of relative peace across the Mediterranean world.", "Augustus used religion as statecraft: he was declared 'Son of God' (divi filius) after Julius Caesar's deification — a title that early Christians deliberately echoed in calling Jesus 'Son of God.'", "Nero (ruled 54–68 CE) became the first emperor to officially persecute Christians, blaming them for the Great Fire of Rome in 64 CE. This persecution likely claimed the lives of both Peter and Paul.", "The year 69 CE is called the 'Year of the Four Emperors' — after Nero's suicide, Rome descended into civil war with four men claiming the throne in a single year, before Vespasian stabilized the empire.", "Pompeii and Herculaneum were destroyed by the eruption of Mount Vesuvius on August 24, 79 CE — an event described in vivid detail by Pliny the Younger in letters that survive today.", "The Colosseum (Flavian Amphitheatre) was completed in 80 CE under Emperor Titus. It could hold 50,000–80,000 spectators and hosted gladiatorial games, animal hunts, and public executions.", "By the end of the 1st century, Christianity had spread across the Roman Empire — from Jerusalem to Antioch, Alexandria, Corinth, and Rome — but remained a tiny, often persecuted minority sect."]}, {"id": "2nd_century_ce", "label": "2nd Century CE (100–199 CE)", "summary": "The 2nd century sees Rome at its imperial peak under the 'Five Good Emperors,' the continued spread and diversification of Christianity, fierce theological debates, and the final suppression of Jewish revolt. Gnosticism flourishes alongside proto-orthodox Christianity.", "facts": ["The 'Five Good Emperors' — Nerva, Trajan, Hadrian, Antoninus Pius, and Marcus Aurelius — ruled from 96–180 CE, a period Edward Gibbon called the epoch 'in the history of the world during which the condition of the human race was most happy and prosperous.'", "Trajan (98–117 CE) expanded the Roman Empire to its greatest territorial extent, conquering Dacia (modern Romania) and briefly taking Mesopotamia — feats celebrated on Trajan's Column in Rome, which still stands.", "Hadrian (117–138 CE) famously pulled back from Trajan's eastern conquests and consolidated the empire's borders. He built Hadrian's Wall across northern Britain — 73 miles long — to mark the empire's northern limit.", "The Bar Kokhba Revolt (132–135 CE) was the third and final Jewish revolt against Rome. After its brutal suppression by Hadrian, Jews were banned from Jerusalem, which was rebuilt as the Roman city Aelia Capitolina.", "Hadrian's suppression of the Bar Kokhba revolt effectively ended the Jewish homeland for nearly 1,800 years. Ehrman notes this further severed the already strained relationship between Judaism and the growing Christian movement.", "Marcus Aurelius (161–180 CE) was both a philosopher-emperor and a military commander. His private journal, 'Meditations,' is a foundational Stoic text — written in Greek as a personal exercise, never intended for publication.", "Bart Ehrman's work highlights that in the 2nd century, Christianity was not a unified religion but a sprawling collection of competing sects — including Gnostics, Marcionites, and proto-orthodox groups — each claiming to represent the true teaching of Jesus.", "Marcion of Sinope (~85–160 CE) argued that the God of the Old Testament was a different, inferior deity from the loving Father of Jesus. His radical canon — only Paul's letters and a edited Luke — forced the proto-orthodox church to begin defining its own canon.", "Gnosticism was a diverse religious movement that held secret spiritual knowledge ('gnosis') as the path to salvation. Gnostic Christians produced their own gospels — including the Gospel of Thomas and the Gospel of Philip — discovered at Nag Hammadi, Egypt in 1945.", "The Gospel of Thomas, likely compiled in the 2nd century, contains 114 sayings attributed to Jesus with no narrative framework and no death/resurrection. Some sayings may preserve authentic early traditions; others are distinctly Gnostic.", "Polycarp of Smyrna (~69–155 CE), a bishop who claimed to have known the Apostle John, was martyred by Roman authorities. His execution is one of the earliest detailed accounts of Christian martyrdom and became a template for later martyr literature.", "Justin Martyr (~100–165 CE) was one of the first Christian 'apologists' — intellectuals who defended Christianity to pagan audiences using Greek philosophy. He was executed in Rome for refusing to sacrifice to Roman gods.", "Irenaeus of Lyon (~130–202 CE) wrote 'Against Heresies,' a massive attack on Gnostic Christianity. He championed four Gospels — Matthew, Mark, Luke, John — as the only legitimate ones, a crucial step toward the later canonical New Testament.", "Ehrman argues that what we call 'orthodoxy' was not the original form of Christianity but the version that won a power struggle — written by the victors who then branded all competitors as 'heretics.'", "The Antonine Plague (165–180 CE) swept through the Roman Empire, killing an estimated 5–10 million people — possibly smallpox. It was brought back by soldiers returning from campaigns in Mesopotamia and significantly weakened the empire.", "Ptolemy's 'Almagest,' written around 150 CE, compiled the Greco-Roman world's astronomical knowledge into a geocentric model of the universe that would dominate Western science for over 1,300 years.", "Galen of Pergamon (~129–216 CE) became the most influential physician in Roman history, synthesizing Greek medical knowledge. His writings on anatomy and medicine remained authoritative in Europe and the Islamic world until the Renaissance.", "The rise of Roman roads — over 250,000 miles by the 2nd century — enabled not just military movement but the rapid spread of ideas, goods, and religions including Christianity and Mithraism across the empire.", "Mithraism, a mystery religion popular among Roman soldiers, shared several features with early Christianity: a savior figure, communal meals, baptism, and a focus on life after death. Scholars debate whether Christianity borrowed from Mithraism or both drew on common cultural wells.", "By the end of the 2nd century, the New Testament canon was beginning to take shape — but was far from settled. Different churches used different collections of texts, and debates over which books counted as authoritative would continue for centuries."]}, {"id": "3rd_century_ce", "label": "3rd Century CE (200–299 CE)", "summary": "The 3rd century is Rome's crisis period — a revolving door of emperors, military chaos, plague, economic collapse, and near-disintegration. Meanwhile Christianity grows rapidly, survives brutal persecution, and begins to develop institutional structures.", "facts": ["The 'Crisis of the Third Century' (235–284 CE) saw Rome nearly collapse: over 50 emperors or claimants in 50 years, constant civil war, barbarian invasions on multiple frontiers, and devastating plague.", "The Antonine dynasty ended with Commodus (180–192 CE), an erratic emperor who declared himself a god and the reincarnation of Hercules. He was assassinated by his wrestling partner, plunging Rome back into civil war.", "Septimius Severus (193–211 CE) won the civil war after 193 CE's 'Year of the Five Emperors' and founded the Severan dynasty. He was born in North Africa — the first African-born Roman emperor.", "Caracalla (211–217 CE), son of Severus, issued the Edict of Caracalla in 212 CE, granting Roman citizenship to virtually all free inhabitants of the empire — a massive legal and political transformation.", "The Plague of Cyprian (249–262 CE) killed up to 5,000 people per day in Rome at its peak. The Christian response — caring for the sick regardless of faith — contributed significantly to the religion's rapid growth in this era.", "Decius (249–251 CE) launched the first empire-wide, systematic persecution of Christians, requiring all citizens to sacrifice to Roman gods and obtain a certificate of compliance. Christians who refused faced imprisonment, torture, or death.", "The Decian persecution forced a crisis within Christianity: what to do with 'lapsed' Christians who had sacrificed to avoid execution? The debate over whether they could be readmitted to the church split communities and produced lasting theological controversy.", "Origen of Alexandria (~185–253 CE) was the most prolific and intellectually ambitious Christian scholar of the early church. He produced the Hexapla (a six-column comparison of Old Testament versions) and wrote hundreds of theological works, though later declared heretical.", "Ehrman highlights Origen as an example of how diverse early Christian thought was — Origen believed in the pre-existence of souls and the eventual salvation of all beings (apokatastasis), positions later condemned as heresy.", "The Manichaean religion was founded by the prophet Mani (~216–274 CE) in Persia. A radical dualistic faith blending Zoroastrianism, Buddhism, and Christianity, it spread across the Roman Empire and into China — and would later captivate the young Augustine of Hippo.", "Zenobia, Queen of Palmyra, carved out a breakaway empire in the eastern Roman provinces (~270–272 CE), briefly ruling Egypt and much of the Middle East before being defeated by Emperor Aurelian.", "Aurelian (270–275 CE) reunified the fragmented Roman Empire after the Crisis of the Third Century — earning the title 'Restorer of the World.' He also built the Aurelian Wall around Rome, still visible today.", "Diocletian (284–305 CE) ended the Crisis of the Third Century through radical administrative reform, splitting the empire into four zones ruled by two senior and two junior emperors — the 'Tetrarchy.'", "Diocletian launched the 'Great Persecution' (303–312 CE) — the most severe and systematic Roman persecution of Christians. Churches were destroyed, scriptures burned, and Christians stripped of legal rights across the empire.", "The concept of 'scripture' itself was contested during this period. When Roman authorities demanded Christians hand over their sacred texts, some complied — earning the label 'traditor' (one who hands over), the root of the English word 'traitor.'", "Neoplatonism, developed by Plotinus (~205–270 CE), became the dominant philosophical school of the late Roman world. Its concept of a transcendent, ineffable 'One' as the source of all existence deeply influenced Christian theology.", "The Sassanid Persian Empire (founded 224 CE) replaced the Parthian Empire as Rome's great eastern rival, initiating centuries of warfare that would drain both empires and eventually leave them vulnerable to the Arab conquests of the 7th century.", "Bart Ehrman notes that the diversity of early Christianity is most visible in the manuscripts of this era — copyists regularly altered texts, whether accidentally or deliberately, to harmonize discrepancies or promote particular theological views.", "By the mid-3rd century, the Christian church had developed a clear hierarchical structure: bishops overseeing individual cities, with Rome, Alexandria, and Antioch emerging as the most prestigious sees — foreshadowing the later power of the papacy.", "Despite three major empire-wide persecutions by the end of the 3rd century, Christianity had grown from a small Jewish sect to a religion with millions of adherents across the Roman Empire — remarkable growth that historians attribute to community care, apocalyptic appeal, and organizational strength."]}, {"id": "4th_century_ce", "label": "4th Century CE (300–399 CE)", "summary": "The 4th century is one of history's great turning points: Constantine converts to Christianity, transforming a persecuted sect into the empire's favored religion. The Council of Nicaea defines orthodoxy, and by century's end Christianity becomes Rome's official religion.", "facts": ["Constantine I defeated his rivals at the Battle of Milvian Bridge (312 CE), allegedly after seeing a vision of a Christian symbol. Whether his conversion was genuine or politically calculated, it permanently changed the Roman Empire.", "The Edict of Milan (313 CE), issued by Constantine and his co-emperor Licinius, granted religious tolerance throughout the Roman Empire — ending official persecution of Christians and restoring confiscated church property.", "Constantine convened the Council of Nicaea in 325 CE — the first empire-wide Christian council — to resolve the Arian controversy: whether Jesus was co-eternal with God the Father or a created being subordinate to him.", "The Council of Nicaea produced the Nicene Creed, declaring the Son 'of the same substance' (homoousios) as the Father — a position that condemned Arianism as heresy. Ehrman notes this was a political as much as theological resolution.", "Arianism — the belief that Jesus was divine but subordinate to and created by God the Father — was not immediately defeated by Nicaea. It remained dominant in much of the empire and spread to Germanic tribes, persisting for centuries.", "Constantine founded Constantinople (modern Istanbul) in 330 CE on the site of the Greek city Byzantium, dedicating it as the new eastern capital of the empire. It would remain one of the world's great cities for over 1,000 years.", "Bart Ehrman emphasizes that Constantine's patronage transformed Christianity institutionally: churches were lavishly funded, clergy received tax exemptions, and Sunday became an official day of rest — changes that permanently shaped Western civilization.", "Julian 'the Apostate' (361–363 CE) was the last pagan Roman emperor. A nephew of Constantine who was raised Christian but abandoned the faith, he tried to restore traditional Roman religion — and died on campaign against Persia before he could succeed.", "Ambrose, Bishop of Milan (374–397 CE), famously forced Emperor Theodosius I to do public penance for ordering a massacre at Thessalonica — an extraordinary assertion of church authority over imperial power.", "Theodosius I issued the Edict of Thessalonica (380 CE), declaring Nicene Christianity the official state religion of the Roman Empire. Paganism was effectively outlawed, and heresy became a crime against the state.", "The First Council of Constantinople (381 CE) expanded the Nicene Creed to its current form, settling debates about the Holy Spirit and establishing the Trinity doctrine that defines mainstream Christianity to this day.", "The Sack of the Serapeum (391 CE) — destruction of Alexandria's great temple to the god Serapis by a Christian mob, allegedly with imperial approval — symbolized the violent suppression of paganism in the newly Christian empire.", "The great Library of Alexandria was not destroyed in a single dramatic event. It declined gradually over centuries; a significant portion may have been damaged during Julius Caesar's visit (48 BCE), with further losses under various rulers including Christian ones.", "Athanasius of Alexandria (296–373 CE) was exiled five times for defending Nicene orthodoxy against Arian emperors. In 367 CE, his Easter Letter listed the 27 books of the New Testament — the first known list matching the modern canon exactly.", "Jerome (~347–420 CE) began his Latin translation of the Bible — the Vulgate — which would become the authoritative Bible of the Western church for over a thousand years. His translation choices shaped Christian theology in profound ways.", "Augustine of Hippo (354–430 CE) was born in North Africa, lived as a Manichaean for nine years, and converted to Christianity in 386 CE under Ambrose's influence. He would become the most influential theologian in Western Christianity.", "The Huns, nomadic warriors from the Eurasian steppe, pushed westward under Attila's predecessors, driving Germanic peoples — Visigoths, Ostrogoths, Vandals — into Roman territory and triggering the migrations that would end the Western Empire.", "The Battle of Adrianople (378 CE) was a catastrophic Roman defeat by the Visigoths — the first time a Roman emperor (Valens) died in battle against a foreign enemy in centuries. Tom Holland (The Rest is History) describes it as the moment Rome lost control of its frontiers.", "Ehrman's 'Misquoting Jesus' focuses heavily on this period — by the 4th century, thousands of manuscript copies of Christian texts existed, and scribal variations (both accidental and deliberate) had multiplied enormously, making the recovery of 'original' texts enormously difficult.", "The Codex Sinaiticus, produced around 330–360 CE and discovered at St. Catherine's Monastery on the Sinai Peninsula, is one of the oldest and most complete manuscripts of the Christian Bible — and contains books not in the modern canon alongside some that are."]}, {"id": "5th_century_ce", "label": "5th Century CE (400–499 CE)", "summary": "The 5th century witnesses the fall of the Western Roman Empire, the rise of Augustine's theology, the great Christological controversies, and the emergence of a new post-Roman world shaped by Germanic kingdoms and the enduring Eastern Empire.", "facts": ["In 410 CE, the Visigoths under Alaric sacked Rome — the first time the city had been taken by a foreign enemy in 800 years. The shock reverberated across the empire and the Christian world, prompting Augustine to write 'The City of God.'", "Augustine's 'The City of God' (413–426 CE) argued that Rome's fall was irrelevant to the true Christian — whose citizenship was in the eternal City of God, not any earthly empire. It became the foundational text of Western Christian political theology.", "Augustine's doctrine of original sin — that Adam's sin corrupted all humanity, who are therefore born guilty and deserve damnation without God's grace — was largely his invention, shaped by his debates with the monk Pelagius.", "Pelagius (~354–418 CE) argued that humans have free will and can choose good without God's grace — a position condemned as heresy at Augustine's urging. The debate between Augustinian predestination and Pelagian free will echoes through Christianity to the present day.", "The Council of Ephesus (431 CE) condemned Nestorius, who argued that Mary should be called 'Christotokos' (bearer of Christ) rather than 'Theotokos' (bearer of God). The council declared Mary 'Mother of God' — a title that elevated Marian devotion enormously.", "The Council of Chalcedon (451 CE) declared that Christ has two complete natures — fully divine and fully human — united in one person. This formula was rejected by many Eastern churches (Coptic, Armenian, Ethiopian), causing splits that persist today.", "Attila the Hun terrorized the Western Empire in the 440s–450s CE, extracting enormous tribute and raiding deep into Gaul and Italy. Pope Leo I's negotiation with Attila in 452 CE, convincing him to spare Rome, became legendary.", "The Western Roman Empire's final collapse is conventionally dated to 476 CE, when the Germanic chieftain Odoacer deposed Romulus Augustulus, the last Western emperor, and sent the imperial regalia to Constantinople.", "Tom Holland (The Rest is History) argues that 476 CE was less a dramatic collapse than a gradual transformation — many Romans in the West continued daily life under Germanic kings who largely preserved Roman administrative structures.", "The Vandals, a Germanic people, crossed into North Africa in 429 CE and established a kingdom there. In 455 CE they sacked Rome — giving their name permanently to the English language as a byword for mindless destruction.", "Patrick (~387–461 CE) was taken as a slave to Ireland as a teenager, escaped, and returned as a missionary bishop, converting much of the island to Christianity. Ireland would become a crucial center of learning preserving classical texts through the 'Dark Ages.'", "The monastic movement expanded dramatically in the 5th century. John Cassian (~360–435 CE) brought Eastern desert monasticism to the West, and his writings on the spiritual life shaped Benedictine monasticism and Western Christianity.", "Proclus (~412–485 CE), the last great Neoplatonist philosopher in Athens, synthesized centuries of pagan philosophy into a comprehensive system. His work profoundly influenced Islamic, Jewish, and Christian mysticism.", "The Eastern Roman (Byzantine) Empire not only survived the 5th century but thrived. Emperor Theodosius II (408–450 CE) built the massive Theodosian Walls around Constantinople — walls that would protect the city for a thousand years.", "The Theodosian Code (438 CE) compiled all Roman imperial legislation since Constantine — a massive legal project that preserved Roman law and influenced the legal systems of medieval Europe and, through them, the modern Western world.", "Clovis I (~466–511 CE), king of the Franks, converted to Catholic Christianity (rather than Arian) around 496 CE — a conversion with enormous long-term consequences, as it aligned the most powerful Germanic kingdom with Rome and set the stage for medieval Christendom.", "Boethius (~477–524 CE), a Roman senator serving the Ostrogothic king Theodoric, wrote 'The Consolation of Philosophy' while awaiting execution. It became one of the most widely read books in the Middle Ages — notably, it makes almost no mention of Christianity.", "Ehrman points out that the 5th century saw the effective closure of the New Testament canon in the West — though Eastern churches continued to dispute several books (Revelation, 2 Peter, 2–3 John) well into subsequent centuries.", "The great Alexandrian philosopher Hypatia (born ~360 CE) was murdered by a Christian mob in 415 CE. She has become an iconic symbol of the conflict between classical learning and religious fanaticism — though the reality was more politically complex.", "By 500 CE, the Mediterranean world had been fundamentally transformed: the unified Roman Empire was gone, replaced by a Latin Christian West fragmented among Germanic kingdoms, a Greek Christian Byzantine East, and a Persian Sassanid Empire — a tripartite world that set the stage for the rise of Islam."]}]};

// ── Day index ─────────────────────────────────────────────────────────────────
function getDayIndex() {
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.floor((today - START_DATE) / 86400000);
}

// ── Today's block ─────────────────────────────────────────────────────────────
function getTodaysFacts() {
  const total = allFacts.length, dayIndex = getDayIndex();
  const blockStart = (dayIndex * FACTS_PER_DAY) % total;
  const blockEnd   = blockStart + FACTS_PER_DAY;
  if (blockEnd <= total) return allFacts.slice(blockStart, blockEnd);
  return [...allFacts.slice(blockStart), ...allFacts.slice(0, blockEnd - total)];
}

// ── Focus map on a fact ───────────────────────────────────────────────────────
function focusMap(factText, centuryLabel, cardEl) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('map-active'));
  if (cardEl) cardEl.classList.add('map-active');
  const region = getRegionForFact(factText, centuryLabel);
  initMap(region);
}

// ── Render today ──────────────────────────────────────────────────────────────
function renderToday() {
  const dayIndex  = getDayIndex();
  const totalDays = Math.ceil(allFacts.length / FACTS_PER_DAY);
  const cycleDay  = (dayIndex % totalDays) + 1;
  const block     = getTodaysFacts();

  const centuries = [...new Set(block.map(f => f.century_label))];
  const dateStr   = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  document.getElementById('header-day').textContent   = `Day ${cycleDay} of ${totalDays} · Century Histories`;
  document.getElementById('header-title').textContent = centuries.join(' & ');
  document.getElementById('header-era').textContent   = '';
  document.getElementById('header-date').textContent  = dateStr;
  document.getElementById('century-nav').classList.remove('visible');

  const cards = document.getElementById('cards');
  cards.innerHTML = block.map((item, i) => {
    const region = getRegionForFact(item.fact, item.century_label);
    return `
      <div class="card" style="animation-delay:${i * 0.08}s" onclick="focusMap(${JSON.stringify(item.fact)}, ${JSON.stringify(item.century_label)}, this)">
        <div class="card-num">Fact ${i + 1} of ${block.length}</div>
        <p class="card-fact">${item.fact}</p>
        <div class="card-region">📍 ${region.label}</div>
      </div>`;
  }).join('');

  // Auto-focus map on first fact
  setTimeout(() => {
    const region = getRegionForFact(block[0].fact, block[0].century_label);
    initMap(region);
    document.querySelectorAll('.card')[0]?.classList.add('map-active');
  }, 100);
}

// ── Century nav ───────────────────────────────────────────────────────────────
function buildCenturyNav() {
  document.getElementById('century-nav').innerHTML = allData.centuries.map((c, i) =>
    `<button class="century-btn${i===0?' active':''}" onclick="selectCentury(${i})">${c.label}</button>`
  ).join('');
}

function selectCentury(idx) {
  activeCentury = idx;
  document.querySelectorAll('.century-btn').forEach((b, i) => b.classList.toggle('active', i===idx));
  renderCentury(idx);
}

function renderCentury(idx) {
  const century = allData.centuries[idx];
  document.getElementById('header-day').textContent   = 'Century Histories · Browse';
  document.getElementById('header-title').textContent = century.label;
  document.getElementById('header-era').textContent   = `${century.facts.length} facts`;
  document.getElementById('header-date').textContent  = '';

  const summaryHTML = `
    <div class="summary-card">
      <div class="summary-label">Overview</div>
      <div class="summary-title">${century.label}</div>
      <p class="summary-text">${century.summary}</p>
    </div>`;

  const factsHTML = century.facts.map((fact, i) => {
    const region = getRegionForFact(fact, century.label);
    return `
      <div class="card" style="animation-delay:${(i+1)*0.06}s" onclick="focusMap(${JSON.stringify(fact)}, ${JSON.stringify(century.label)}, this)">
        <div class="card-num">Fact ${i+1} of ${century.facts.length}</div>
        <p class="card-fact">${fact}</p>
        <div class="card-region">📍 ${region.label}</div>
      </div>`;
  }).join('');

  document.getElementById('cards').innerHTML = summaryHTML + factsHTML;

  // Auto-focus map on century's first fact
  setTimeout(() => {
    const region = getRegionForFact(century.facts[0], century.label);
    initMap(region);
  }, 100);
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function showToday() {
  document.getElementById('btn-today').classList.add('active');
  document.getElementById('btn-browse').classList.remove('active');
  document.getElementById('century-nav').classList.remove('visible');
  renderToday();
}

function showBrowse() {
  document.getElementById('btn-browse').classList.add('active');
  document.getElementById('btn-today').classList.remove('active');
  document.getElementById('century-nav').classList.add('visible');
  selectCentury(activeCentury);
}

init();
</script>
