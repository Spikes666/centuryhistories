<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>CENTURY HISTORIES :: GAME</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Themes ── */
    body.fallout { --fg: #20c20e; --dim: #0a4a06; --hi: #39ff14; --bg: #0d0d0d; --cursor: #20c20e; }
    body.matrix  { --fg: #00ff41; --dim: #003b0f; --hi: #afffbf; --bg: #0d0d0d; --cursor: #00ff41; }
    body.c64     { --fg: #aaaad4; --dim: #1a4a56; --hi: #ffffff; --bg: #352879; --cursor: #aaaad4; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'VT323', 'Courier New', monospace;
      font-size: 20px;
      line-height: 1.25;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* CRT glow */
    #term {
      text-shadow: 0 0 6px var(--fg), 0 0 2px var(--fg);
      white-space: pre;
      font-family: inherit;
      font-size: inherit;
      padding: 12px 16px 80px;
      max-width: 680px;
      margin: 0 auto;
      min-height: 100vh;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.35) 100%);
    }

    .dim    { color: var(--dim); text-shadow: none; }
    .hi     { color: var(--hi); }
    .blink  { animation: blink 1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* On-screen keyboard for mobile Wordle */
    #osk {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg); border-top: 1px solid var(--dim);
      padding: 8px 6px 10px;
      font-family: 'VT323', 'Courier New', monospace;
      font-size: 18px;
      text-shadow: 0 0 4px var(--fg);
      z-index: 50;
    }
    #osk.show { display: block; }
    .osk-row { display: flex; justify-content: center; gap: 3px; margin-bottom: 3px; }
    .osk-key {
      min-width: 28px; height: 36px; border: 1px solid var(--dim); background: transparent;
      color: var(--fg); font-family: inherit; font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      padding: 0 4px; text-shadow: 0 0 4px var(--fg); -webkit-tap-highlight-color: transparent;
    }
    .osk-key.wide { min-width: 48px; font-size: 13px; }
    .osk-key.correct { color: var(--hi); border-color: var(--hi); }
    .osk-key.present { color: #b59f3b; border-color: #b59f3b; }
    .osk-key.absent  { color: var(--dim); border-color: var(--dim); }

    /* Theme toggle button */
    #theme-toggle {
      position: fixed; top: 8px; right: 10px;
      background: transparent; border: 1px solid var(--dim);
      color: var(--dim); font-family: inherit; font-size: 14px;
      cursor: pointer; padding: 2px 8px; z-index: 200;
      text-shadow: none;
    }
    #theme-toggle:hover { color: var(--fg); border-color: var(--fg); }

    /* On-screen ENTER button — always visible, anchored above OSK */
    #enter-btn {
      position: fixed; bottom: 10px; right: 10px;
      background: transparent; border: 1px solid var(--fg);
      color: var(--fg); font-family: inherit; font-size: 16px;
      cursor: pointer; padding: 6px 14px; z-index: 200;
      text-shadow: 0 0 4px var(--fg);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #enter-btn:hover { background: var(--dim); }
    #enter-btn.osk-open { bottom: 130px; }
  </style>
</head>
<body class="fallout">

<button id="theme-toggle" onclick="cycleTheme()" title="Toggle theme [T]">[T]HEME</button>
<div id="term"></div>
<div id="osk"></div>
<button id="enter-btn" onclick="handleKey('ENTER')" title="Confirm / Enter">[ENTER]</button>

<script>
// ─────────────────────────────────────────────────────────────
//  Constants
// ─────────────────────────────────────────────────────────────
const CONTENT_URL  = 'https://raw.githubusercontent.com/Spikes666/centuryhistories/main/flashcards/content.json';
const START_DATE   = new Date('2025-01-01');
const W            = 38;  // usable cols inside box borders
const THEMES       = ['fallout','matrix','c64'];
const STORAGE_KEY  = 'ch_retro_v2';

const STOPWORDS = new Set([
  'The','In','By','At','On','An','Of','Or','And','But','From','With',
  'This','That','These','Those','During','After','Before','Against',
  'Between','Around','About','Over','Under','Into','Upon','Their',
  'They','When','What','Who','Which','Where','Such','More','Most',
  'Some','Many','Both','Each','Even','Than','Then','Also','Only',
  'Very','Much','Long','Well','High','Holy','Late','Early','New',
  'First','Last','Great','Later','Soon','Known','Born','Made',
  'Became','Called','Named','Said','Took','Used','Still','Circa'
]);

// ─────────────────────────────────────────────────────────────
//  App state
// ─────────────────────────────────────────────────────────────
let centuries = [];
let games     = null;
let theme     = localStorage.getItem('retroTheme') || 'fallout';
let G         = {};  // persistent storage

// Screen states: BOOT | DECK | STUDY | MENU | CHRONO | WORDLE | JEO | DONE
const S = {
  screen:     'BOOT',
  studyIdx:   0,

  // CHRONO
  chronoOrder: [],
  chronoInput: '',
  chronoDone:  false,
  chronoError: '',

  // WORDLE
  wTarget: '', wGuesses: [], wColors: [], wCurrent: '', wDone: false, wError: '',

  // JEO
  jChoices: [], jHints: 0, jAnswered: false, jSelected: -1, jHintMsg: ''
};

// ─────────────────────────────────────────────────────────────
//  Persistent storage
// ─────────────────────────────────────────────────────────────
function loadStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultStorage();
    return { ...defaultStorage(), ...JSON.parse(raw) };
  } catch(e) { return defaultStorage(); }
}
function defaultStorage() {
  return { seenFacts: {}, session: null, streak: 0, lastCompleted: null };
}
function saveStorage() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(G));
}

function countSeenFacts() {
  let total = 0;
  for (const [id, n] of Object.entries(G.seenFacts || {})) {
    const c = centuries.find(c => c.id === id);
    if (c) total += Math.min(n, c.facts.length);
  }
  return total;
}

function markFactsSeen(facts) {
  const by = {};
  for (const f of facts) { by[f.century_id] = (by[f.century_id]||0)+1; }
  for (const [id, n] of Object.entries(by)) {
    G.seenFacts[id] = (G.seenFacts[id]||0)+n;
  }
  saveStorage();
}

function sessionScore() {
  const s = G.session?.score || {};
  return Object.values(s).reduce((a,b)=>a+b, 0);
}

function allModesDone() {
  const s = G.session?.score || {};
  return s.chrono !== undefined && s.wordle !== undefined && s.jeopardy !== undefined;
}

function completeMode(key, pts) {
  if (!G.session) return;
  G.session.score[key] = pts;
  const today = new Date().toISOString().slice(0,10);
  if (allModesDone() && G.lastCompleted !== today) {
    G.streak = (G.streak||0)+1;
    G.lastCompleted = today;
  }
  saveStorage();
}

// ─────────────────────────────────────────────────────────────
//  Theming
// ─────────────────────────────────────────────────────────────
function applyTheme() {
  document.body.className = theme;
  localStorage.setItem('retroTheme', theme);
}
function cycleTheme() {
  const i = THEMES.indexOf(theme);
  theme = THEMES[(i+1) % THEMES.length];
  applyTheme();
  render();
}

// ─────────────────────────────────────────────────────────────
//  ASCII helpers — fixed word-wrap and box overflow
// ─────────────────────────────────────────────────────────────
function visLen(s) {
  return s.replace(/<[^>]*>/g,'').length;
}

// FIX: truncate content that exceeds inner width
function box(lines, w) {
  const inner = w || W;
  const top   = '+' + '-'.repeat(inner+2) + '+\n';
  const bot   = '+' + '-'.repeat(inner+2) + '+';
  const rows  = lines.map(l => {
    const s   = String(l);
    // Truncate if content is too wide
    const truncated = visLen(s) > inner ? s.slice(0, inner) : s;
    const padN = Math.max(0, inner - visLen(truncated));
    return '| ' + truncated + ' '.repeat(padN) + ' |';
  }).join('\n');
  return top + rows + '\n' + bot;
}

function center(text, w) {
  const inner = w || W;
  const s     = String(text);
  const v     = visLen(s);
  const padN  = Math.max(0, inner - v);
  const lpad  = Math.floor(padN/2);
  const rpad  = padN - lpad;
  return ' '.repeat(lpad) + s + ' '.repeat(rpad);
}

// FIX: hard-wrap words longer than maxW
function wrap(text, w) {
  const maxW  = w || W;
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  for (const word of words) {
    if (word.length > maxW) {
      // Hard-break overlong words
      if (cur) { lines.push(cur); cur = ''; }
      for (let i = 0; i < word.length; i += maxW) {
        const chunk = word.slice(i, i + maxW);
        if (i + maxW < word.length) lines.push(chunk);
        else cur = chunk;
      }
    } else if (cur.length === 0) {
      cur = word;
    } else if (cur.length + 1 + word.length <= maxW) {
      cur += ' ' + word;
    } else {
      lines.push(cur);
      cur = word;
    }
  }
  if (cur) lines.push(cur);
  return lines;
}

function pad(s, n) {
  const v = visLen(String(s));
  return String(s) + ' '.repeat(Math.max(0, n - v));
}

function hr(ch) { return (ch||'-').repeat(W+2); }

function getDayNum() {
  const d = new Date(); d.setHours(0,0,0,0);
  return Math.floor((d - START_DATE) / 86400000);
}

// FIX: builds a menu row that fits exactly in W chars
function menuRow(key, name, done, maxPts) {
  const left  = `  [${key}] ${name}`;
  const right = done !== undefined ? `DONE +${done}` : `UP TO ${maxPts}`;
  const space = Math.max(1, W - left.length - right.length);
  const row   = left + ' '.repeat(space) + right;
  // Safety clamp
  return row.length > W ? row.slice(0, W) : row;
}

// ─────────────────────────────────────────────────────────────
//  Year & keyword helpers
// ─────────────────────────────────────────────────────────────
function extractYear(text, ci) {
  const bce = text.match(/(\d[\d,]*)\s*BCE/i);
  if (bce) return -parseInt(bce[1].replace(/,/g,''));
  const ce  = text.match(/(\d[\d,]*)\s*CE/i);
  if (ce)  return  parseInt(ce[1].replace(/,/g,''));
  return ci * 100 - 3000;
}
function yearLabel(y) { return y < 0 ? Math.abs(y)+' BCE' : y+' CE'; }

function stripAllDates(text) {
  return text
    .replace(/\(\s*[~c.]?\s*\d[\d,]*\s*[-–]?\s*\d*\s*(?:BCE|CE|BC|AD)?\s*\)/gi, '')
    .replace(/\b(Around|Circa|~)\s*\d[\d,]*\s*(BCE|CE|BC|AD)?,?\s*/gi, '')
    .replace(/\b\d[\d,]*\s*(?:BCE|CE|BC|AD)\b[,.]?\s*/gi, '')
    .replace(/\b(1st|2nd|3rd|4th|5th|6th|7th|8th|9th|10th|11th|12th|13th|14th|15th|16th|17th|18th|19th|20th|21st)\s+century\b\s*/gi, 'this era ')
    .replace(/\(\s*\d{3,4}\s*\)/g, '')
    .replace(/\s{2,}/g, ' ')
    .replace(/^\s*[,;.]\s*/, '')
    .replace(/\s+([,;.])/g, '$1')
    .trim();
}

function extractKeyword(factText) {
  const candidates = [];
  const re = /\b([A-Z][a-z]{3,11})\b/g;
  let m;
  while ((m = re.exec(factText)) !== null) {
    if (!STOPWORDS.has(m[1])) candidates.push(m[1]);
  }
  if (!candidates.length) return null;
  const freq = {};
  for (const w of candidates) freq[w] = (freq[w]||0)+1;
  const pool = [...new Set(candidates)].sort((a,b) => {
    const uA = freq[a]===1, uB = freq[b]===1;
    if (uA!==uB) return uA?-1:1;
    return b.length - a.length;
  });
  return pool[0];
}

// ─────────────────────────────────────────────────────────────
//  Fact selection (session-based)
// ─────────────────────────────────────────────────────────────
function pickDeckFacts(count) {
  const seen = G.seenFacts || {};
  if (count === 23) {
    return centuries.map((c, ci) => {
      const idx = (seen[c.id]||0) % c.facts.length;
      const f   = c.facts[idx];
      return { ...f, century_label:c.label, era:c.era, century_id:c.id,
               century_idx:ci, year:extractYear(f.fact, ci) };
    });
  } else {
    const unseenC = centuries.filter(c => (seen[c.id]||0) < c.facts.length);
    const pool    = unseenC.length > 0 ? unseenC : centuries;
    const c       = pool[Math.floor(Math.random()*pool.length)];
    const ci      = centuries.indexOf(c);
    const start   = (seen[c.id]||0) % c.facts.length;
    return Array.from({length:count}, (_,i) => {
      const fi = (start+i) % c.facts.length;
      const f  = c.facts[fi];
      return { ...f, century_label:c.label, era:c.era, century_id:c.id,
               century_idx:ci, year:extractYear(f.fact, ci) };
    });
  }
}

// ─────────────────────────────────────────────────────────────
//  Session game builder
// ─────────────────────────────────────────────────────────────
function buildSessionGames(facts) {
  // CHRONO: pick 4 spread across session
  let chronoPool;
  if (facts.length <= 4) {
    chronoPool = [...facts];
  } else {
    const step = Math.floor(facts.length/4);
    const idxs = new Set([0,1,2,3].map(i => Math.min(i*step, facts.length-1)));
    chronoPool = [...idxs].map(i => facts[i]);
  }
  const seenFacts = new Set();
  chronoPool = chronoPool.filter(f => { if (seenFacts.has(f.fact)) return false; seenFacts.add(f.fact); return true; });
  while (chronoPool.length < 4 && facts.length > chronoPool.length) {
    const extra = facts.find(f => !seenFacts.has(f.fact));
    if (!extra) break;
    chronoPool.push(extra);
    seenFacts.add(extra.fact);
  }
  const chronoCorrect = [...chronoPool].sort((a,b)=>a.year-b.year);
  const chronoDisplay = [...chronoPool];
  for (let i = chronoDisplay.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [chronoDisplay[i],chronoDisplay[j]] = [chronoDisplay[j],chronoDisplay[i]];
  }

  // WORDLE: first fact with valid keyword
  let wordleFact = null;
  for (const f of facts) {
    const kw = extractKeyword(f.fact);
    if (kw && kw.length >= 4 && kw.length <= 12) {
      wordleFact = { ...f, raw:kw, word:kw.toUpperCase() }; break;
    }
  }

  // JEOPARDY: another fact
  let jeoFact = null;
  const wrongPool = [];
  for (const f of facts) {
    if (wordleFact && f.fact === wordleFact.fact) continue;
    const kw = extractKeyword(f.fact);
    if (kw && kw.length >= 3 && !jeoFact) {
      jeoFact = { ...f, raw:kw, word:kw.toUpperCase() };
    }
    if (kw) wrongPool.push(kw.toUpperCase());
  }
  // Supplement wrong answers from global pool
  for (const c of centuries) {
    for (const f of c.facts) {
      const kw = extractKeyword(f.fact);
      if (kw && kw.toUpperCase() !== jeoFact?.word && wrongPool.length < 20) {
        wrongPool.push(kw.toUpperCase());
      }
    }
    if (wrongPool.length >= 20) break;
  }
  const dedupedWrong = [...new Set(wrongPool.filter(w => w !== jeoFact?.word))];
  for (let i = dedupedWrong.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [dedupedWrong[i],dedupedWrong[j]] = [dedupedWrong[j],dedupedWrong[i]];
  }
  const wrongAnswers = dedupedWrong.slice(0,3);

  return { chronoDisplay, chronoCorrect, wordleFact, jeoFact, wrongAnswers };
}

// ─────────────────────────────────────────────────────────────
//  Render engine
// ─────────────────────────────────────────────────────────────
function render() {
  const term     = document.getElementById('term');
  const themeLabel = theme.toUpperCase();
  const score    = sessionScore();
  let out = '';

  out += box([
    center('CENTURY HISTORIES :: GAME'),
    center(`DAY ${getDayNum()}  |  SCORE: ${score}  |  [${themeLabel}]`)
  ]);
  out += '\n';

  if      (S.screen === 'BOOT')   out += renderBoot();
  else if (S.screen === 'DECK')   out += renderDeck();
  else if (S.screen === 'STUDY')  out += renderStudy();
  else if (S.screen === 'MENU')   out += renderMenu();
  else if (S.screen === 'CHRONO') out += renderChrono();
  else if (S.screen === 'WORDLE') out += renderWordle();
  else if (S.screen === 'JEO')    out += renderJeo();
  else if (S.screen === 'DONE')   out += renderDone();

  out += '\n';
  out += '+' + hr() + '+\n';
  if (S.screen === 'DECK' || S.screen === 'BOOT') {
    out += '| ' + pad('[T] THEME  [Q] QUIT TO INDEX', W) + ' |\n';
  } else if (S.screen === 'STUDY') {
    out += '| ' + pad('[N] NEXT  [P] PREV  [S] SKIP', W) + ' |\n';
  } else {
    out += '| ' + pad('[T] THEME  [H] HUB  [D] NEW SESSION', W) + ' |\n';
  }
  out += '+' + hr() + '+\n';

  term.textContent = out;
  updateOSK();
}

// ─────────────────────────────────────────────────────────────
//  Screen renderers
// ─────────────────────────────────────────────────────────────
function renderBoot() {
  let o = '\n';
  o += center('LOADING HISTORY DATABASE...') + '\n\n';
  o += center('[' + '='.repeat(20) + ']') + '\n';
  return o;
}

function renderDeck() {
  const seen   = countSeenFacts();
  const streak = G.streak || 0;
  let o = '\n';
  o += box([
    center('-- SELECT SESSION --'),
    '',
    center(`SEEN: ${seen} FACTS  |  STREAK: ${streak} DAYS`),
    '',
    `  [1] QUICK      5 facts, 1 century`,
    `  [2] STANDARD  10 facts, 1 century`,
    `  [3] GRAND TOUR 23 facts, all eras`,
    '',
    center('PRESS 1 / 2 / 3 TO BEGIN')
  ]);
  return o;
}

function renderStudy() {
  if (!G.session) return renderDeck();
  const facts = G.session.facts;
  const idx   = S.studyIdx;
  const f     = facts[idx];
  const total = facts.length;
  let o = '\n';
  o += box([center(`STUDYING: ${idx+1} OF ${total}`)]);
  o += '\n';

  // Century / era info
  const centuryLine = (f.century_label || '').toUpperCase();
  const eraLine     = (f.era || '').toUpperCase();

  // Fact text wrapped
  const factLines = wrap(f.fact || '', W-4);

  o += `+${'-'.repeat(W+2)}+\n`;
  // Truncate long century labels to fit
  const centLabel = centuryLine.slice(0, W-2);
  o += `| ${pad(centLabel, W)} |\n`;
  if (eraLine) o += `| ${pad(eraLine.slice(0, W-2), W)} |\n`;
  o += `| ${' '.repeat(W)} |\n`;
  factLines.forEach(l => {
    o += `|   ${pad(l, W-4)}   |\n`;
  });
  o += `| ${' '.repeat(W)} |\n`;
  o += `+${'-'.repeat(W+2)}+\n`;
  o += '\n';

  const isLast = idx === total - 1;
  o += box([
    center(isLast ? '[N/ENTER] DONE STUDYING' : '[N] NEXT FACT'),
    center('[P] PREVIOUS  [S] SKIP TO GAMES')
  ]);
  return o;
}

function renderMenu() {
  const score = G.session?.score || {};
  let o = '\n';
  o += box([
    center('-- GAME HUB --'),
    center((G.session?.centuryLabel || '').toUpperCase()),
    '',
    menuRow('1', 'CHRONO ORDER', score.chrono,   100),
    menuRow('2', 'MISSING WORD', score.wordle,   300),
    menuRow('3', 'WHAT IS IT?',  score.jeopardy, 300),
    '',
    center(`STREAK: ${G.streak||0} DAY(S)`)
  ]);
  return o;
}

function renderChrono() {
  let o = '\n';
  o += box([center('-- CHRONO ORDER --'), center('Arrange events: OLDEST to NEWEST')]);
  o += '\n';

  const facts = S.chronoOrder.map(fi => games.chronoDisplay[fi]);
  facts.forEach((f, rank) => {
    const stripped = stripAllDates(f.fact);
    const lines    = wrap(stripped, W-4);
    o += `+${'-'.repeat(W+2)}+\n`;
    // Century label clamped to W
    const lbl = `[${rank+1}] ${(f.century_label||'').split(' (')[0].toUpperCase()}`;
    o += `| ${pad(lbl.slice(0,W), W)} |\n`;
    lines.slice(0,4).forEach(l => { o += `|   ${pad(l, W-4)}   |\n`; });
    o += `+${'-'.repeat(W+2)}+\n`;
  });

  if (S.chronoDone) {
    o += '\n';
    const correct = S.chronoOrder.reduce((acc, fi, rank) => {
      return acc + (games.chronoDisplay[fi].year === games.chronoCorrect[rank].year ? 1 : 0);
    }, 0);
    const pts = correct * 25;
    o += box([
      center(correct===4 ? '** PERFECT ORDER! **' : `${correct}/4 CORRECT -- +${pts} PTS`),
      '',
      center('CORRECT ORDER:'),
      ...games.chronoCorrect.map((f,i) => {
        const label = `  ${i+1}. ${yearLabel(f.year)} -- ${(f.century_label||'').split(' (')[0]}`;
        return label.slice(0, W);
      }),
      '',
      center('[H] BACK TO HUB')
    ]);
  } else {
    o += '\n';
    if (S.chronoError) {
      o += box([center(S.chronoError)]);
      o += '\n';
    }
    o += box([
      center('TYPE ORDER  e.g.  2 4 1 3'),
      center('then press ENTER to confirm'),
      '',
      center(`YOUR INPUT: ${S.chronoInput || '_'}`)
    ]);
  }
  return o;
}

function renderWordle() {
  if (!games?.wordleFact) return box([center('NO WORD PUZZLE FOR THIS SESSION')]);
  const target  = S.wTarget;
  const guesses = S.wGuesses;
  const colors  = S.wColors;
  const current = S.wCurrent;

  let o = '\n';
  o += box([
    center('-- MISSING WORD --'),
    center(`WORD LENGTH: ${target.length} LETTERS`)
  ]);
  o += '\n';

  // FIX: wrap at W-4 to match the |   pad(l, W-4)   | row format
  const blanked   = (games.wordleFact.fact||'').replace(
    new RegExp('\\b'+games.wordleFact.raw+'\\b', 'i'), '_'.repeat(target.length)
  );
  const factLines = wrap(blanked, W-4);
  o += `+${'-'.repeat(W+2)}+\n`;
  o += `| ${pad('FACT:', W)} |\n`;
  factLines.forEach(l => { o += `|   ${pad(l, W-4)}   |\n`; });
  o += `+${'-'.repeat(W+2)}+\n\n`;

  // Guess grid
  o += `+${'-'.repeat(W+2)}+\n`;
  for (let row = 0; row < 6; row++) {
    if (row < guesses.length) {
      const letters = guesses[row];
      const cs      = colors[row];
      let cells = '';
      letters.forEach((l, i) => {
        const sym = cs[i]==='correct' ? `[${l}]` : cs[i]==='present' ? `(${l})` : ` ${l} `;
        cells += sym;
      });
      if (row === 0) {
        o += `| ${pad(center('[X]=HIT  (X)=WRONG SPOT   =MISS',W),W)} |\n`;
      }
      o += `| ${pad(center(cells, W), W)} |\n`;
    } else if (row === guesses.length && !S.wDone) {
      const filled = current.split('').map(l => `[${l}]`).join('');
      const empty  = '_  '.repeat(target.length - current.length);
      o += `| ${pad(center('> ' + filled + empty, W), W)} |\n`;
    } else {
      const empty = '   '.repeat(target.length);
      o += `| ${pad(center(empty, W), W)} |\n`;
    }
  }
  o += `+${'-'.repeat(W+2)}+\n`;

  if (S.wDone) {
    const won = colors.length > 0 && colors[colors.length-1].every(c=>c==='correct');
    const pts = won ? Math.max(100, 300-(guesses.length-1)*40) : 0;
    o += '\n';
    o += box([
      center(won ? `** CORRECT IN ${guesses.length} TRIES! **` : `WORD WAS: ${target}`),
      center(`+${pts} PTS`),
      '',
      center('[H] BACK TO HUB')
    ]);
  } else {
    o += '\n';
    o += box([
      center('TYPE LETTERS TO GUESS'),
      center('[ENTER] SUBMIT  [BKSP] DELETE'),
      ...(S.wError ? [center(S.wError)] : [])
    ]);
  }
  return o;
}

function renderJeo() {
  if (!games?.jeoFact) return box([center('NO QUESTION FOR THIS SESSION')]);
  const pts = Math.max(100, 300-S.jHints*100);
  let o = '\n';
  o += box([center('-- WHAT IS IT? --'), center(`WORTH: ${pts} PTS  |  HINTS USED: ${S.jHints}`)]);
  o += '\n';

  const raw     = games.jeoFact.raw;
  const blanked = (games.jeoFact.fact||'').replace(
    new RegExp('\\b'+raw+'\\b', 'i'), '_'.repeat(raw.length)
  );
  const lines   = wrap(blanked, W-4);
  o += `+${'-'.repeat(W+2)}+\n`;
  o += `| ${pad('CLUE:', W)} |\n`;
  lines.slice(0,5).forEach(l => { o += `|   ${pad(l, W-4)}   |\n`; });
  o += `+${'-'.repeat(W+2)}+\n\n`;

  // Choices
  const labels = ['A','B','C','D'];
  o += `+${'-'.repeat(W+2)}+\n`;
  S.jChoices.forEach((c, i) => {
    let mark = '';
    if (S.jAnswered) {
      if (c === games.jeoFact.word) mark = ' <CORRECT';
      else if (i === S.jSelected)  mark = ' <WRONG';
    }
    const row = `  [${labels[i]}] ${c}${mark}`;
    o += `| ${pad(row.slice(0,W), W)} |\n`;
  });
  o += `+${'-'.repeat(W+2)}+\n`;

  if (S.jAnswered) {
    const correct = S.jChoices[S.jSelected] === games.jeoFact.word;
    const earned  = correct ? pts : 0;
    o += '\n';
    o += box([
      center(correct ? '** CORRECT! **' : 'INCORRECT'),
      center(`+${earned} PTS`),
      '',
      center('[H] BACK TO HUB')
    ]);
  } else {
    o += '\n';
    o += box([
      center('PRESS A / B / C / D TO ANSWER'),
      S.jHints < 1
        ? center('[X] HINT: REMOVE 1 WRONG (-100)')
        : center('NO MORE HINTS'),
      ...(S.jHintMsg ? [center(S.jHintMsg)] : [])
    ]);
  }
  return o;
}

function renderDone() {
  const s = G.session?.score || {};
  const chrono   = s.chrono   !== undefined ? s.chrono   : '-';
  const wordle   = s.wordle   !== undefined ? s.wordle   : '-';
  const jeopardy = s.jeopardy !== undefined ? s.jeopardy : '-';
  const total    = sessionScore();
  let o = '\n';
  o += box([
    center('** SESSION COMPLETE! **'),
    '',
    center('RESULTS:'),
    `  CHRONO ORDER  : +${chrono} pts`,
    `  MISSING WORD  : +${wordle} pts`,
    `  WHAT IS IT?   : +${jeopardy} pts`,
    '',
    center(`TOTAL: ${total} PTS`),
    center(`STREAK: ${G.streak||0} DAY(S)`),
    '',
    center('[D] NEW SESSION  [H] HUB')
  ]);
  return o;
}

// ─────────────────────────────────────────────────────────────
//  On-screen keyboard for mobile Wordle
// ─────────────────────────────────────────────────────────────
function updateOSK() {
  const osk = document.getElementById('osk');
  const enterBtn = document.getElementById('enter-btn');
  if (S.screen !== 'WORDLE' || S.wDone) {
    osk.classList.remove('show');
    if (enterBtn) enterBtn.classList.remove('osk-open');
    return;
  }
  osk.classList.add('show');
  if (enterBtn) enterBtn.classList.add('osk-open');

  const rows = ['QWERTYUIOP','ASDFGHJKL','⌫ZXCVBNM↵'];
  const keyState = {};
  for (let g = 0; g < S.wGuesses.length; g++) {
    for (let i = 0; i < S.wGuesses[g].length; i++) {
      const ch = S.wGuesses[g][i], c = S.wColors[g][i], prev = keyState[ch];
      if (!prev||(prev==='absent'&&c!=='absent')||(prev==='present'&&c==='correct')) keyState[ch]=c;
    }
  }
  osk.innerHTML = rows.map(row => {
    const keys = row.split('').map(ch => {
      const special = ch==='⌫'||ch==='↵';
      const state   = keyState[ch] || '';
      const label   = ch==='⌫' ? 'DEL' : ch==='↵' ? 'ENT' : ch;
      return `<button class="osk-key ${special?'wide':''} ${state}" onclick="oskKey('${ch}')">${label}</button>`;
    }).join('');
    return `<div class="osk-row">${keys}</div>`;
  }).join('');
}

function oskKey(ch) { handleKey(ch); }

// ─────────────────────────────────────────────────────────────
//  Input handler
// ─────────────────────────────────────────────────────────────
function handleKey(key) {
  const k = key.toUpperCase();

  // Global
  if (k === 'T') { cycleTheme(); return; }

  if (S.screen === 'DECK') {
    if (k === '1') startSession(5);
    if (k === '2') startSession(10);
    if (k === '3') startSession(23);
    return;
  }

  if (k === 'D') { newSession(); return; }
  if (k === 'H' || k === 'Q') { goMenu(); return; }

  if (S.screen === 'STUDY') {
    const total = G.session?.facts?.length || 0;
    if (k === 'N' || k === 'ENTER') {
      if (S.studyIdx < total - 1) { S.studyIdx++; render(); }
      else doneStudying();
    } else if (k === 'P') {
      if (S.studyIdx > 0) { S.studyIdx--; render(); }
    } else if (k === 'S') {
      doneStudying();
    }
    return;
  }

  if (S.screen === 'MENU') {
    const sc = G.session?.score || {};
    if (k === '1' && sc.chrono   === undefined) startChrono();
    if (k === '2' && sc.wordle   === undefined) startWordle();
    if (k === '3' && sc.jeopardy === undefined) startJeo();
    if (allModesDone()) { S.screen='DONE'; render(); }
    return;
  }

  if (S.screen === 'CHRONO') {
    if (S.chronoDone) { if (k==='ENTER') goMenu(); return; }
    if (k === 'ENTER' || k === '\n') { submitChrono(); }
    else if (k === 'BACKSPACE' || k === '⌫') { S.chronoInput = S.chronoInput.slice(0,-1); S.chronoError=''; render(); }
    else if (/^[\d ]$/.test(k)) {
      if (S.chronoInput.length < 8) { S.chronoInput += k; render(); }
    }
    return;
  }

  if (S.screen === 'WORDLE') {
    if (S.wDone) { if (k==='ENTER') goMenu(); return; }
    if (k === 'ENTER' || k === '↵') { submitWordle(); }
    else if (k === 'BACKSPACE' || k === '⌫') { S.wCurrent = S.wCurrent.slice(0,-1); S.wError=''; render(); }
    else if (/^[A-Z]$/.test(k) && S.wCurrent.length < S.wTarget.length) {
      S.wCurrent += k; S.wError=''; render();
    }
    return;
  }

  if (S.screen === 'JEO') {
    if (S.jAnswered) { if (k==='ENTER') goMenu(); return; }
    if (k==='X' && S.jHints < 1) { useJeoHint(); return; }
    const idx = ['A','B','C','D'].indexOf(k);
    if (idx >= 0 && idx < S.jChoices.length) answerJeo(idx);
    return;
  }

  if (S.screen === 'DONE') {
    if (k==='ENTER') goMenu();
  }
}

document.addEventListener('keydown', e => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  let k = e.key;
  if (k === 'Backspace') k = 'BACKSPACE';
  else if (k === 'Enter') k = 'ENTER';
  else if (k.length === 1) k = k.toUpperCase();
  else return;
  e.preventDefault();
  handleKey(k);
});

// ─────────────────────────────────────────────────────────────
//  Session flow
// ─────────────────────────────────────────────────────────────
function startSession(count) {
  const facts        = pickDeckFacts(count);
  const centuryLabel = count === 23 ? 'All 23 Centuries' : (facts[0]?.century_label || '');
  G.session = { facts, score: {}, deckSize: count, centuryLabel, studyDone: false };
  saveStorage();
  S.studyIdx = 0;
  S.screen   = 'STUDY';
  render();
}

function doneStudying() {
  markFactsSeen(G.session.facts);
  G.session.studyDone = true;
  saveStorage();
  games = buildSessionGames(G.session.facts);
  goMenu();
}

function goMenu() {
  S.screen = allModesDone() ? 'DONE' : 'MENU';
  render();
}

function newSession() {
  G.session = null;
  games     = null;
  saveStorage();
  S.screen = 'DECK';
  render();
}

// ─────────────────────────────────────────────────────────────
//  Game logic
// ─────────────────────────────────────────────────────────────
function startChrono() {
  if (!games) return;
  S.chronoOrder = games.chronoDisplay.map((_,i)=>i);
  S.chronoInput = '';
  S.chronoDone  = false;
  S.chronoError = '';
  S.screen      = 'CHRONO';
  render();
}

function submitChrono() {
  const parts = S.chronoInput.trim().split(/\s+/).map(Number).filter(n=>n>=1&&n<=4);
  const unique = [...new Set(parts)];
  if (unique.length !== 4) {
    S.chronoError = `NEED ALL 4 NUMBERS e.g. 2 4 1 3`;
    render(); return;
  }
  S.chronoOrder = unique.map(n=>n-1);
  S.chronoDone  = true;
  const correct = S.chronoOrder.reduce((acc, fi, rank) =>
    acc + (games.chronoDisplay[fi].year === games.chronoCorrect[rank].year ? 1 : 0), 0);
  completeMode('chrono', correct*25);
  render();
}

function startWordle() {
  if (!games?.wordleFact) return;
  S.wTarget  = games.wordleFact.word;
  S.wGuesses = []; S.wColors = []; S.wCurrent = ''; S.wDone = false; S.wError = '';
  S.screen   = 'WORDLE';
  render();
}

function submitWordle() {
  if (S.wCurrent.length !== S.wTarget.length) {
    S.wError = `NEED ${S.wTarget.length} LETTERS`; render(); return;
  }
  const colors = scoreGuess(S.wCurrent, S.wTarget);
  S.wGuesses.push(S.wCurrent.split(''));
  S.wColors.push(colors);
  S.wCurrent = '';
  const won  = colors.every(c=>c==='correct');
  const over = S.wGuesses.length >= 6;
  if (won || over) {
    S.wDone = true;
    const pts = won ? Math.max(100, 300-(S.wGuesses.length-1)*40) : 0;
    completeMode('wordle', pts);
  }
  render();
}

function scoreGuess(guess, target) {
  const result = Array(target.length).fill('absent');
  const used   = Array(target.length).fill(false);
  for (let i = 0; i < guess.length; i++) {
    if (guess[i]===target[i]) { result[i]='correct'; used[i]=true; }
  }
  for (let i = 0; i < guess.length; i++) {
    if (result[i]==='correct') continue;
    for (let j = 0; j < target.length; j++) {
      if (!used[j] && guess[i]===target[j]) { result[i]='present'; used[j]=true; break; }
    }
  }
  return result;
}

function startJeo() {
  if (!games?.jeoFact) return;
  S.jChoices  = [games.jeoFact.word, ...games.wrongAnswers];
  S.jHints    = 0;
  S.jAnswered = false;
  S.jSelected = -1;
  S.jHintMsg  = '';
  for (let i = S.jChoices.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [S.jChoices[i],S.jChoices[j]] = [S.jChoices[j],S.jChoices[i]];
  }
  S.screen = 'JEO';
  render();
}

function answerJeo(idx) {
  if (S.jAnswered) return;
  S.jAnswered = true;
  S.jSelected = idx;
  const correct = S.jChoices[idx] === games.jeoFact.word;
  const pts     = correct ? Math.max(100, 300-S.jHints*100) : 0;
  completeMode('jeopardy', pts);
  render();
}

function useJeoHint() {
  if (S.jHints >= 1 || S.jAnswered) return;
  S.jHints++;
  const correctWord = games.jeoFact.word;
  const wrongIdx    = S.jChoices.findIndex(c=>c!==correctWord);
  if (wrongIdx >= 0) S.jChoices.splice(wrongIdx,1);
  S.jHintMsg = 'ONE WRONG REMOVED. CAP: 200 PTS.';
  render();
}

// ─────────────────────────────────────────────────────────────
//  Boot
// ─────────────────────────────────────────────────────────────
async function boot() {
  applyTheme();
  S.screen = 'BOOT';
  render();

  try {
    const res  = await fetch(CONTENT_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    // Normalize content structure
    if (Array.isArray(data)) {
      centuries = data;
    } else if (data.centuries) {
      centuries = data.centuries;
    } else {
      centuries = Object.entries(data).map(([id,obj])=>({id,...obj}));
    }
    centuries = centuries.filter(c => c.facts && c.facts.length > 0);

    G = loadStorage();

    // Resume active session or go to deck select
    if (G.session && G.session.studyDone && G.session.facts?.length) {
      games = buildSessionGames(G.session.facts);
      goMenu();
    } else {
      S.screen = 'DECK';
      render();
    }
  } catch(err) {
    document.getElementById('term').textContent =
      box([
        center('SYSTEM ERROR'),
        '',
        ...wrap('FAILED TO LOAD: ' + err.message, W),
        '',
        center('CHECK CONNECTION AND RELOAD')
      ]);
  }
}

boot();
